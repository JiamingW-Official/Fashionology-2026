<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#fbfbfd">
<meta name="description" content="Fashionology Summit 2026 — interactive deep report. 7 panels, key data, cross-panel synthesis.">
<title>Fashionology Summit 2026 · Second Brain</title>
<style>
:root{
  --bg:#fbfbfd; --card:#ffffff; --ink:#0a0a0a; --body:#27272b; --mut:#6e6e73; --mut2:#aeaeb2;
  --line:rgba(0,0,0,.07); --line2:rgba(0,0,0,.12); --acc:#0a84ff; --accsoft:rgba(10,132,255,.08);
  --pin:#ff9f0a; --pinsoft:rgba(255,159,10,.12);
  --hl:linear-gradient(transparent 64%, rgba(255,214,10,.42) 64%);
  --r:20px; --r2:14px;
  --shadow:0 1px 2px rgba(0,0,0,.03),0 12px 32px rgba(0,0,0,.055);
  --shadow2:0 2px 4px rgba(0,0,0,.04),0 18px 50px rgba(0,0,0,.09);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.78;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01"}
::selection{background:rgba(10,132,255,.18)}
button{font-family:inherit}

/* ============ layout ============ */
.app{display:flex;min-height:100dvh}
.sidebar{width:296px;flex:0 0 296px;position:sticky;top:0;height:100dvh;overflow-y:auto;overscroll-behavior:contain;
  border-right:1px solid var(--line);background:rgba(251,251,253,.86);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);
  padding:18px 14px 44px;scrollbar-width:thin}
.main{flex:1;min-width:0}
.content{max-width:824px;margin:0 auto;padding:24px 40px 140px}

/* ============ sidebar ============ */
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 16px}
.brand .dot{width:32px;height:32px;border-radius:10px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:13.5px;font-weight:800;letter-spacing:-.5px}
.brand b{font-size:14.5px;letter-spacing:-.2px;display:block;line-height:1.25}
.brand small{color:var(--mut);font-size:11.5px;font-weight:500;display:block}
.searchbtn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border-radius:12px;border:1px solid var(--line);
  background:var(--card);color:var(--mut);font-size:13.5px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.02);transition:border-color .15s}
.searchbtn:hover{border-color:var(--line2)}
.searchbtn .k{margin-left:auto;font-size:11px;color:var(--mut2);border:1px solid var(--line);border-radius:6px;padding:1px 6px;background:var(--bg)}
.group{margin-top:22px}
.group>span{display:block;padding:0 10px 7px;font-size:10.5px;font-weight:800;letter-spacing:.13em;color:var(--mut2);text-transform:uppercase}
.navitem{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:0;background:none;border-radius:11px;cursor:pointer;
  font-size:13.8px;font-weight:500;color:var(--ink);text-align:left;letter-spacing:-.1px;transition:background .15s}
.navitem:hover{background:rgba(0,0,0,.045)}
.navitem.active{background:var(--ink);color:#fff}
.navitem .badge{flex:0 0 25px;height:25px;border-radius:8px;display:grid;place-items:center;font-size:11.5px;font-weight:800;
  background:rgba(0,0,0,.055);color:var(--ink)}
.navitem.active .badge{background:rgba(255,255,255,.18);color:#fff}
.navitem .t{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem .time{font-size:10.5px;color:var(--mut2);font-weight:700;font-variant-numeric:tabular-nums}
.navitem.active .time{color:rgba(255,255,255,.62)}
.subnav{margin:4px 0 8px 23px;border-left:1px solid var(--line);display:flex;flex-direction:column;gap:1px;padding-left:5px}
.subnav button{display:block;width:100%;text-align:left;border:0;background:none;cursor:pointer;
  font-size:12.3px;color:var(--mut);padding:4.5px 8px;border-radius:8px;line-height:1.45;letter-spacing:-.1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s,background .12s;position:relative}
.subnav button:hover{background:rgba(0,0,0,.04);color:var(--ink)}
.subnav button.lvl2{font-weight:700;color:var(--ink);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-top:5px}
.subnav button.on{color:var(--acc);font-weight:600}
.subnav button.on::before{content:"";position:absolute;left:-6px;top:50%;transform:translateY(-50%);width:2px;height:14px;border-radius:2px;background:var(--acc)}

/* ============ topbar ============ */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:8px;padding:10px 20px;
  background:rgba(251,251,253,.8);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);border-bottom:1px solid var(--line)}
.crumb{font-size:13px;color:var(--mut);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crumb b{color:var(--ink);font-weight:650}
.iconbtn{border:1px solid var(--line);background:var(--card);border-radius:10px;width:34px;height:34px;display:none;place-items:center;cursor:pointer;font-size:16px;flex:0 0 34px}
.spacer{flex:1}
.tbtn{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5.5px 13px;
  font-size:12.5px;font-weight:650;color:var(--mut);cursor:pointer;transition:all .15s;letter-spacing:-.1px;white-space:nowrap;position:relative}
.tbtn:hover{border-color:var(--line2);color:var(--ink)}
.tbtn .cnt{min-width:17px;height:17px;border-radius:9px;background:var(--pin);color:#fff;font-size:10.5px;font-weight:800;display:grid;place-items:center;padding:0 4px}
.tbtn .cnt:empty,.tbtn .cnt[data-n="0"]{display:none}
.chips{display:flex;gap:6px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:5.5px 13px;font-size:12.5px;font-weight:650;
  color:var(--mut);cursor:pointer;transition:all .15s;letter-spacing:-.1px}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ============ hero ============ */
.hero{padding:42px 0 8px}
.hero .kicker{font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;color:var(--acc)}
.hero h1{font-size:clamp(30px,5vw,46px);letter-spacing:-.035em;line-height:1.08;margin:12px 0 14px;font-weight:850}
.hero p.lede{color:var(--mut);font-size:15.5px;max-width:620px;line-height:1.65}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:11px;margin:28px 0 10px}
.stat{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 15px;cursor:pointer;
  transition:transform .18s,box-shadow .18s,border-color .18s;overflow:hidden}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow2);border-color:var(--line2)}
.stat b{display:block;font-size:27px;letter-spacing:-.045em;font-weight:850;font-variant-numeric:tabular-nums}
.stat span{font-size:12px;color:var(--mut);font-weight:500;line-height:1.45;display:block;margin-top:3px}
.stat .go{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
  background:rgba(0,0,0,.05);color:var(--mut);font-size:11px;opacity:0;transition:opacity .15s}
.stat:hover .go{opacity:1}

/* ============ panel meta card ============ */
.pmeta{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 22px;margin:16px 0 4px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.pmeta .row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin:5px 0}
.pmeta .lbl{font-size:10.5px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--mut2);min-width:78px}
.person{display:inline-flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:999px;
  padding:4px 12px 4px 5px;font-size:12.5px;cursor:default;transition:border-color .15s}
.person:hover{border-color:var(--line2)}
.person .av{width:21px;height:21px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:9.5px;font-weight:800}
.person b{font-weight:650;letter-spacing:-.1px}
.person small{color:var(--mut);font-weight:500}
.pmeta .note{font-size:12.5px;color:var(--mut);margin-top:7px;line-height:1.55}

/* ============ article ============ */
.titleblock{padding:34px 0 2px}
.titleblock .kicker{font-size:11.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--acc)}
.titleblock h1{font-size:clamp(24px,3.8vw,36px);letter-spacing:-.03em;line-height:1.14;margin:9px 0 4px;font-weight:850}
.article{padding-top:8px}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.article .layer{animation:rise .35s cubic-bezier(.21,.65,.36,1) both}
.article .layer:nth-child(2){animation-delay:.04s}.article .layer:nth-child(3){animation-delay:.08s}
.layer{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:28px 34px;margin:16px 0;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.layer[data-layer="key"]{background:linear-gradient(180deg,#f2f8ff,#fbfdff);border-color:rgba(10,132,255,.2)}
.layer[data-layer="quotes"]{background:#fafafa}
.layer h2{font-size:12.5px;font-weight:850;letter-spacing:.13em;text-transform:uppercase;color:var(--mut);margin:0 0 16px;display:flex;align-items:center;gap:9px;scroll-margin-top:88px}
.layer[data-layer="key"] h2{color:var(--acc)}
.layer h2::before{content:"";width:8px;height:8px;border-radius:3px;background:currentColor;opacity:.85;flex:0 0 8px}
.layer h3{font-size:18.5px;font-weight:800;letter-spacing:-.018em;margin:30px 0 11px;scroll-margin-top:88px;line-height:1.35;
  display:flex;align-items:baseline;gap:8px}
.layer h3:first-child{margin-top:0}
.layer h3 .hact{display:inline-flex;gap:2px;opacity:0;transition:opacity .15s;transform:translateY(1px)}
.layer h3:hover .hact{opacity:1}
.hbtn{border:0;background:none;cursor:pointer;width:24px;height:24px;border-radius:7px;display:grid;place-items:center;color:var(--mut2);font-size:12px;transition:all .12s}
.hbtn:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.hbtn.pinned{color:var(--pin)}
.layer p{margin:11px 0;color:var(--body)}
.layer ul,.layer ol{margin:11px 0 11px 2px;padding-left:23px}
.layer li{margin:7px 0;color:var(--body)}
.layer li::marker{color:var(--mut2);font-weight:700}
.layer strong{font-weight:700;color:var(--ink);background:var(--hl);padding:0 1px;border-radius:2px}
.layer h3 strong,.layer h2 strong{background:none}
.layer blockquote{border-left:3px solid var(--acc);background:var(--accsoft);border-radius:0 12px 12px 0;padding:11px 17px;margin:15px 0;color:var(--body)}
.layer blockquote p{margin:4px 0}
.layer a{color:var(--acc);text-decoration:none}
.layer hr{border:0;border-top:1px solid var(--line);margin:22px 0}

/* key-takeaway cards */
.ktgrid{display:grid;grid-template-columns:1fr;gap:9px;margin:14px 0 4px;counter-reset:kt}
.kt{position:relative;display:flex;gap:13px;background:var(--card);border:1px solid rgba(10,132,255,.16);border-radius:var(--r2);
  padding:14px 38px 14px 14px;transition:border-color .15s,box-shadow .15s}
.kt:hover{border-color:rgba(10,132,255,.35);box-shadow:0 4px 18px rgba(10,132,255,.08)}
.kt .ktn{flex:0 0 26px;height:26px;border-radius:9px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:800;margin-top:2px}
.kt .ktb{font-size:14.6px;line-height:1.68;color:var(--body)}
.kt .ktb strong{background:var(--hl)}
.kt .hbtn{position:absolute;top:10px;right:8px;opacity:0}
.kt:hover .hbtn{opacity:1}
.kt .hbtn.pinned{opacity:1}

/* tables */
.tblfilter{width:100%;border:1px solid var(--line);border-radius:11px;padding:9px 14px;font-size:13.5px;margin:14px 0 0;
  background:var(--card);outline:0;color:var(--ink)}
.tblfilter:focus{border-color:var(--acc)}
.tblwrap{overflow-x:auto;margin:12px 0 16px;border:1px solid var(--line);border-radius:14px;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:560px}
th{position:sticky;top:0;text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mut);
  background:#f7f7f9;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--ink)}
th .arr{font-size:9px;margin-left:4px;color:var(--acc)}
td{padding:10.5px 14px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.62}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .12s}
tbody tr:hover{background:#f7faff}
td strong{font-weight:700;background:var(--hl)}
.flash{animation:flash 1.6s ease-out}
@keyframes flash{0%{background:rgba(255,214,10,.5)}100%{background:transparent}}
mark.qhit{background:rgba(255,214,10,.62);border-radius:3px;padding:0 1.5px;color:inherit;box-shadow:0 0 0 2px rgba(255,214,10,.22)}

/* ============ pager ============ */
.pager{display:flex;gap:12px;margin-top:30px}
.pager button{flex:1;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:15px 19px;
  cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.pager button:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line2)}
.pager button:last-child{text-align:right}
.pager small{display:block;font-size:10.5px;color:var(--mut2);font-weight:800;letter-spacing:.11em;text-transform:uppercase}
.pager span{font-size:14.5px;font-weight:700;letter-spacing:-.15px}
.kbdhint{text-align:center;color:var(--mut2);font-size:11.5px;margin-top:18px}
.kbdhint kbd{border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:0 5px;background:var(--card);font-family:inherit;font-size:10.5px}

/* ============ spotlight ============ */
.veil{position:fixed;inset:0;z-index:90;background:rgba(20,20,22,.28);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;transition:opacity .18s}
.veil.show{opacity:1;pointer-events:auto}
.spot{position:fixed;z-index:100;left:50%;top:11vh;transform:translateX(-50%) scale(.98);width:min(660px,92vw);
  background:rgba(255,255,255,.93);backdrop-filter:saturate(180%) blur(30px);-webkit-backdrop-filter:saturate(180%) blur(30px);
  border:1px solid rgba(0,0,0,.1);border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.22);
  opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;overflow:hidden}
.spot.show{opacity:1;pointer-events:auto;transform:translateX(-50%) scale(1)}
.spot input{width:100%;border:0;outline:0;background:none;padding:18px 20px;font-size:17px;font-family:inherit;color:var(--ink)}
.spot .res{max-height:52vh;overflow-y:auto;border-top:1px solid var(--line);overscroll-behavior:contain}
.spot .hint{padding:14px 20px;color:var(--mut2);font-size:13px}
.rs{display:block;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:11px 20px;border-bottom:1px solid var(--line)}
.rs:last-child{border-bottom:0}
.rs:hover,.rs.sel{background:var(--accsoft)}
.rs .path{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--acc)}
.rs .tt{font-size:14px;font-weight:650;margin:1px 0;letter-spacing:-.1px}
.rs .sn{font-size:12.5px;color:var(--mut);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rs mark{background:rgba(255,214,10,.55);border-radius:3px;padding:0 1px;color:inherit}

/* ============ progress / fab / toast ============ */
.progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--acc);z-index:200;transition:width .12s linear;box-shadow:0 0 8px rgba(10,132,255,.5)}
.fab{position:fixed;right:22px;bottom:22px;z-index:55;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);cursor:pointer;display:grid;place-items:center;
  color:var(--mut);font-size:15px;box-shadow:0 8px 28px rgba(0,0,0,.14);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(8px)}
.fab.show{opacity:1;pointer-events:auto;transform:none}
.fab:hover{color:var(--ink)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);z-index:210;background:var(--ink);color:#fff;
  font-size:13px;font-weight:600;border-radius:999px;padding:9px 18px;opacity:0;pointer-events:none;transition:all .22s;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%)}

/* ============ drawers (index + saved) ============ */
.drawer{position:fixed;top:0;right:0;height:100dvh;width:min(392px,94vw);z-index:95;display:flex;flex-direction:column;
  background:rgba(255,255,255,.97);backdrop-filter:saturate(180%) blur(26px);-webkit-backdrop-filter:saturate(180%) blur(26px);
  border-left:1px solid var(--line);box-shadow:-22px 0 64px rgba(0,0,0,.14);transform:translateX(106%);
  transition:transform .26s cubic-bezier(.32,.72,0,1);overscroll-behavior:contain}
.drawer.open{transform:none}
.drawer header{position:relative;padding:18px 20px 13px;border-bottom:1px solid var(--line)}
.drawer header b{font-size:15.5px;font-weight:800;letter-spacing:-.2px}
.drawer header small{display:block;color:var(--mut);font-size:11.5px;margin-top:3px;line-height:1.4}
.drawer .dx{position:absolute;top:16px;right:16px;border:0;background:rgba(0,0,0,.05);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--mut);display:grid;place-items:center}
.drawer .dx:hover{background:rgba(0,0,0,.09);color:var(--ink)}
.drawer .body{flex:1;overflow-y:auto;padding:10px 12px 48px;overscroll-behavior:contain}
.efind{width:100%;border:1px solid var(--line);border-radius:11px;padding:9px 13px;font-size:13.5px;margin:6px 0;background:var(--card);outline:0;color:var(--ink)}
.efind:focus{border-color:var(--acc)}
.ent{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:none;cursor:pointer;padding:9px 10px;border-radius:11px;transition:background .12s}
.ent:hover{background:rgba(0,0,0,.045)}
.ent.on{background:rgba(0,0,0,.05)}
.ent .ei{flex:0 0 27px;height:27px;border-radius:8px;display:grid;place-items:center;font-size:10.5px;font-weight:800;background:var(--accsoft);color:var(--acc)}
.ent .en{flex:1;font-size:13.6px;font-weight:650;letter-spacing:-.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ent .ec{font-size:11px;font-weight:800;color:var(--mut2);background:var(--bg);border-radius:999px;padding:1px 8px}
.erefs{margin:1px 0 6px 36px;display:flex;flex-direction:column;gap:1px;border-left:1px solid var(--line);padding-left:6px}
.eref{text-align:left;border:0;background:none;cursor:pointer;padding:7px 9px;border-radius:9px;transition:background .12s}
.eref:hover{background:var(--accsoft)}
.eref .ep{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--acc);margin-bottom:1px}
.eref .es{font-size:12px;color:var(--mut);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* saved drawer */
.sgrp{margin:10px 0 2px;padding:0 8px;font-size:10.5px;font-weight:800;letter-spacing:.11em;text-transform:uppercase;color:var(--mut2)}
.pinitem{position:relative;display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--card);border-radius:var(--r2);
  padding:11px 34px 11px 13px;margin:6px 0;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.pinitem:hover{border-color:var(--line2);box-shadow:0 4px 14px rgba(0,0,0,.05)}
.pinitem .pt{font-size:13.2px;font-weight:650;letter-spacing:-.1px;line-height:1.4}
.pinitem .ps{font-size:11.8px;color:var(--mut);line-height:1.5;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pinitem .px{position:absolute;top:8px;right:7px;border:0;background:none;width:22px;height:22px;border-radius:7px;cursor:pointer;color:var(--mut2);font-size:11px;display:grid;place-items:center}
.pinitem .px:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.dempty{padding:34px 18px;text-align:center;color:var(--mut);font-size:13px;line-height:1.7}
.dempty .big{font-size:26px;display:block;margin-bottom:8px}

<script id="data" type="application/json">{"en": {"sections": {"home": {"id": "home", "title": "Fashionology Summit 2026", "html": "<section class=\"layer\" data-layer=\"info\"><p><strong>The thesis of the day<\/strong> (matching the handwritten notes): <em>\"Decision fatigue. It is no longer about who can be there fast enough; it's about longevity.\"<\/em> — The industry's competitive axis is shifting from <strong>speed<\/strong> to <strong>trust and longevity<\/strong>.<\/p>\n<p><strong>Five structural judgments that ran through the entire day:<\/strong><\/p>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>Agentic commerce is the biggest variable of the next 5–10 years.<\/strong> McKinsey's models predict roughly <strong>$5 trillion<\/strong> of global commerce will flow through agentic purchasing. GAP has placed its bet on Google's UCP protocol and is rebuilding its data stack AI-first; eBay has shipped on-platform agentic search. The no-regret investment for every retailer: <strong>make your product data agent-ready.<\/strong><\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\"><strong>\"Intent\" is replacing \"discovery\" as the new front door of commerce.<\/strong> Pinterest's visual-intent data, GAP's \"help me pack for Japan to see the cherry blossoms,\" LTK's conversational search (3x month-over-month growth), and Daydream's Style Passport all sit on the same curve.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Trust is the new currency.<\/strong> Creator \"trust density\" beats follower counts; Quince converts quality into trust; eBay unlocked high-ticket live-shopping conversion by tying platform protections to live; LTK bans AI-generated influencers; 91% of Snap's core audience trusts their best friends' purchase recommendations.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>The supply chain is being forced on-demand.<\/strong> The wholesale order-to-ship window has compressed to <strong>102 days<\/strong> in five years; buyers have shifted to smaller upfront buys plus in-season reorders; on the manufacturing side (Unspun/Kornit), the push is demand-driven production and MOQ=1. The industry makes 150 billion garments a year, ~30% never sell, and at least $1.5 trillion is wasted annually — the \"Netflix vs. Blockbuster\" moment is replaying in manufacturing.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\"><strong>The anti-screen, back-to-the-real-world backlash is real.<\/strong> Live sports, live music, the revival of physical retail, and experiential/customized consumption are a macro countercurrent confirmed by Pinterest's data and multiple panelists — <em>\"Get off your phone and get into culture.\"<\/em><\/div><\/div><\/div><\/section>", "sub": [], "hasLayers": false, "meta": {}}, "m2": {"id": "m2", "title": "Panel ①: Trend Forecasting Today", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m2-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\">Forecasting is not divination: it is a blend of <strong>data + AI + decades of institutional knowledge<\/strong>; WGSN's macro forecasting is already working on <strong>2029<\/strong>, filtered through a <strong>PEST framework<\/strong>.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\">Pinterest's core moat is <strong>visual intent data<\/strong>: every image's mood/vibe/texture/color is tagged; every click feeds the algorithm — powering both personal recommendation and aggregate-level trend prediction.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\">Buying patterns have structurally changed: the <strong>order-to-ship window has compressed to 102 days within five years<\/strong>; buyers place smaller upfront buys and preserve open-to-buy for in-season reorders.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>Runway heat ≠ commercial sales<\/strong>: feathers and ballooning silhouettes are both examples of \"big media attention, weak sell-through.\"<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\">McKinsey: <strong>~$5 trillion of global commerce will flow through agentic purchasing in the next 5–10 years<\/strong> — for the first time, brands can \"intercept\" and even create trends before they fully form.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m2-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m2-h3\">2.1 Debunking the \"picking colors out of a hat\" myth (WGSN)<\/h3>\n<ul>\n<li>The moderator opened by teasing the popular image of forecasting — \"just picking a color from Pantone,\" \"I'm feeling pink this year\" — and the famous <strong>cerulean blue<\/strong> monologue from <em>The Devil Wears Prada<\/em>.<\/li>\n<li>WGSN (Cassandra): there is real science — <strong>\"we use data, we use AI, we have institutional knowledge.\"<\/strong> \"Many WGSN forecasters have been with the company for decades — many lifers, I'm one of them.\" The biggest misconception is that they simply declare \"blue for fall\" — emphatically not the case.<\/li>\n<li>Macro horizon: <strong>already forecasting 2029<\/strong> (matches the note \"doing 2029 already\"); macro trends are filtered through PEST (political/economic/social/technological), then layered down to culture trends and TikTok micro-trends; sustainability and AI are the two highest-impact throughlines (matches the note \"sustainability, ai, big impact\").<\/li>\n<\/ul>\n<h3 id=\"m2-h4\">2.2 The semiotics lens: signs arrive before language (Moderator / DTS)<\/h3>\n<ul>\n<li>The moderator's background: previously worked with Cassandra; later specialized in <strong>semiotics<\/strong> — the study of signs and symbols and how we use them to convey, communicate, and create meaning.<\/li>\n<li>Core idea: <strong>\"Signs tend to show up in culture before we have the language to talk about them.\"<\/strong><\/li>\n<li>Example: DTS tracked the rise of <strong>medieval armor in meme posts<\/strong> and heraldry/chain mail on runways — only now are brands visually embracing these in campaigns.<\/li>\n<li><strong>Pinterest called it early too: the 2024 \"Castlecore\" prediction<\/strong> — years ahead.<\/li>\n<\/ul>\n<h3 id=\"m2-h5\">2.3 Pinterest's visual discovery machine (Sara Pollack)<\/h3>\n<ul>\n<li>Discovery is inherently visual: \"Magazines were always a source for visualizing possibilities, but Pinterest lets people get inspired in a super deep visual way.\"<\/li>\n<li><strong>The visual loop<\/strong>: you see an image → what hooks you might be the mood, the vibe, a texture, a color, or a specific item (a watch, a pair of shoes) → technology lets you <strong>zoom into that detail<\/strong> → a whole new feed of related images appears → every save/click is a signal → the algorithm improves → exploration deepens.<\/li>\n<li><strong>Key insight: people often don't have the words for what they like.<\/strong> \"That ability to just use what you see to guide you and find the right thing for you is really powerful.\"<\/li>\n<li>The data mechanics (matches note \"all is tagged in an image\"): <strong>the specific blue, the texture, the item — all of it is tagged inside the image<\/strong>; every time someone clicks part of an image or chooses the next pin, data accrues — improving personal recommendations <em>and<\/em> surfacing <strong>aggregate-level patterns<\/strong>, which is the raw material of trend prediction.<\/li>\n<\/ul>\n<h3 id=\"m2-h6\">2.4 Pinterest's \"Summer of Trends\" quarterly report<\/h3>\n<ul>\n<li>Pinterest publishes quarterly trend reports; this summer edition focuses on <strong>the intersection of sport and lifestyle<\/strong>.<\/li>\n<li>Context: the World Cup is coming; the longer arc is <strong>fandom becoming a key way people express themselves<\/strong> through fashion, beauty, food, and lifestyle choices.<\/li>\n<li>Hard data:<ul>\n<li><strong>World Cup jersey searches +800% YoY<\/strong><\/li>\n<li><strong>F1 outfit searches +400% YoY<\/strong><\/li>\n<li><strong>WNBA fashion searches jumping every year<\/strong><\/li>\n<\/ul>\n<\/li>\n<li><strong>Female athletes as cultural influencers<\/strong>: Alysa Liu (her Olympics hair drove search), Eileen Gu, Natasha Cloud — \"people increasingly look to female athletes to guide their style choices\" (matches note \"female athlete become culture influencer\").<\/li>\n<li>Sara's two personal calls:<ol>\n<li><strong>Live sports and live music are getting even more important<\/strong> — driven by a <strong>backlash against tech and being glued to a screen<\/strong>; both are areas Pinterest is investing in heavily, \"because it's about community, putting your phone away, and being in the real world\" (matches note \"backlash from screentime, more about community and in real world\").<\/li>\n<li><strong>The joy of customization<\/strong>: people want to take a Knicks jersey and make it uniquely theirs — they don't want it straight out of the shop. <strong>\"The more brands can create customization and experiential opportunities for consumers, the further that goes right now.\"<\/strong><\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h3 id=\"m2-h7\">2.5 The structural shift in wholesale buying (JOOR · Amanda Bacal)<\/h3>\n<ul>\n<li>Setup: trend cycles are compressing — does JOOR's transaction data show it? Are buyers planning further out or making smaller, faster bets?<\/li>\n<li>Answer: <strong>\"The fashion industry is moving faster than ever before.\"<\/strong> Social media has created <strong>microtrends that rise and fall quickly<\/strong>; brands and retailers must operate with flexibility and agility.<\/li>\n<li><strong>The traditional model<\/strong>: buyers place a buy in March and expect delivery six months later — the classic long-lead wholesale cycle.<\/li>\n<li><strong>The current model<\/strong> (matches note \"buyers are preserving a smaller buy, less upfront, react\"):<ul>\n<li><strong>Smaller upfront buys<\/strong>;<\/li>\n<li><strong>More open-to-buy reserved<\/strong> for orders placed later in the season, closer to delivery;<\/li>\n<li>Triple benefit: <strong>lower upfront risk, the flexibility to react to what's trending, and the ability to place reorders<\/strong> on what's working.<\/li>\n<\/ul>\n<\/li>\n<li><strong>Hard number<\/strong>: JOOR measured the order-to-ship window — <strong>over the last five years it has shrunk dramatically, down to 102 days<\/strong> (note: it shrank <em>to<\/em> 102 days; see Corrections).<\/li>\n<\/ul>\n<h3 id=\"m2-h8\">2.6 Trends with media heat but no sales (JOOR)<\/h3>\n<ul>\n<li>Question: how do you tell \"visually exciting\" from \"commercially valuable\"?<\/li>\n<li>JOOR's methodology: each season they produce a runway-driven trend report (the season's key style statements) — <strong>and uniquely, a \"shoppable\" version of it<\/strong>: products curated into each trend that buyers can actually buy into. That process exposes exactly <strong>where artistic heat diverges from commercial availability<\/strong>.<\/li>\n<li>Two examples from the Spring '26 analysis:<ol>\n<li><strong>Feathers<\/strong>: a huge runway moment — beautiful, full of movement, texture, and drama (matches note \"feathers, movement and texture\"). But building the shoppable version, <strong>they struggled to find commercially available product with the same drama<\/strong>.<\/li>\n<li><strong>Billowing/ballooning silhouettes<\/strong>: heavily discussed on the runways; Amanda expected this one to translate — it reads as an evolution of the already-popular relaxed silhouette and leans into comfort dressing — <strong>yet it hasn't become a major commercial driver<\/strong>. \"I'm still rooting for it, though.\"<\/li>\n<\/ol>\n<\/li>\n<li>Moderator resonance: DTS faces the same question daily in visual culture — \"Should a semiotic sign be inserted lightly as a styling decision or a prop, or has it gathered enough cultural weight to warrant a full photo project? Can brands build around it?\"<\/li>\n<\/ul>\n<h3 id=\"m2-h9\">2.7 McKinsey: a decision framework for trend investment (Kelsea Alderman)<\/h3>\n<ul>\n<li>The predicament: more information, more trends, faster cycles, faster customers — prioritization has become genuinely hard for leadership, product, and marketing teams (matches note \"pressure on brands has gotten more extreme\").<\/li>\n<li><strong>The framework: be brutally honest with yourself<\/strong> (matches note \"how do you get to market, who is your core customer base\"):<ul>\n<li>Are you fast fashion or luxury?<\/li>\n<li>Predominantly wholesale or DTC?<\/li>\n<li>How do you get to market — and how fast?<\/li>\n<li><strong>Who is your core customer base, and what is your value proposition to them?<\/strong><\/li>\n<li>→ Run every trend/investment through that funnel to rank relative ROI.<\/li>\n<\/ul>\n<\/li>\n<li>Applications:<ul>\n<li>A specialty retailer trying to win younger Gen Z / Gen Alpha customers, willing to spend: <strong>\"take a couple of big swings\"<\/strong> — sexier, more flash-in-the-pan trends, because the goal is relevance in a new market.<\/li>\n<li><strong>Faster speed-to-market + flexible working capital<\/strong>: you can be more bullish and \"buckshot\" with trends — relative risk is lower.<\/li>\n<li><strong>Traditional brands with long lead times and a rigid, expensive value chain<\/strong>: think hard about where the trend will land; lean into what is <strong>complementary to who you already are<\/strong>, and spend less on \"bright, shiny objects.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m2-h10\">2.8 McKinsey: agentic commerce will reshape how trends are created<\/h3>\n<ul>\n<li>Question: which structural shift will most reshape the industry in five years?<\/li>\n<li>Answer (the most important passage of the session):<ul>\n<li>The old paradigm: look at past information, react, extrapolate.<\/li>\n<li><strong>McKinsey's models predict ~$5 trillion of global commerce flowing through agentic purchasing in the next 5–10 years<\/strong> — \"a massive portion of our wallet and our spend.\"<\/li>\n<li>The inversion: <strong>brands gain the ability to intercept and create trends before they happen<\/strong>, because agents will be influencing purchase decisions before a trend is fully baked.<\/li>\n<li>Mechanism: a fast-fashion brand could <strong>test a million different things<\/strong> with AI and social, see what sticks and earns engagement <strong>before producing anything<\/strong>, then use <strong>agentic models to inform what gets produced and distributed<\/strong> (matches note \"use agentic model what gets produced\").<\/li>\n<li>Implication: <strong>the democratization of trend creation<\/strong> — players like Inditex and Shein get a bigger say in what trends become. \"The runway will still have its place. Cerulean blue will still have its place.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m2-h11\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>Lightning round #1 — \"What makes someone better at reading culture?\"<ul>\n<li><strong>\"Get off your phone and get into culture.\"<\/strong> (the line of the day — verbatim in your notes)<\/li>\n<li>\"Being an active observer.\"<\/li>\n<li>\"I was going to say curiosity — same.\"<\/li>\n<li>\"Not feeling like you have to be everywhere all at once.\"<\/li>\n<\/ul>\n<\/li>\n<li>Lightning round #2 — \"What's most underrated by brands?\"<ul>\n<li><strong>\"The democratization of luxury.\"<\/strong><\/li>\n<li><strong>\"The importance of evergreen product.\"<\/strong> (both verbatim in your notes)<\/li>\n<li>\"Helping people figure out what's actually right for them.\"<\/li>\n<li>\"AI — controversial answer, but AI.\"<\/li>\n<\/ul>\n<\/li>\n<li>The moderator, out of time: \"We have one minute left and I have a lot more questions.\"<\/li>\n<\/ul><\/section>", "sub": [{"id": "m2-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m2-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m2-h3", "t": "2.1 Debunking the \"picking colors out of a hat\" myth (WGSN)", "lvl": 3}, {"id": "m2-h4", "t": "2.2 The semiotics lens: signs arrive before language (Moderator / DTS)", "lvl": 3}, {"id": "m2-h5", "t": "2.3 Pinterest's visual discovery machine (Sara Pollack)", "lvl": 3}, {"id": "m2-h6", "t": "2.4 Pinterest's \"Summer of Trends\" quarterly report", "lvl": 3}, {"id": "m2-h7", "t": "2.5 The structural shift in wholesale buying (JOOR · Amanda Bacal)", "lvl": 3}, {"id": "m2-h8", "t": "2.6 Trends with media heat but no sales (JOOR)", "lvl": 3}, {"id": "m2-h9", "t": "2.7 McKinsey: a decision framework for trend investment (Kelsea Alderman)", "lvl": 3}, {"id": "m2-h10", "t": "2.8 McKinsey: agentic commerce will reshape how trends are created", "lvl": 3}, {"id": "m2-h11", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "1:00–1:35 PM", "panelists": [{"name": "Cassandra Napoli", "org": "WGSN", "role": "WGSN, Head of Consumer Forecasting"}, {"name": "Sara Pollack", "org": "Pinterest", "role": "Pinterest, VP & Head of Global Consumer Marketing"}, {"name": "Amanda Bacal", "org": "JOOR", "role": "JOOR, SVP & Head of Marketing"}, {"name": "Kelsea Alderman", "org": "McKinsey", "role": "McKinsey, Associate Partner"}], "moderator": [{"name": "Agustina Panzoni", "org": "Death to Stock", "role": "Death to Stock / DTS"}]}}, "m3": {"id": "m3", "title": "Panel ②: Emerging Shopping Behaviors", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m3-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>Shopping is shifting from discovery-based to intent-based<\/strong> — GAP's CTO calls this the biggest \"aha\"; multimodal, personalized, conversational are the three keywords.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\"><strong>GAP's AI strategy is the highest-density enterprise blueprint of the day<\/strong>: an AI-first data-stack rebuild, a platform-plus-brand-uniqueness architecture, a bet on Google's UCP protocol, and deliberate model agnosticism.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Live shopping is now eBay's growth engine<\/strong>: the trust equation (real-time interaction + platform protections) unlocked high-ticket conversion — $1M+ in a single seller's first event, $2M+ on a single Black Friday day.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>LTK proves creators are a conversion channel, not an awareness channel<\/strong>: 70% of annual sales happen inside its own app; AI-generated influencers are banned.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\"><strong>Virtual try-on (VTO) has crossed the commercial threshold<\/strong>: +50% conversion, 3x add-to-cart, 7x browsing — generative models are the technical cause; emotion is the psychological one.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m3-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m3-h3\">3.1 Introductions (with important backstories)<\/h3>\n<ul>\n<li><strong>Reesa Lake (LTK)<\/strong>: \"LTK — formerly known as LikeToKnowIt, formerly known as RewardStyle. We are all one company, same company, if there's any confusion.\" Four and a half years at LTK helping creators succeed economically; previously <strong>the first manager at DBA (Digital Brand Architects)<\/strong> — \"I'm a bit of a dinosaur in the creator economy — I was truly securing those first $2,000 deals before brands would ever pay a blogger.\" Moderator: \"A pioneer.\"<\/li>\n<li><strong>Natalia Modenova (DressX)<\/strong>: a fashion-tech company applying frontier technologies to fashion for 5+ years. A <strong>virtual try-on demo booth<\/strong> at the summit; powering VTO for brands including <strong>Lola de Cezanne (?) and Victoria Beckham<\/strong>; a major activation live that same day at <strong>Governors Ball<\/strong> in NYC.<\/li>\n<li><strong>Emily Wargo (eBay)<\/strong>: nearly a decade at eBay; leads the US fashion business; helped set up the <strong>Authenticity Guarantee<\/strong> program.<\/li>\n<li><strong>Sven Gerjets (GAP Inc.)<\/strong>: leads technology, digital, cybersecurity, data, and AI across the four brands — Banana Republic, Gap, Old Navy, Athleta.<\/li>\n<\/ul>\n<h3 id=\"m3-h4\">3.2 Opening question: \"What's normal today that was unimaginable five years ago?\"<\/h3>\n<ul>\n<li><strong>LTK (Reesa)<\/strong>: Five years ago — scroll Instagram, see an item on a creator, screenshot it, hope to find it; then came links. <strong>Today<\/strong>: search \"I'm going to Japan to see the cherry blossoms — what should I wear?\" and get a <strong>curated, personalized experience from creators you trust<\/strong> — and creators you don't know yet who share your tastes, interests, and body type. \"With the advancements in AI and conversational search inside LTK, <strong>that search is growing 3x month over month<\/strong> — consumers can finally ask real contextual questions instead of figuring it out alone.\"<\/li>\n<li><strong>DressX (Natalia)<\/strong>: Five years ago, virtually trying on sunglasses or makeup was normal, but <strong>ready-to-wear try-on was impossible for any clothing category<\/strong>; today it is a reality — \"the next level of personalization, very powerful.\"<\/li>\n<li><strong>eBay (Emily)<\/strong>: \"Five years ago, the idea that resale could be a mainstream shopping channel seemed pretty impossible — listing was friction-filled, a heavy lift. Today <strong>resale is not just mainstream but celebrated<\/strong>. <strong>Nine out of ten consumers say they plan to increase their pre-loved spend<\/strong> in the coming years; eBay's fashion business grew 10% last year.\"<\/li>\n<li><strong>GAP (Sven)<\/strong>: \"We've focused on personalization for a long time; <strong>the pivot now is intent-based, multimodal experiences<\/strong> — personalized not in the 'serving up offers' sense, but in the sense of interactions <strong>like the ones you get in stores<\/strong>. The face-to-face experience is being brought online.\"<\/li>\n<\/ul>\n<h3 id=\"m3-h5\">3.3 GAP's agentic awakening<\/h3>\n<ul>\n<li>Context: 50+ years of GAP navigating every retail shift — mall → e-commerce → mobile. <strong>This fall GAP hits 30 years online<\/strong> — \"we launched our first online store back when Steve Jobs was on our board.\"<\/li>\n<li>\"There wasn't one aha moment, but the big shift was <strong>customers moving from pure discovery-based shopping to intent-based shopping<\/strong>\":<ul>\n<li>\"I'm going on a trip — <strong>help me pack<\/strong>\";<\/li>\n<li>\"I saw this outfit on someone — <strong>help me find that same outfit in a cost-effective way, something that fits my budget<\/strong>\" (matches note \"fit my budget\").<\/li>\n<\/ul>\n<\/li>\n<li>Posture: <strong>get ahead of the customer, get ahead of the industry<\/strong> — set up to scale as the space evolves (matches note \"trying to get ahead of the customer, stay flexible\").<\/li>\n<\/ul>\n<h3 id=\"m3-h6\">3.4 GAP's AI architecture: four brands, one platform<\/h3>\n<ul>\n<li>Design principle: <strong>\"Platform at scale, with brand uniqueness.\"<\/strong><\/li>\n<li>Logic: four brands with different customer sets, products, demographics, price points, and value propositions must compete uniquely — but on GAP Inc.'s shared foundation. <strong>Everything is built to scale, with the \"edge experience\" left for brand uniqueness<\/strong>, so customers never feel the brands have been genericized.<\/li>\n<li>The accidental superpower: <strong>the four brands form an innovation rotation<\/strong> — \"someone is always ready to innovate on something. We start with a single brand, prove it, then scale across the brands.\"<\/li>\n<\/ul>\n<h3 id=\"m3-h7\">3.5 GAP's innovation filter and technology bets<\/h3>\n<ul>\n<li><strong>The four-lens innovation framework: value / viability / risk / adoption.<\/strong><\/li>\n<li>Key warning: \"There are so many things today that are <strong>super viable but not valuable to the customer<\/strong> — you can create incredible PR moments that don't drive customer value. That's the biggest trade-off we have to make.\" Decisions lean heavily on data and tracked customer behavior.<\/li>\n<li><strong>Data is the foundation<\/strong>: \"Data is everything in this space. We are <strong>completely rebuilding our data to be AI-first<\/strong> — a new data model, a context layer, a semantic layer — so agents can interact with it. You have to make the call early and move forward intentionally.\"<\/li>\n<li><strong>The UCP bet (Universal Commerce Protocol, with Google)<\/strong>:<ul>\n<li>Rationale: \"Just like the internet is built on consistent standard protocols, I believe AI will be as well.\" UCP is <strong>merchant-friendly<\/strong>, and GAP hopes and believes it wins the <strong>protocol race<\/strong>.<\/li>\n<li>Value: through UCP, GAP can <strong>bring its experiences, loyalty, and customer understanding forward into the agents<\/strong> themselves.<\/li>\n<li>Industry significance: \"As <strong>the first large fashion retailer<\/strong> to put a stake down, we're helping Google evolve the protocol to fit fashion — <strong>which is different than selling laundry detergent<\/strong>.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Stay flexible, stay model-agnostic<\/strong>:<ul>\n<li>\"Up the stack, don't get locked in — the space moves so fast that what an interesting startup can do today, an LLM may drop a model that does <em>that plus<\/em> tomorrow.\"<\/li>\n<li>\"I've been doing this 35 years and <strong>never has the foundation been moving under our feet like today<\/strong> — every two weeks something new happens. Two years ago it looked like OpenAI would take it all; now Gemini's traffic is surpassing them. Nobody knows who the winners will be, so stay flexible in the models you work with.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h8\">3.6 eBay: how live shopping rewrites the trust equation for resale<\/h3>\n<ul>\n<li><strong>Live makes shopping \"three-dimensional again\"<\/strong>: \"Online shopping has felt one-dimensional for a long time; live brings <strong>discovery together with community<\/strong> and a fully rounded human connection.\"<\/li>\n<li>Seller side: showing up as their authentic selves — building their brand, telling their story, demonstrating expertise — builds buyer confidence.<\/li>\n<li>Buyer side: <strong>real-time questions get astonishingly specific<\/strong> — \"What's the hardware finish on that?\" \"Can I take links out of the watch?\" \"Can you put it on so I can see the scale?\" In the old modality, a buyer might send a message — <strong>but they may not bother<\/strong> — and the sale never happens. (Note correction: it's the <em>buyer<\/em> who doesn't bother, not the brand.)<\/li>\n<li><strong>The proof<\/strong>:<ul>\n<li>\"Live shopping has been <strong>the growth engine<\/strong> for eBay over the past almost two years\" (matches note).<\/li>\n<li>People are <strong>comfortable converting on really high-price-point items<\/strong> in live — trust comes from the relationship.<\/li>\n<li>A watch seller did <strong>over $1M in GMV in their first-ever eBay Live event<\/strong>.<\/li>\n<li><strong>Black Friday set the record: over $2M in a single live shopping event.<\/strong><\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h9\">3.7 eBay: making one-of-one inventory urgent (the resale × live playbook)<\/h3>\n<ul>\n<li>The moderator's bit: holds up his own shirt — \"I got this on eBay (almost said The RealReal). It's the only one in existence. How do you convince me in a live setting?\"<\/li>\n<li>Emily's answer in three layers:<ol>\n<li><strong>One-of-one is urgency<\/strong>: resale's uniqueness is inherently exciting and scarce.<\/li>\n<li><strong>Manufactured moments<\/strong> (matches note \"48 hours of drops, very exciting exclusive, time-bound sensitivity\"):<ul>\n<li><strong>\"48 Hours of Drops\"<\/strong>: two days of exclusive inventory going live in waves — time-bound sensitivity buyers were eager to engage with.<\/li>\n<li><strong>Laura Higgins<\/strong> hosting a live selling <strong>Hermès Birkin and Kelly bags at $1 starting prices<\/strong> — \"even if you're not buying, being part of that excitement and energy is terrific.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Cultural moments × digital amplification<\/strong> (matches notes \"blending culture moments\" and \"Vogue went live\"):<ul>\n<li><strong>The Vogue Vintage Market<\/strong>: Vogue curated a boutique in downtown NYC sourced <strong>entirely on eBay<\/strong> (pre-loved vintage designer); then <strong>Vogue went live on their eBay Live handle<\/strong> selling a curated assortment from that boutique — so non-NYC buyers could participate too.<\/li>\n<li><strong>The Endless Runway<\/strong> during New York and London fashion weeks: models walking in head-to-toe pre-loved looks, <strong>amplified on eBay Live so buyers could watch items come down the runway and buy them simultaneously<\/strong>.<\/li>\n<li>The point: \"give our sellers a wider audience and let them shine in a bigger footprint.\"<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h10\">3.8 eBay: why live worked in the West this time<\/h3>\n<ul>\n<li>Question: \"Live is huge and ingrained in Asia; the West invested for years and nobody cared. How did you make the American shopper care?\"<\/li>\n<li>Answer:<ul>\n<li>\"Asia pioneered live shopping; the US is behind the curve but <strong>catching up really, really quickly<\/strong>. The US customer does care — they're excited about this new modality.\"<\/li>\n<li><strong>The key lesson from Asia's live-shopping explosion<\/strong> (matches note \"lesson learned, people won't buy; solution: tie all the protection and technology to live\"): novelty brings people in, <strong>but they won't stay, engage, convert, or come back<\/strong> without foundational platform capabilities and retail best practices.<\/li>\n<li><strong>The fix: tie all marketplace protections to the live experience<\/strong> —<ul>\n<li>Whether you buy on eBay Live or core platform search, <strong>the experience is identical<\/strong>;<\/li>\n<li><strong>Authenticity Guarantee<\/strong> (items authenticated after purchase);<\/li>\n<li><strong>eBay Money Back Guarantee<\/strong>;<\/li>\n<li>The same customer support and post-purchase experience.<\/li>\n<\/ul>\n<\/li>\n<li>The logic: \"Buying in a new modality can be intimidating; knowing you have the protections of a company that's been around 30 years turns that into an accelerant.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h11\">3.9 eBay: AI × resale, both sides of the marketplace<\/h3>\n<ul>\n<li>Position: \"AI has been a terrific boost for resale. Generational customers' expectations have shifted — <strong>shopping must be easy, fast, trusted<\/strong>. The platforms that will <strong>endure<\/strong> are those that harness AI and make experiences frictionless.\" (This \"endure\" is the direct echo of your \"longevity\" note.)<\/li>\n<li><strong>Seller side: the Magical Listing Flow<\/strong> (matches note \"magical flow — go to closet, take pic, eBay does the listing\"):<ul>\n<li>Before: photograph the item, manually fill out every field — a heavy lift.<\/li>\n<li>Now: <strong>go to your closet, take one photo, and eBay's AI generates the entire listing<\/strong> — every field (color, size, type, category), plus <strong>pricing recommendations and condition guidance<\/strong>.<\/li>\n<li>Scale: <strong>10M+ users<\/strong> have interacted with eBay's AI features; <strong>half a million listings are uploaded through the magical listing tool every single day<\/strong> — \"unlocking the customer's closet.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Buyer side: embedded agentic search<\/strong>:<ul>\n<li><strong>Natural language<\/strong> conversation with an agent (matches note), \"like talking to a sales associate,\" to navigate eBay's signature breadth of unique inventory and reach what you want faster.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h12\">3.10 LTK: from one blog link to conversion infrastructure<\/h3>\n<ul>\n<li>Origin story (Reesa): \"LTK is a company founded by creators, for creators. Our founder <strong>Amber Venz Box<\/strong> was a personal-style blogger who realized she was giving all these recommendations and <strong>not being paid for any of them<\/strong>; her then-boyfriend (now partner) went to brands — to Nordstrom — and created the relationship where <strong>creators could earn commission off a blog link and brands could track those sales<\/strong>.\"<\/li>\n<li>Evolution: from <strong>one surface<\/strong> (the blog link) to a <strong>multi-surface ecosystem<\/strong> —<ul>\n<li>In the LTK app: creators publish, consumers engage;<\/li>\n<li>A purchase can come from a direct post, from a creator's saved <strong>collections<\/strong>, or via <strong>LTK AI<\/strong> (a consumer searches \"what should I wear to a bachelorette party\" and creator content is served as the answer);<\/li>\n<li><strong>Marketing runs inside the ecosystem<\/strong>: price-drop notifications, abandonment recovery — \"before, on that blog link, maybe you click, maybe you buy, and there's no further transaction. Now we see <strong>the long tail of conversions<\/strong> and use that data to inform how brands should engage creators.\"<\/li>\n<\/ul>\n<\/li>\n<li>Historical contrast: \"In the early days when I represented bloggers, brands would ask 'what are the metrics?' and I'd say 'there's Google Analytics.' <strong>LTK was truly the first to show brands the conversion power of creators.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m3-h13\">3.11 LTK: the number that surprises everyone<\/h3>\n<ul>\n<li>Live poll: \"Who here is on the LTK app as a creator or consumer? — I see a lot of hands, good news.\"<\/li>\n<li>The gap LTK saw in link-only days: no place where consumers could <strong>be entertained, engaged, inspired, and buy in the same place<\/strong> — social platforms aren't built for buying from your favorite creator. LTK's purpose is to marry <strong>engaging an audience, building community, and making it really easy to transact<\/strong> (matches note).<\/li>\n<li><strong>The number: 70% of LTK's annual sales come from sales made within the LTK app<\/strong> (your note says 37% — a mishearing; see Corrections).<\/li>\n<li>Implication: \"Brands shouldn't think of LTK as just 'where creators link' — <strong>it is a marketing channel in its own right<\/strong>, a standalone social platform, and in-app sales keep climbing.\"<\/li>\n<\/ul>\n<h3 id=\"m3-h14\">3.12 DressX: why virtual try-on is happening <em>now<\/em><\/h3>\n<ul>\n<li>Technical causes:<ul>\n<li>The legacy constraint: VTO used to depend on <strong>on-device 3D rendering<\/strong> (not enough memory or power);<\/li>\n<li>The inflection: <strong>generative models<\/strong> pushed VTO past the usability line on both <strong>fidelity<\/strong> and <strong>speed<\/strong> — \"online interactions now expect instant feedback; try-on can deliver it.\"<\/li>\n<li>The behavioral cause: AR for sunglasses and makeup taught users \"this works, this is nice\"; now it extends to clothing.<\/li>\n<\/ul>\n<\/li>\n<li>The psychology of conversion:<ul>\n<li><strong>\"Fashion shopping is very emotional\"<\/strong> — sometimes called impulse shopping (\"sure, wine at 3 a.m. produces impulse shopping\" — laughter) — but fundamentally emotional.<\/li>\n<li><strong>Seeing <em>yourself<\/em> in the garment is an emotional peak<\/strong> — \"ads use puppies and babies because our brains react a certain way; the same happens when we see ourselves wearing an item.\"<\/li>\n<li>Product decision: <strong>bet on your real photo / your own AI twin, not generic AI models<\/strong> — create a twin from a selfie, or try items on <strong>your own photo from your Amalfi Coast vacation, your backyard, an event<\/strong> — \"in a familiar setting you see not just whether it fits your body, but <strong>how it fits into your life<\/strong>.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m3-h15\">3.13 DressX: the conversion data (preview of a forthcoming report)<\/h3>\n<ul>\n<li><strong>Items with VTO convert 50% better<\/strong> than items without;<\/li>\n<li><strong>Users who engage with VTO add to cart 3x more often<\/strong>;<\/li>\n<li><strong>They view 7x more items<\/strong> on average (deeper discovery);<\/li>\n<li><strong>The effect is strongest on expensive items and luxury categories<\/strong> — \"and remember, for a huge demographic, a $100–200 item <em>is<\/em> luxury. I remember buying my first designer item — 'wow, I got the brand.' The power of the brand plus these details is what drives conversion.\"<\/li>\n<li><strong>Higher AOV<\/strong>: VTO users are more engaged and discover more;<\/li>\n<li><strong>Return rates improve, but that's not the primary metric<\/strong> — \"returns are driven by many factors (policy, etc.), and shoppers don't think much about returns before purchasing; what we aim for is <strong>better purchase decisions<\/strong>.\"<\/li>\n<li><strong>A purchase-intent signal<\/strong>: when a user starts trying multiple items <strong>across multiple different photos<\/strong> = they're late in the purchase decision — identifying high-intent cohorts for brands.<\/li>\n<li>Coming soon: beyond full-look try-ons, (footwear/accessory?) try-on going live within the (Winter?) app.<\/li>\n<li>Bottom line: \"It benefits both shoppers and brands. It works.\"<\/li>\n<\/ul>\n<h3 id=\"m3-h16\">3.14 Lightning round: \"What shopping behavior will feel completely normal by 2030 that still feels futuristic today?\"<\/h3>\n<ul>\n<li><strong>GAP (Sven)<\/strong>: \"AI embedded in the customer journey in a natural way — customers <strong>not having to teleport in and out of shopping experiences<\/strong>; it's just how we shop.\"<\/li>\n<li><strong>eBay (Emily)<\/strong>: \"<strong>Resale as the primary option when customers begin their shopping journey<\/strong> — as the experience gets easier, faster, more trusted. Sustainability and circularity are table stakes, fueled by AI. That's the next wave.\"<\/li>\n<li><strong>DressX (Natalia)<\/strong>: \"Imagine your favorite online store where <strong>every product page shows what it looks like on you — without you doing anything<\/strong>. I think it happens before 2030. Also, I'm excited about drone deliveries — nothing to do with try-on, but cool.\"<\/li>\n<li><strong>LTK (Reesa)<\/strong>: \"Creators will continue to be the trusted source, and the way we search and engage with them becomes <strong>much more conversational<\/strong> versus link-link-link — plus the continuation of personalization fueled by AI.\"<\/li>\n<\/ul>\n<h3 id=\"m3-h17\">3.15 Follow-up: why will creators stay trusted in the AI era? (LTK's manifesto)<\/h3>\n<ul>\n<li>\"We all need to embrace AI, but there is mistrust in AI. <strong>On LTK, we do not allow any AI-generated influencers or avatars<\/strong> — the creator is the trusted voice.\"<\/li>\n<li>\"Creators have this power because <strong>they are testing the product, trying the product, doing the in-market research consumers don't have time to do<\/strong>. As long as they don't lose authenticity, they will continue to be that trusted guide.\"<\/li>\n<li>\"And the way we use AI at LTK is different: <strong>not the open web — only the product recommendations and data points fueled by creators<\/strong>. As AI takes over, creators still have their place.\"<\/li>\n<li>Moderator: \"Well, that's encouraging. Great conversation — thank you all.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m3-h18\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>Reesa calling herself \"a dinosaur of the creator economy\"; the RewardStyle → LikeToKnowIt → LTK lineage clarified \"if there's any confusion.\"<\/li>\n<li>Sven on GAP's DNA: Steve Jobs was on the board when the first online store launched.<\/li>\n<li>Emily's \"endure\" framing maps directly to your \"longevity\" note: \"the platforms that will endure are those that make AI experiences frictionless.\"<\/li>\n<li>The moderator on influencer marketing: \"I say 'emerging' but it's gone from nice-to-have to table stakes; and 'creator' went from a gorgeous person with 10 million followers to literally me — or my friend who thinks she has good style.\"<\/li>\n<\/ul><\/section>", "sub": [{"id": "m3-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m3-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m3-h3", "t": "3.1 Introductions (with important backstories)", "lvl": 3}, {"id": "m3-h4", "t": "3.2 Opening question: \"What's normal today that was unimaginable five years ago?\"", "lvl": 3}, {"id": "m3-h5", "t": "3.3 GAP's agentic awakening", "lvl": 3}, {"id": "m3-h6", "t": "3.4 GAP's AI architecture: four brands, one platform", "lvl": 3}, {"id": "m3-h7", "t": "3.5 GAP's innovation filter and technology bets", "lvl": 3}, {"id": "m3-h8", "t": "3.6 eBay: how live shopping rewrites the trust equation for resale", "lvl": 3}, {"id": "m3-h9", "t": "3.7 eBay: making one-of-one inventory urgent (the resale × live playbook)", "lvl": 3}, {"id": "m3-h10", "t": "3.8 eBay: why live worked in the West this time", "lvl": 3}, {"id": "m3-h11", "t": "3.9 eBay: AI × resale, both sides of the marketplace", "lvl": 3}, {"id": "m3-h12", "t": "3.10 LTK: from one blog link to conversion infrastructure", "lvl": 3}, {"id": "m3-h13", "t": "3.11 LTK: the number that surprises everyone", "lvl": 3}, {"id": "m3-h14", "t": "3.12 DressX: why virtual try-on is happening now", "lvl": 3}, {"id": "m3-h15", "t": "3.13 DressX: the conversion data (preview of a forthcoming report)", "lvl": 3}, {"id": "m3-h16", "t": "3.14 Lightning round: \"What shopping behavior will feel completely normal by 2030 that still feels futuristic today?\"", "lvl": 3}, {"id": "m3-h17", "t": "3.15 Follow-up: why will creators stay trusted in the AI era? (LTK's manifesto)", "lvl": 3}, {"id": "m3-h18", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "1:40–2:20 PM", "panelists": [{"name": "Sven Gerjets", "org": "GAP Inc.", "role": "GAP Inc., EVP & CTO"}, {"name": "Emily Wargo", "org": "eBay", "role": "eBay, Director US Fashion"}, {"name": "Natalia Modenova", "org": "DressX", "role": "DressX, Founder & COO"}, {"name": "Reesa Lake", "org": "LTK", "role": "LTK, VP & Head of Creator Agency Partnerships"}], "moderator": [{"name": "Malique Morris", "org": "Puck", "role": "Puck"}]}}, "m4": {"id": "m4", "title": "Panel ③: The Influence Economy", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m4-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>Centralized influence has collapsed<\/strong>: taste-gatekeeping has decentralized from big fashion institutions (department stores, magazines) to curators/tastemakers with their own platforms — and brands still haven't fully adapted.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\"><strong>What to buy is not follower count but \"trust density\"<\/strong>: accounts with 10–50K followers — even private accounts — can out-convert million-follower influencers; <strong>creator size correlates far less with selling power than assumed<\/strong>.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Affiliate has become infrastructure<\/strong>: for creators, an organic monetization on-ramp (no camera, no \"beautiful content\" required); for brands, the hard-data pipeline that turns creators from a test channel into a core marketing channel.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>AI boosts productivity, but the \"taste layer\" must stay human<\/strong> — a rare three-platform consensus.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\">Organizationally: <strong>influencer teams and performance-marketing teams must merge their thinking<\/strong> — creators are now both the top and the bottom of the funnel.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m4-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m4-h3\">4.1 Framing<\/h3>\n<ul>\n<li>Moderator (start of recording): \"Each platform's shift toward on-platform shopping lends itself to very different programs and outcomes than the sponsored posts of the past. <strong>Brands are looking to spend smarter — working with influencers who drive conversions, not just awareness.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m4-h4\">4.2 Q1: \"What shift in creator-brand relationships are brands still underestimating?\"<\/h3>\n<ul>\n<li><strong>Snap (Mandy)<\/strong>: <strong>the proliferation of content<\/strong> — AI and editing tools have exploded content volume; \"it's going to get harder and harder for brands to stand out.\" Snap's answer: focus on the <strong>one-to-one relationship between creators and consumers<\/strong> — its native form.<\/li>\n<li><strong>ShopMy (Anisha)<\/strong> (one of the session's defining arguments):<ul>\n<li>\"A lot of brands are still working through <strong>the collapse of centralized influence<\/strong> and what it means for how they grow.\"<\/li>\n<li>Then: tastemakers lived inside big fashion institutions — buyers for department stores, deciders of what was in <em>Vogue<\/em>, <strong>monopolists of taste<\/strong>.<\/li>\n<li>Now: <strong>gatekeeping has decentralized<\/strong> to curators and tastemakers with their own platforms.<\/li>\n<li>The homework: use <strong>data<\/strong> to find these dispersed tastemakers — who converts, who sells — and organize them as a <strong>\"distributed sales force.\"<\/strong><\/li>\n<li>The line: \"Many brands still see creators as top-of-funnel awareness; with conversion data, <strong>you can look at creators as the modern-day retail.<\/strong>\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>TikTok (Julie)<\/strong>:<ul>\n<li>\"<strong>The gates are virtually gone<\/strong> — we're all creators in our own right.\" TikTok Shop accelerated this.<\/li>\n<li>Brands still struggle: \"creators used to be essentially <strong>moving billboards<\/strong>, because we were so used to being marketed <em>to<\/em>.\"<\/li>\n<li><strong>Winning brands treat creators as merchandisers, strategic partners, almost a sales force<\/strong> — not ad slots.<\/li>\n<li>Notably: <strong>the best-selling content on TikTok Shop is often <em>not<\/em> typical TikTok-style video<\/strong> — \"which is kind of crazy when you think about it.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m4-h5\">4.3 ShopMy: affiliate democratization and the truth about \"brand control\"<\/h3>\n<ul>\n<li>Question: \"When almost anyone can create affiliate links, how do brands manage control?\"<\/li>\n<li>Answer:<ul>\n<li>\"What democratization has really done is <strong>create more data<\/strong> — affiliate is such a measurable channel that brands can look at sales and conversion data and decide <strong>where to amplify<\/strong>.\"<\/li>\n<li><strong>Bursting the control illusion<\/strong>: \"Traditional partnerships make brands <em>feel<\/em> in control — but actually you're <strong>placing bets on a handful of creators with limited visibility into performance<\/strong>. Affiliate gives brands transparency rooted in hard data and real sales: who to double down on, who to engage.\"<\/li>\n<li><strong>The long tail and the dark network<\/strong>: \"In our data, creators from the smallest followings to the largest — <strong>even private accounts<\/strong> — convert, because tastemakers' audiences buy the things they link.\"<\/li>\n<li>Consumers got savvy: \"<strong>People trust people more than they trust campaigns.<\/strong> For brands it's less about controlling the conversation and more about <strong>earning your place in it through authentic creator advocacy<\/strong>.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m4-h6\">4.4 ShopMy: which creators deserve the budget?<\/h3>\n<ul>\n<li>\"Shopper data keeps confirming: <strong>the real metric is trust density, not follower count<\/strong>. Brands pay a lot for millions of followers; but someone with 10,000 or 50,000 followers <strong>whose audience buys every single thing they talk about<\/strong> is a different asset entirely — this is the <strong>trust economy<\/strong> we're moving into.\"<\/li>\n<li>Operationally: \"Let the data steer budgets — see where your product resonates, amplify those pockets. <strong>The correlation between creator size and the ability to move product is not as predictable as you'd think.<\/strong> Keep going back to the source of sales and allocate there. We're seeing brands lean into affiliate as a true ROI channel they put real money behind.\"<\/li>\n<\/ul>\n<h3 id=\"m4-h7\">4.5 ShopMy: why affiliate captured both sides<\/h3>\n<ul>\n<li>Creator side (redefining \"creator\"):<ul>\n<li>\"We think of creators less as creators and more as <strong>curators or tastemakers<\/strong>.\"<\/li>\n<li>The legacy assumption: being a creator meant showing your face on camera, making beautiful, entertainment-grade content, day-in-the-life videos.<\/li>\n<li>Now: <strong>platforms like Substack let anyone simply talk about what they love<\/strong> — many start for fun, as a hobby; affiliate lets them <strong>monetize organically<\/strong> — \"instead of posting a link, post an affiliate link; make a little money without negotiating brand partnerships or making it a livelihood.\" That's why participation exploded. (Matches note \"go to brand, creator earns commission.\")<\/li>\n<\/ul>\n<\/li>\n<li>Brand side: \"Affiliate's measurability turns creators from a <strong>test channel into a real core marketing channel<\/strong> — speaking in the data terms brands want to hear.\"<\/li>\n<\/ul>\n<h3 id=\"m4-h8\">4.6 Snap: community × content × commerce<\/h3>\n<ul>\n<li>\"The best creator programs are great at three things: <strong>community, content, and commerce<\/strong>.\"<\/li>\n<li><strong>Creator behavior is unique on Snap: 50–100 snaps a day<\/strong> — \"they let you into their lives; it feels IRL; they feel like friends.\"<\/li>\n<li>Content: <strong>AR Lenses as an unbelievable creative canvas<\/strong> for consumers and creators.<\/li>\n<li>Commerce: closing the loop with measurement (MMM) and commerce links — \"Shopify, hopefully soon.\"<\/li>\n<\/ul>\n<h3 id=\"m4-h9\">4.7 Snap: the Inner Circle — best friends are the strongest shopping influence<\/h3>\n<ul>\n<li>The data (moderator cited, Snap confirmed): <strong>70% of Snap's audience comes to the platform to connect with their best friends; 91% of that audience says they trust their best friends for purchase recommendations.<\/strong><\/li>\n<li>\"We talk about the <strong>inner circle<\/strong> as the superpower of Snapchat. Creators also interact with consumers as friends — high-frequency posting, intimate dialogue. Brands can tap into that in a way that's very different from broadcast platforms.\"<\/li>\n<li>Productization: <strong>SnapStar Collab Studio launched in 2024<\/strong> to connect brands and creators directly; building tools so brands can <strong>buy the creators they want to target, understand creator metrics, and get transparency<\/strong> — \"ideally, tapping the right maker communities for each campaign.\"<\/li>\n<\/ul>\n<h3 id=\"m4-h10\">4.8 AI's role and its limits (all three platforms)<\/h3>\n<ul>\n<li><strong>TikTok (Julie)<\/strong>: \"AI can do amazing things and we use it every day — content, outreach, turning data into action points. But one thing I believe — call me a mistake-maker — is that <strong>AI will never (okay, 'may never') do the human side<\/strong>. Trust means: I know you, I love your style, I know your background. In a technology-driven world, <strong>the human part becomes even more important<\/strong> — everything else gets standardized by technology.\"<\/li>\n<li><strong>ShopMy (Anisha)<\/strong>: \"Couldn't agree more. AI brings productivity and scalability; but our core thesis is that <strong>human recommendations are the most powerful tool in commerce<\/strong>. With ads taking over our algorithms there's so much noise around shopping — I've been there: 'I'm just going to text my group chat for their favorite pair of jeans.' Creators are the trusted sources grounded in human experience. AI will make that <strong>more available at the point of need, more personalized, faster<\/strong> — but <strong>the taste layer stays grounded in human taste, having the final say<\/strong>.\"<\/li>\n<li><strong>Snap (Mandy)<\/strong>: \"Snapchat is about human connection — the map, the chat. <strong>Human first<\/strong>, with AI for productivity. <strong>Trust is at the center.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m4-h11\">4.9 Conversation-driving creators vs. awareness-driving creators<\/h3>\n<ul>\n<li><strong>TikTok<\/strong>: \"There is a difference, but <strong>it's not one-size-fits-all<\/strong> — the same creator works differently for different brands. Test and error, and be willing to admit when you're wrong. Brands default to 'go with the big creators — we know who they are'; but increasingly, brands will choose <strong>four tastemakers with 20K loyal followers each over one big name<\/strong>. Different creators at different points in time serve different purposes. Build your <strong>creator pyramid<\/strong> — the one who drives awareness for me may drive conversions for you. Read all the signals; don't just run a playbook.\"<\/li>\n<li><strong>ShopMy<\/strong>: \"Echoing Julie — it depends on the brand's lifecycle, growth strategy, and targeting. What ShopMy provides is transparency: <strong>which creators are moving product in which verticals<\/strong>.\"<ul>\n<li><strong>The automated-gifting loop (case)<\/strong>: brands can gift product to <strong>20–50 creators at whatever scale they want<\/strong> (traditionally pure awareness, unmeasurable); ShopMy attaches <strong>an affiliate link to the gift<\/strong> — the creator receives a sweater, loves it, posts it to their story with the link — and <strong>for the first time the brand can measure the sales the gifting drove<\/strong>. \"Use the tools to figure out which verticals and archetypes of creators work for you.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Snap (the framework of the session)<\/strong>:<ul>\n<li><strong>Creator 1.0<\/strong>: all about massive scale (the Mr. Beast model); we lacked measurement tools, so we used metrics like <strong>EMV (earned media value), \"which told us nothing about business impact.\"<\/strong><\/li>\n<li><strong>Creator 2.0<\/strong>: with sophisticated measurement, <strong>what's driving sales is micro-influencers and the people we trust most<\/strong> — the ones sending us a snap trying on a piece of clothing. Finding creators is more efficient; measuring partnerships is far more sophisticated.<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m4-h12\">4.10 Closing: \"What does a successful influencer partnership look like two years from now?\" (includes the Pier 86.m4a tail segment)<\/h3>\n<ul>\n<li><strong>TikTok<\/strong>: \"Built around <strong>trust<\/strong>; brands working with creators as <strong>real long-term partners<\/strong> — not one big splashy campaign — with different strategies and market-value strategies per creator.\"<\/li>\n<li><strong>ShopMy<\/strong>: \"<strong>Authenticity across channels<\/strong> — you'll see someone talk about a brand on Instagram or TikTok or Snap, then write about it on a Substack, and there's a partnership — seeing them across channels reinforces authenticity. Brands should get ahead in two ways: (1) <strong>have the technology and tools to measure data and efforts<\/strong>; (2) <strong>evaluate how teams are set up<\/strong> — influencer teams sit here, performance teams sit there, not speaking nearly enough, while creators are now both top-of-funnel and bottom-of-funnel. <strong>Set teams up to capture that merger.<\/strong>\"<\/li>\n<li><strong>Snap<\/strong>: \"More authentic, faster, and far more <strong>sophisticated<\/strong>. As brands understand the space, they'll build <strong>longer-term partnerships that feel authentic<\/strong> — 'something everyone aspires to but we've gotten lost along the way at points.' One-to-one relationships on both the brand-creator and consumer-creator axes. Tooling improves on both the front end (identification/targeting) and back end (measurement); <strong>programmatic platforms are popping up enabling easy buying across the long tail of creators<\/strong>.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m4-h13\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>ShopMy was repeatedly mis-transcribed by speech recognition as \"Shanghai / ShopNite / Shama\" — all refer to ShopMy.<\/li>\n<li>\"People trust people more than campaigns\" and \"I'll just text my group chat about jeans\" were the session's two most quotable lines.<\/li>\n<li>Kalshi's Clarissa Bronfman speaks less in the recoverable audio (partly at recording breaks); her seat represents the culture-prediction-markets angle.<\/li>\n<li>Moderator framing: \"All of your platforms have revolutionized the ways brands interact with creators and their audiences.\"<\/li>\n<\/ul><\/section>", "sub": [{"id": "m4-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m4-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m4-h3", "t": "4.1 Framing", "lvl": 3}, {"id": "m4-h4", "t": "4.2 Q1: \"What shift in creator-brand relationships are brands still underestimating?\"", "lvl": 3}, {"id": "m4
