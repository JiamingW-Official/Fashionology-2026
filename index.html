s solving real store gaps (clienteling, fitting rooms, out-of-stock sizes), not \"a screen in the store.\" RTR redefines rental as a discovery tool + trust accelerator — customers try ~45 new brands a year; rental data knows \"what happened after she wore it,\" which DTC never knows."}, {"s": "m7", "a": "m7-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m7", "a": "m7-h3", "t": "7.1 Opening: \"Your best recent omnichannel experience?\" (Pier 86 6 segment)", "x": "7.1 Opening: \"Your best recent omnichannel experience?\" (Pier 86 6 segment) The Shopify hat story : \"Every time I travel I step into a store I've never shopped. Recently in Palm Springs, a fantastic independent business — I bought a hat, and as I went to insert my credit card the gentleman said: 'Thanks, Guy(?), great to see you' — that's the power of Shopify (Shop Pay recognition): I'm a first-time customer, but I was recognized . We started talking, and I made another purchase — it turned from a single transaction into a moment .\" Rent the Runway (Kaitlyn) : \"My answer is not a fashion answer, so maybe it's the wrong answer — Instacart . I use it multiple times a week and it's changed how I shop for groceries: it knows what I want, recommends what's popular in the store and what customers like me are buying; I have two kids who eat a lot, so I just repeat — and it shows up at my door. I know I'm paying more for those groceries, and honestly I don't care. \" (→ The benchmark omnichannel experience may come from outside fashion; \"it knows what I want\" beats everything.) Side note: Kaitlyn also co-leads RTR's inventory innovation cross-functional group — \"all things making inventory function better for our customers.\""}, {"s": "m7", "a": "m7-h4", "t": "7.2 Leap: pour the foundation first (Pier 86 7 main body)", "x": "7.2 Leap: pour the foundation first (Pier 86 7 main body) Context: Leap operates physical stores for brands (\"the retail platform for digitally native brands\"), running ~115 locations for ~50 brands . Historical frame: \"Twenty-plus years ago your only distribution channel was physical — your own stores or wholesale. Now there are 50 different places to sell your product — marketplaces, platforms, your own DTC, your own stores, wholesale… Creating one sustained, efficient, personalized commercial strategy across that is more difficult than most realize .\" Basic #1: bidirectional fulfillment. \"Buy on web, return in store; buy in store, return to web; buy online, curbside pickup — table stakes in today's world, but you'd be surprised how many retailers haven't mastered them .\" Basic #2: inventory visibility. \"People go out of their way for brands they love — at our LA stores, people drive almost two hours up from south of Newport Beach — and to walk in and find we don't have the item is brutal. It's not that the retailer doesn't want it there; they often just can't see their stock . Visibility across the warehouse and the store network = right product, right place, right time, right person. Table stakes — and genuinely hard.\" The math of scale : \"With one store you can master it. Add five, ten, fifteen stores — the complexity isn't additive, it's exponential . So: don't get so fancy. Don't do all the cute things out of the gate. Be mindful of your dollars and master the basics — do that and your customers will love you. \" The cross-brand data network : \"We're just now tackling personalization. With a Shop Pay-style unique identifier, we see how the same customer shops not just at Frankie's Bikinis but across the network of brands — 'this individual has a propensity for outerwear, basics, and footwear' — and then you can service her with surprise and delight she'd never otherwise get.\""}, {"s": "m7", "a": "m7-h5", "t": "7.3 Leap: the store as an underrated innovation engine", "x": "7.3 Leap: the store as an underrated innovation engine \"Physical retail is suddenly back in vogue — if COVID taught us anything, it's that we're humans, we're social creatures, we want to do this together .\" The store's unique value: product innovation. \"A customer tries something on and tells you to your face: 'the fabrication isn't right — here's why; maybe my skin is sensitive to it.' You'd never know that from wholesale distribution or DTC online (at best a customer-service email). Or: 'I love you so much — please use this fabrication for a full winter line.' That qualitative feedback from sales associates and store leaders drives the innovation pipeline inside these brands. It is not to be overlooked. \" The flagship case: Frankie's Bikinis. \"When they first worked with us (the first store on Mercer), they were ~95% swim ; today we power 10 stores for them across the US and they're about 55% ready-to-wear / 45% swim — and they'd never have known had they not leaned in and listened to the shopper over and over.\" Who needs physical most? \"Mission critical for $200+ AUR and premium/luxury categories — otherwise what's the delta between you and the comparable product? The touch, feel, test-drive experience is part of the delta. Also things that are cool and rare.\""}, {"s": "m7", "a": "m7-h6", "t": "7.4 Shopify: the architecture thesis and the death of the funnel", "x": "7.4 Shopify: the architecture thesis and the death of the funnel The positioning line : \" Omnichannel is not just a marketing strategy — it's part of the architecture of how brands go to market. The brands I deal with today built their businesses this way. Ten years ago traditional retailers were asking 'do we even need to invest in e-commerce?' and digitally native brands were saying 'maybe pop-ups are the best use of my time.' Today it is impossible to scale and get that reach without an omnichannel strategy. \" Three focal points : Recognizing your customer across sales channels ; Inventory — \"do you have it, and if not, how quickly can I get it?\"; Brand experience — \"are you replicating the quality of your brand across e-commerce, pop-ups, socials, and brick-and-mortar? That has to be priority one.\" Sales vs. awareness : \" We try to separate sales and awareness too much — they are wildly interconnected. If you're doing awareness well, the intersection is conversion. The best brands do that all the way through.\" The funnel is dead (Leap jumping in) : \" The funnel as we knew it — take it, throw it out. Discovery and consideration happen so much earlier in the process. So which channel is actually your conversion channel? It's all of them. \" Data discipline (Shopify continuing) : \"Collect the contact data; think about account priority, loyalty, post-purchase sales. Understand your data and your data integrity. And: you don't need a sales channel for everything — being everywhere is exactly where the tech-debt traps come from. Simplify the basics so that every new channel meets the same customer brain — they interact with your brand in the same way in a new channel.\""}, {"s": "m7", "a": "m7-h7", "t": "7.5 Shopify: the channel curriculum for emerging brands", "x": "7.5 Shopify: the channel curriculum for emerging brands The vantage point: \"Shopify sees businesses from their first dollar to their billionth dollar — not many platforms see what a first-time sale looks like.\" The advice: \" Map your customer journey from day one and keep it simple : first transaction → next transaction → lifetime customer. An event launch can't be anonymous : a QR code → waitlist or account creation → personalized follow-up; You land the product-launch sale? Amazing — immediately shift the mindset to turning them into a repeat buyer ; Where conversion falls flat is usually not channel count — 'if you have the demand and you're losing conversion, it's because we're not caring enough about the customer.' \""}, {"s": "m7", "a": "m7-h8", "t": "7.6 SpreeAI: the right way to deploy virtual try-on", "x": "7.6 SpreeAI: the right way to deploy virtual try-on The anti-pattern first: \"When I talk to brands, generation one is 'how do I get a screen in my store so people walk past and it puts clothes on them?' Okay — but remember: your store makes money by maximizing every dollar per square foot. Why would I take out SKUs I can sell and put in a screen? \" The method: \"Ask: what gaps do my stores have right now, and how is VTO a tool to solve them? \" Three scenarios: Luxury clienteling : \"Sales associates are the front-line army; they have the client's number. Imagine: 'Diana, you're a VIP at Alexander McQueen — you spend a million dollars a year here. Here's the newest collection fresh off fashion week — on you. I know you have that big fundraiser up in Toronto — here's an outfit built from the jacket you bought a couple of years ago plus this runway piece nobody's had yet. I can ship it to you — or come in, we'll grab a glass of champagne and do it.' The VIP treatment digitally amplified, not replaced.\" Fast-fashion fitting rooms : \"Anyone here who's shopped Zara — the dressing rooms, hate me (laughter): terrible lighting, long lines, disarray. What if, on my phone, I do a quick try-on and take 3 of these 13 items into that little cube instead — and just check out?\" Out-of-stock sizes : \"You love it, they don't have your size. Virtual try-on confirms the look and the size — perfect, ship it to my house. A sale that would have walked.\" The agentic-commerce foundation argument (important) : \"Back in January at NRF , everybody was talking agentic commerce — 'oh my gosh, autonomous agents running around with my credit card.' Maybe. But realize: how will those agents find the products your brand wants to sell? 'I've got a wedding, I'm looking for a dress, these are my favorite brands' — the agent can only find that if your back-end data is clean. Fill out every single data field — not just for today, but for six months out. \" Higher-order uses of VTO data : \"Data is everything — we're all playing with ChatGPT, or my favorite, Claude — and your product is only as good as the data you put into it. With VTO data flowing back to the brand: High try-on, low conversion = maybe a fit issue — direct feedback to product development; Official styling vs. how consumers actually style it — marketing intelligence; Plus better recommendations, retargeting, hyper-personalized experiences. If done right. \""}, {"s": "m7", "a": "m7-h9", "t": "7.7 Rent the Runway: rental = trust accelerator", "x": "7.7 Rent the Runway: rental = trust accelerator The redefinition (\"I'm going to blow all your minds\"): \" Rental is a discovery tool and a trust accelerator. Getting a customer to physically purchase something is expensive — for the customer, for the brand, for the store. Rental removes that friction: it's not scary; she's just going to try it. \" The number : \"At Rent the Runway, customers try around 45 new brands a year — and she forms a lasting impression and memory of what that brand is, which turns her into a customer of the brand.\" To the brands: \" Brands need to not be scared of rental — it's not going to cannibalize your business. Our most successful brand partners changed their thinking and use us as a data source : A highly engaged community leaving thousands and thousands of reviews , all shared with brands; DTC knows 'she bought it'; rental knows her actual experience with it — did she wear it? did she like the fit? is she re-renting? does she want to keep it longer? is she setting stock notifications? One caveat: consistency of fit and quality is extremely important in rental — one bad fit experience and you may lose her.\""}, {"s": "m7", "a": "m7-h10", "t": "7.8 Closing: \"One thing a brand could do tomorrow, without a massive technology investment, to meaningfully improve omnichannel\"", "x": "7.8 Closing: \"One thing a brand could do tomorrow, without a massive technology investment, to meaningfully improve omnichannel\" Leap (Amish Tolia — the most energizing answer of the session) : \"The world is changing so fast — these AI companies are evolving every single day. Running retail, running DTC, building a brand is hard — buying inventory, predicting 3/6/12 months forward, taking the capital risk — at any scale. The real problem: a concentration of resistance inside the workplace to adopting these AI tools . What Leap did: an internal agentic AI hackathon — organized by the company's 'AI czar' (one of our lead AI software engineers) — pulling department heads and function leaders into a multi-day workshop. 'It was unbelievable what was built' : workflows that historically took dozens and dozens of hours automated; replenishment models improved; marketing personalization improved; productivity up. The directive: 'Lean in. Don't outsource it. Don't delegate it. Learn these tools for yourselves.' On Saturday and Sunday I'm literally at home (with Claude/AI tools) — my wife asks what I'm doing… Anyway: lean in, take risks, learn the tools yourself, and apply them to your business — it will improve your operation and drive a better omnichannel across online, stores, everything.\" Shopify (Diana) : \" Understand and map your customer journey and identify where the debt is — make sure you can convert at every opportunity you present; customers expect to be recognized at the point of entry .\" RTR (Kaitlyn) : \" Listen to your customer. Don't just look at the return rate — look at the comments: why is she returning it? You can use AI to scale and summarize all those data points; but to build your brand you must understand the friction points: what's making her really happy (do more of that), and why isn't she converting (fix it).\" SpreeAI (Chelsea) : \" Be open-minded. Everybody is at the same starting point trying to figure out AI — nobody really has it figured out. You don't have to co-work on weekends like my friend here (I admire you) — but take a step forward: try, don't be scared; get out there, test it, fail, fail again . Gone are the days of making decisions by looking in the rear-view mirror — history helps, but on AI we're all starting at the same point . Take risks, stay flexible, do new things, get uncomfortable — that's where the growth is.\""}, {"s": "m7", "a": "m7-h11", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] \"The KISS principle — keep it simple, insert the last word\" — SpreeAI quoting her dad, to knowing laughter. SpreeAI's \" or my favorite, Claude \" — a rare on-stage LLM preference. The RTR \"can you say that again?\" beat — the honest rhythm of a live panel. Leap's \"surprise and delight\" — a retail classic reborn in a data context."}, {"s": "m8", "a": "m8-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] The industry's original sin, in numbers : 150 billion garments made per year, ~30% never sell ; at least $1.5 trillion wasted annually ; the sewing machine hasn't fundamentally changed since ~1830. Four technology paths attacking one problem: CLO (3D digital sampling), Kornit (on-demand printing), TomTex (bio-based materials), Unspun (3D weaving direct-to-garment) — all converging on demand-driven, 1:1 supply-demand, MOQ=1. \"Sell, then make\" vs. \"make, then sell\" : Kornit's Netflix-vs-Blockbuster analogy was the sharpest frame of the session; its biggest customer, Merch by Amazon, already proves it. The sustainability narrative has matured : the green premium is dead (price/performance parity required); the new selling points are decoupling from oil prices/tariffs + health (microplastics against your skin) . \"Stop calling it vegan.\" The biggest obstacle is organizational inertia : \"All this incredible front-end tech — and as soon as it passes product development into buying, sourcing, and merchandising, it's back to first cost and IMU, and everything crumbles.\""}, {"s": "m8", "a": "m8-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m8", "a": "m8-h3", "t": "8.1 The moderator's confession of a designer (Simplifyber)", "x": "8.1 The moderator's confession of a designer (Simplifyber) Background: \"I was a fashion designer for 24 years — collections for Vera Wang, Calvin Klein, and Alexander McQueen ; I also worked in sustainable design — worked for Bono for a while (i.e., Edun), starting sustainable-material collections made in Africa.\" The founding motivation (cutting): \"As a sustainable designer I wasn't happy with my level of impact — I realized the problem wasn't all design; we needed better tools : the tools we have are old-fashioned, full of hand labor — and that's exactly why so much polyester and plastic gets used .\" The Simplifyber technology: \"I invented a process to mold natural plant fibers into 3D shapes in one step — you start with fibers in a liquid bath, and in about 100 seconds you get shaped panels (showing one). It's designed to bring down the cost and complexity of working with natural materials and create possibilities that weren't there before.\" The session's frame: \"Every company on this panel makes new tools for designers — new paths, new design possibilities.\""}, {"s": "m8", "a": "m8-h4", "t": "8.2 Unspun (Beth Esponnette): 3D weaving, skipping the sewing", "x": "8.2 Unspun (Beth Esponnette): 3D weaving, skipping the sewing The problem statement: \"We looked at the supply chain and asked: why is it so broken? Why do we make so much stuff before people want it? This industry makes 150 billion garments a year — and some say 30% of those never get sold . That 30% is automatically waste — and a lot of what does sell becomes waste too. It's a not-very-thoughtful way of doing things.\" Reducing it to one machine: \"It comes down to, unfortunately, the sewing machine . It's beautiful — I love sewing — but it's extremely manual : you sit and run fabric through it with your hands; it takes a lot of time. To hit a good price you ship it overseas and crank volumes for economies of scale — and that's how you get the mountain of stuff nobody needs .\" The historical irony: \" The sewing machine was invented around 1830 — almost 200 years ago — and there's a lot of new technology available now.\" The approach: \"We created 3D weaving — inspired by 3D printing and by nature's additive processes: weave the final garment directly and skip the sewing process .\" The live demo: \"I'm wearing a pair of our pants (stands up — 'no one has stood up today, so I will'). They look very basic — and I'm kind of proud now that nobody asks about them : I used to wear our prototypes around and get stares, sometimes good ones. Now our products just fit in.\" The moderator on the seamlessness: \"Really impressive.\""}, {"s": "m8", "a": "m8-h5", "t": "8.3 TomTex (Ross McBee): replacing petrochemical plastics", "x": "8.3 TomTex (Ross McBee): replacing petrochemical plastics The company: \"We're fundamentally interested in replacing petrochemically derived plastics — starting in textiles: leather-like, suede-like materials.\" The worldview (\"a paired nightmare and promise\"): \"The nightmare: even if the energy sector gets fixed, the planet drowns in plastic — a whole lot of oil goes into materials, and we haven't solved the fundamental addiction. In many ways it's a harder problem than energy. The promise: nature is full of materials as performant as — or more than — anything humans make . The classic example: spider silk is roughly twice the specific strength of aircraft-grade aluminum, and it's made of sugar and water . Our challenge: figure out how to make that, bring it into circulation, and make it cheap enough that people can buy it .\""}, {"s": "m8", "a": "m8-h6", "t": "8.4 Kornit Digital (Scott Walton): sell first, then make", "x": "8.4 Kornit Digital (Scott Walton): sell first, then make The company: \"We're a textile-technology manufacturer, but our DNA is the factory . Our equipment uses water-based, fully biodegradable inks in the print-on-demand industry.\" The commercial proof: \" Our biggest customer is Merch by Amazon — you sell the product, then you make it , versus producing it and trying to sell it.\" The role: \"I run our on-demand strategy — working with brands, creators, and platforms to move that enormous, wasteful forecast-driven operation (with at least 30–40% overproduction) toward responsible, sustainable models that react to demand instead of forecasting it .\""}, {"s": "m8", "a": "m8-h7", "t": "8.5 CLO (Courtney Agnes): 3D digital sampling", "x": "8.5 CLO (Courtney Agnes): 3D digital sampling The path: \"I came to CLO about seven years ago, after seven years in the industry in design and project management.\" The product: \"CLO's 3D design software has helped the industry move away from physical sample development into digital — reducing samples, cost, and time; and most importantly to me, empowering designers, technical designers, and pattern makers to create product and bring their vision to life. I work with enterprise clients — major brands and retailers across the States — to find their biggest pain points and solve them through digitized process creation.\""}, {"s": "m8", "a": "m8-h8", "t": "8.6 Lightning round: \"If I'm a designer using your tool, how does it help me make better product?\"", "x": "8.6 Lightning round: \"If I'm a designer using your tool, how does it help me make better product?\" CLO : \"I remember being a designer: standing in front of a room full of people holding a best-seller, an updated sketch, a swatch, a print — wasting 20 minutes asking everyone to imagine the vision . You no longer have to. With CLO you create all of it digitally to your heart's content — no constraints of time or sample cost . CLO empowers designers and technical designers to make better decisions for their products .\" Kornit : \"We bring the physical upfront into ideation: sample and strike off in real time, in minutes, on any fabric — instead of sending it around the world and having it come back not quite right. From ideation to physical product that can scale — that's where on-demand technology comes into its own.\" TomTex : \"On the materials side, our goal is to be a drop-in for the things you already love using . Everyone knows the problem of the 'crunchy alternative thing you don't actually want to use.' Our goal is performance, beauty, and compatibility with all the processes you're used to — with radical sustainability underneath.\" Unspun : \"The physical world is what actually gets made and consumed at the end of the day. With all the generation happening on the AI side, the question is: how do you take that one-off product to an MOQ of one? It requires production that easily and seamlessly interacts with an AI — that's what we're building.\""}, {"s": "m8", "a": "m8-h9", "t": "8.7 \"What was harder than expected about adoption?\" (CLO's transformation playbook)", "x": "8.7 \"What was harder than expected about adoption?\" (CLO's transformation playbook) \"A few years back we realized companies use 3D either project-based (one strong user on one team) or as total business transformation — and our onboarding was built for the project-based case: feature-focused training, crammed into a short window because clients were in a hurry.\" \" About three years ago we moved from training to features to training to workflows — you can know every feature in the software, but if it doesn't connect to your day-to-day work, it's worth nothing . Clients commit enormous resources, time, and money to adopt this way of working; we have to pull through for them.\" \"It's really people-and-process change , not just software — know the people, know what matters in their business, then take the steps accordingly.\""}, {"s": "m8", "a": "m8-h10", "t": "8.8 Product-market fit is not a binary event (Unspun's trust-chain long march)", "x": "8.8 Product-market fit is not a binary event (Unspun's trust-chain long march) The question (one of the day's best): \"Founders talk about PMF as a binary event; for manufacturing companies it doesn't work that way. What did you think your market was when you started — and how did that change? \" Unspun's story (textbook): The intent: change the supply chain → so the customer should be manufacturers . Reality: the industry is \"in some ways so efficient — every piece totally optimized — that getting your foot in the door is really tricky .\" Manufacturers: \"Who are you, and why would we trust you?\" Step back to brands : \"Who are you, and why would we trust you? Who's your customer?\" Step back again to consumers — \"we backed up as far as we could: let's start our own brand and prove it ourselves.\" Execution: \"We were in Hong Kong and Shenzhen working on our hardware (we're fundamentally a hardware company), doing pop-ups all over Hong Kong — we even rented a truck and got people to come buy product under a truck .\" The break: \"That was enough to get H&amp;M in the door — their employees tried it, found it interesting, brought it in-house, then we did pop-ups with them ; and with that we could finally go to manufacturers: ' look — they trusted us. '\" The lesson: \" Find the balance between partnering with the people who can do it — and, when they're not up for it, proving it by doing it yourself. Sometimes trust has to be manufactured too.\""}, {"s": "m8", "a": "m8-h11", "t": "8.9 Who do you sell to, and who are the gatekeepers? (TomTex's triangle)", "x": "8.9 Who do you sell to, and who are the gatekeepers? (TomTex's triangle) The counterintuitive realization: \"It took us a while to totally internalize that brands are not the ones that make things — brands very often don't even know what material goes into what they're making. The factory is the entity transacting for materials all the time. \" The bind: brands say \"so cool, but I don't know you and I don't believe you can make this at scale\"; factories say \"who are you?\" The triangle: \"Our customer is effectively both the brand and the manufacturer : We engineered the technology to be directly plug-and-play with conventional synthetic-leather production — same coating lines, same processes — with our special sauce and radical sustainability; To the factory: ' I'm bringing a brand you already work with; this material isn't expensive; it runs on your existing lines; you can sell it on to other people too. You're great at making things; we add the chemistry and the storytelling'; Add value to every edge of the triangle. \" The grounding note: \"You end up on the factory floor a lot — good. You cannot make sustainable change at real impact unless you put it in the hands of the people who already make this stuff at megaton, gigaton scales. A bit of a catch-22 at first, but we're definitely out of it now.\""}, {"s": "m8", "a": "m8-h12", "t": "8.10 The Walmart catch-22 (Unspun, continued)", "x": "8.10 The Walmart catch-22 (Unspun, continued) \"Our first machines are shipping overseas — that side is taken care of; the hard part is onshore: getting production going in the US .\" The classic deadlock: \"One great open brand partner is Walmart — they said: 'We're ready to sign a PO; the product's approved; now we just need your factory .' The factories say: 'Cool — we're ready to get the machines in; first we just need a PO .'\" The fix (laughing): \" Get everyone in a room and have them all shake hands at the same time — that's basically what we've been doing: lots of three-way conversations. It's going really well, but it is a funny situation to be in.\""}, {"s": "m8", "a": "m8-h13", "t": "8.11 The ticking runway clock: surviving sales cycles measured in years", "x": "8.11 The ticking runway clock: surviving sales cycles measured in years The question: \"Manufacturing innovation sales cycles run months or years; you're up against funding timelines and rivals. How do you build a company while waiting for the industry to catch up? \" CLO (a public company's serenity, but the method travels): \"We've always been user-driven from the top down. From a strictly sales point of view: 'the money will come when it's ready.' Even in a sales role, my goal is never to get a sale — my goal is to help people . Brands often say 'we want CLO now, roll it out' — and we're the ones pumping the brakes : 'Hang on — do you actually have the resources? A stance on how this should be used? Are your people internally excited and ready?' If the teams don't understand the purpose and the benefit, it will never get traction . Keep 'help people' ahead of 'sell,' and everything falls into place.\" CLO addendum (supply-chain view): \"Don't focus solely on the brands and retailers — serve their entire supply chain and overseas manufacturers directly ; that's where true business transformation and the real ROI happen.\" Kornit : \"We call it the culture clash : a massive disconnect between spikes in trend demand and the ability to execute . All the incredible technology you see here is front-end enablement — if you can't deliver the product from an execution perspective, it doesn't matter . As the manufacturing layer, execution is the whole job.\""}, {"s": "m8", "a": "m8-h14", "t": "8.12 How the sustainability conversation matured (TomTex lead)", "x": "8.12 How the sustainability conversation matured (TomTex lead) The question: \"Sustainability used to be a moral conversation; today customers expect performance and cost parity, plus scalability and supply-chain resilience , alongside environmental benefits. What changed?\" The answer in three layers: The green premium is dead : \"You have to be at the same price; you have to scale; you have to be the thing they think they're buying — not some weird exception to all the rules .\" Decoupling from oil and tariffs is the new pitch (tied to the news): \"In the context of whatever the heck happened in the last 48 hours (tariffs) — we're not petrochemical-based, so our pricing is largely decoupled from the price of oil — which is very much not true of the PU and PVC that go into 'vegan leather.'\" The health narrative is rising : \"More and more people understand microplastics — not just planetary health, but the fact that these materials touch our bodies, often very intimately . Materials should be good for the planet and good for you. And by the way — if you measured the (formaldehyde?) levels in the average piece of leather in circulation, you'd be pretty shocked. Presenting value in terms of health and safety, not just carbon, is the new lever.\" The moderator's industry-history addendum: \"I started in sustainability in 2006 — back then nobody even used the word; they called it 'eco,' and nobody could define it. It's still muddy — so many metrics; even the LCA systems and the Paris frameworks don't match each other . But it's gotten a lot better: consumers actually know a lot of this now ; the wording may shift in certain political climates, but people inherently know a lot of this doesn't make sense for their personal lives. And the answer to all of it is what people keep demanding: transparency .\""}, {"s": "m8", "a": "m8-h15", "t": "8.13 \"What do customers ask today that they didn't five years ago?\" (Kornit lead)", "x": "8.13 \"What do customers ask today that they didn't five years ago?\" (Kornit lead) \"Sustainability is at the top of the agenda — but customers keep trying to decouple sustainability from profitability, and in my opinion they're inseparable: the worst thing you can do for the planet is to make something that never gets sold. That's the first thing. \" \"We've sat in many C-suites where 'sustainability' immediately becomes 'how much will that cost me?' Reverse it: there is at least $1.5 trillion simply wasted every single year. From a capital-markets perspective, moving away from the forecast system toward demand-driven data insights and technology is the most impactful thing — and the easiest place to start. \" Tooling: \"There are technologies (e.g., Cirotech(?)) using AI for planning and merchandising — post-manufacturing, in-market, they optimize where product needs to be : if it's not selling in the Pacific, don't shuffle inventory there; it's moving in New York, route it to New York. Plug demand signals into the back end so we're not mass-manufacturing into the void — and the reaction window isn't even 'in season' anymore; it's minutes. \""}, {"s": "m8", "a": "m8-h16", "t": "8.14 The final question: \"It's 2035 — what looks completely outdated about how we design and manufacture today?\"", "x": "8.14 The final question: \"It's 2035 — what looks completely outdated about how we design and manufacture today?\" Unspun : \"We keep increasing how much we make and increasing our lead times — the more you make, the longer the lead time, and the further from demand you get . Brands having to guess — with AI, that just doesn't make any sense. AI is changing the front end; the next step is the back end: make the products we want, when we need them, with perfect 1:1 supply and demand — and customize to someone's body shape — not even size, shape . An MOQ of one is very possible : you no longer need hundreds of thousands of units to hit economies of scale — every product different costs the same as cookie-cutter. In ten years we'll look back and say: ' wait — we were just making so much crap, for no reason? ' The future: more SKUs, less waste. \" TomTex (a volley of lines): \" Stop calling it vegan. Be honest.\" (Moderator: \" Be compostable! \") \"It's the biggest rebrand in the wrong direction I've ever heard of — it's plastic.\" \" Netflix versus Blockbuster : why on earth would you want to predict which videotapes people want? Flip it to on-demand — run this business with that model.\" (The org critique): \"Brands see all this amazing front-end technology; but as soon as it passes product development into buying, sourcing, and merchandising, the conversation goes back to first cost and IMU — and everything crumbles. It's organizational inertia. That's the problem. \" CLO : \" More automation and interoperability — connecting the dots across platforms, reducing the one-dimensional manual activities — traditional tech is really falling down there.\" The moderator's close: \"This has been a lot of fun. You are all incredibly functional (laughter). The next panel — Retail Investment Thesis — will begin shortly.\""}, {"s": "m8", "a": "m8-h17", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] Unspun's pants demo: \"No one has stood up today, so I will.\" TomTex's performance bar: \"Spider silk = sugar + water ≈ twice the specific strength of aircraft aluminum — nature already won; we're catching up.\" Kornit's \"The worst thing you can do for the planet is to make something that never gets sold\" — the most quotable sustainability line of the day. The recurring antithesis: \"AI is exploding the front end (creation) while the back end (physical execution) lags\" — all four companies consciously position themselves on the back end."}, {"s": "m9", "a": "", "t": "", "x": "Method: only judgments independently corroborated by at least two panels are included; each comes with its evidence chain and a \"So What.\""}, {"s": "m9", "a": "m9-h1", "t": "Trend 1: Agentic commerce moves from concept to infrastructure race", "x": "Trend 1: Agentic commerce moves from concept to infrastructure race Confidence: High | Window: 1–3 years Evidence chain : McKinsey's $5T/5–10-year model (①) → GAP rebuilding an AI-first data stack + betting on UCP, \"first large fashion retailer to put a stake down\" (②) → eBay shipping on-platform agentic search (②) → \"everyone at NRF talking agents\" + \"agents can only find products with clean back-end data\" (⑦ SpreeAI/Shopify) → Daydream's calendar-reading agent-stylist endgame (⑥) → fast fashion using agentic models to decide what gets produced (① McKinsey). So What : a protocol war (UCP vs. others) is underway; early movers shape the rules. The no-regret move for every brand: get product data agent-ready — the cheapest, highest-certainty investment of 2026. \"Fill out every field — for six months from now.\""}, {"s": "m9", "a": "m9-h2", "t": "Trend 2: Trust becomes the only defensible traffic asset", "x": "Trend 2: Trust becomes the only defensible traffic asset Confidence: High Evidence chain : trust density &gt; follower count; private accounts convert (③ ShopMy) → Snap's 70%/91% friend-trust data (③) → LTK banning AI influencers, AI on creator data only, 70% of sales in-app (②) → eBay tying Authenticity Guarantee + Money Back to live, unlocking high tickets (②) → Quince's \"quality is trust; price is the output\" (⑥) → three platforms agreeing AI does productivity while the taste layer stays human (③). So What : the AI content flood raises the premium on human trust. Shift budget from \"buying reach\" to \"buying verifiable conversion at trust nodes\"; merge influencer and performance teams (③'s explicit advice)."}, {"s": "m9", "a": "m9-h3", "t": "Trend 3: Intent data is the new starting point of the supply chain", "x": "Trend 3: Intent data is the new starting point of the supply chain Confidence: High Evidence chain : Pinterest's visual-intent tagging; \"people don't have the words for what they want\" (①) → the Coachella example in your notes (style searches → data → conviction → on-site demo investment) → JOOR's 102 days + smaller upfront buys + reorders (①) → GAP's \"intent-based was the biggest aha\" (②) → LTK conversational search +3x MoM (②) → Kornit's \"sell first, then make\"; minute-level allocation (⑧) → Unspun's 1:1 supply-demand, MOQ=1 (⑧). So What : forecasting is being replaced by interception — the chain flips from \"guess demand\" to \"read intent, then produce.\" Culture has fragmented (your note: \"consumer is everything from age, lifestyle and characters; culture has become fragmented\") — single trend reports fail; you need a multi-signal system."}, {"s": "m9", "a": "m9-h4", "t": "Trend 4: The physical world's revival is the hedge against digital fatigue", "x": "Trend 4: The physical world's revival is the hedge against digital fatigue Confidence: Medium-High Evidence chain : Pinterest investing in live sports/music; screen-time backlash (①) → \"Get off your phone and get into culture\" (①) → Leap's \"physical retail is back,\" the store as innovation intelligence, the Frankie's Bikinis case (⑦) → eBay feeding offline cultural moments (Vogue Market, Endless Runway) into live commerce (②) → Quince bringing merchants to pop-ups to talk stitching (⑥) → SSENSE's \"you moved your whole body here\" (⑥). So What : offline isn't a channel — it's a generator of content and data ; the strongest combination is \" offline cultural moment × online real-time amplification \" (the eBay playbook). For $200+ AUR and premium categories, physical is mission critical."}, {"s": "m9", "a": "m9-h5", "t": "Trend 5: The fashion-ization of tech &gt; the tech-ization of fashion", "x": "Trend 5: The fashion-ization of tech &gt; the tech-ization of fashion Confidence: Medium Evidence chain : the entire Wearables panel — jewelry before device, the 30-artist experiment, \"fashion = identity vs. tech = standardization\" (④) → DressX converting via \"your own photo\" emotion (②) → SSENSE refusing to make digital imitate the boutique (⑥) → hardware commoditization lowering barriers; differentiation left in design and the AI-personality layer (④). So What : fashion tech wins or loses not on specs but on carrying identity and personalization ; \"devices meant for everyone are meant for no one.\""}, {"s": "m10", "a": "", "t": "", "x": "# Data point Source Session 1 ~$5T of global commerce through agentic purchasing (next 5–10 years) McKinsey models ① 2 Wholesale order-to-ship window down to 102 days within five years JOOR (measured) ① 3 World Cup jersey searches +800% YoY Pinterest ① 4 F1 outfit searches +400% YoY Pinterest ① 5 WGSN macro forecasting already at 2029 WGSN ① 6 LTK conversational search +3x month over month LTK ② 7 70% of LTK's annual sales happen inside the LTK app LTK ② 8 eBay fashion +10% last year; 9/10 consumers plan to increase pre-loved spend eBay ② 9 Watch seller's first live event &gt;$1M GMV ; Black Friday &gt;$2M in one live event eBay ② 10 10M+ users on eBay AI features; 500K listings/day via Magical Listing eBay ② 11 VTO: conversion +50% , add-to-cart 3x , items viewed 7x DressX ② 12 GAP hits 30 years online this fall; full AI-first data-stack rebuild GAP ② 13 Snap: 70% come for best friends; 91% of them trust friends' purchase recs Snap ③ 14 Snap creators post 50–100 snaps/day Snap ③ 15 Leap: ~50 brands / 115 locations ; Frankie's Bikinis from 95% swim → 55% RTW Leap ⑦ 16 RTR customers try ~45 new brands a year Rent the Runway ⑦ 17 Quince: 200+ engineers ; tens of millions of monthly shoppers; ~1.5M IG followers Quince ⑥ 18 SSENSE: 500+ brands served; baseline content unchanged for 11 years SSENSE ⑥ 19 150B garments/year, ~30% never sold ; traditional model overproduces 30–40% Unspun/Kornit ⑧ 20 At least $1.5T wasted annually industry-wide Kornit ⑧ 21 The sewing machine: invented ~1830 (no fundamental change in ~200 years) Unspun ⑧ 22 Simplifyber: natural fibers molded from a liquid bath in ~100 seconds Simplifyber ⑧"}], "entities": [{"name": "Daydream", "sections": ["home", "m6", "m9"]}, {"name": "DressX", "sections": ["m10", "m3", "m9"]}, {"name": "JOOR", "sections": ["m10", "m2", "m9"]}, {"name": "LTK", "sections": ["home", "m10", "m3", "m9"]}, {"name": "Leap", "sections": ["m10", "m7", "m9"]}, {"name": "McKinsey", "sections": ["home", "m10", "m2", "m9"]}, {"name": "Meta", "sections": ["m5", "m6"]}, {"name": "Pinterest", "sections": ["home", "m10", "m2", "m9"]}, {"name": "Quince", "sections": ["home", "m10", "m6", "m9"]}, {"name": "Rent the Runway", "sections": ["m10", "m7"]}, {"name": "ShopMy", "sections": ["m4", "m9"]}, {"name": "Shopify", "sections": ["m4", "m7", "m9"]}, {"name": "Snap", "sections": ["home", "m10", "m4", "m9"]}, {"name": "SpreeAI", "sections": ["m7", "m9"]}, {"name": "TikTok", "sections": ["m2", "m4", "m6"]}, {"name": "Unspun", "sections": ["home", "m10", "m8", "m9"]}, {"name": "WGSN", "sections": ["m10", "m2"]}, {"name": "eBay", "sections": ["home", "m10", "m3", "m9"]}]}, "labels": {"home": {"en": "Overview", "badge": "◎"}, "m2": {"en": "Trend Forecasting", "badge": "①", "time": "1:00 PM"}, "m3": {"en": "Shopping Behaviors", "badge": "②", "time": "1:40 PM"}, "m4": {"en": "Influence Economy", "badge": "③", "time": "2:25 PM"}, "m5": {"en": "Wearables", "badge": "④", "time": "3:10 PM"}, "m6": {"en": "Modern Commerce", "badge": "⑥", "time": "5:05 PM"}, "m7": {"en": "Omnichannel", "badge": "⑦", "time": "5:50 PM"}, "m8": {"en": "Manufacturing & Design", "badge": "⑧", "time": "6:30 PM"}, "m9": {"en": "Five Structural Trends", "badge": "★"}, "m10": {"en": "Key Data", "badge": "#"}}, "groups": [{"id": "start", "label": {"en": "START"}, "items": ["home"]}, {"id": "panels", "label": {"en": "PANELS"}, "items": ["m2", "m3", "m4", "m5", "m6", "m7", "m8"]}, {"id": "insight", "label": {"en": "INSIGHTS"}, "items": ["m9", "m10"]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const UI = {
  en:{search:"Search everything…", key:"Key", detail:"Detail", quotes:"Quotes", all:"All",
      brand:"Fashionology 2026", sub:"Second Brain · Deep Report", hint:"Search across all 7 panels · ↑↓ select · ⏎ jump · also try “/”",
      prev:"Previous", next:"Next", lede:"June 6, 2026 · The Glasshouse, NYC · 7 panels · key data · cross-panel synthesis",
      kicker:"3rd Annual Fashion Tech Summit · Deep Report", n:"No results",
      stats:[["$5T","Agentic commerce in 5–10 yrs (McKinsey)","m10"],["102 days","Wholesale order-to-ship window (JOOR)","m2"],["70%","of LTK sales happen in-app","m3"],["+50%","conversion lift from virtual try-on","m3"],["30%","of 150B garments/yr never sell","m8"],["45","new brands RTR customers try yearly","m7"]]}
};
const ORDER = DATA.groups.flatMap(g=>g.items);
let lang='en', active='home';
let layerFilter=(()=>{try{return localStorage.getItem('fz_layer')||'all'}catch(e){return 'all'}})();
let pins=(()=>{try{return JSON.parse(localStorage.getItem('fz_pins')||'[]')}catch(e){return []}})();
function saveLayer(){try{localStorage.setItem('fz_layer',layerFilter)}catch(e){}}
function savePins(){try{localStorage.setItem('fz_pins',JSON.stringify(pins))}catch(e){} paintPinCount();}

const $=s=>document.querySelector(s);
const sidebar=$('#sidebar'), content=$('#content'), crumb=$('#crumb'), chipsEl=$('#chips'), progress=$('#progress'), fab=$('#fab');
function sections(){return DATA[lang].sections}
function label(id){const L=DATA.labels[id];return L?L.en:id}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1700)}

/* ============ sidebar ============ */
function renderSidebar(){
  let h=`<div class="brand"><div class="dot">F</div><div><b>${UI[lang].brand}</b><small>${UI[lang].sub}</small></div></div>
  <button class="searchbtn" id="sb"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>${UI[lang].search}<span class="k">⌘K</span></button>`;
  for(const g of DATA.groups){
    h+=`<div class="group"><span>${g.label[lang]}</span>`;
    for(const id of g.items){
      const L=DATA.labels[id]||{}, on=id===active;
      h+=`<button class="navitem ${on?'active':''}" data-nav="${id}">
        <span class="badge">${L.badge||'•'}</span><span class="t">${label(id)}</span>${L.time?`<span class="time">${L.time}</span>`:''}</button>`;
      if(on){
        const sec=sections()[id];
        if(sec&&sec.sub.length){
          h+=`<div class="subnav">`+sec.sub.map(s=>
            `<button class="lvl${s.lvl===2?'2':'3'}" data-sub="${s.id}">${s.t}</button>`).join('')+`</div>`;
        }
      }
    }
    h+=`</div>`;
  }
  sidebar.innerHTML=h;
  $('#sb').onclick=openSpot;
  sidebar.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>go(b.dataset.nav));
  sidebar.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{closeMobile();jumpTo(b.dataset.sub)});
}

/* ============ panel meta ============ */
function metaCard(meta){
  if(!meta||(!meta.panelists&&!meta.moderator))return '';
  let h='<div class="pmeta">';
  if(meta.panelists){
    h+=`<div class="row"><span class="lbl">Panel</span>`+meta.panelists.map(p=>
      `<span class="person" title="${esc(p.role)}"><span class="av">${esc(initials(p.name))}</span><b>${esc(p.name)}</b>${p.org?`<small>${esc(p.org)}</small>`:''}</span>`).join('')+`</div>`;
  }
  if(meta.moderator){
    h+=`<div class="row"><span class="lbl">Moderator</span>`+meta.moderator.map(p=>
      `<span class="person" title="${esc(p.role)}"><span class="av">${esc(initials(p.name))}</span><b>${esc(p.name)}</b>${p.org?`<small>${esc(p.org)}</small>`:''}</span>`).join('')+`</div>`;
  }
  if(meta.note) h+=`<div class="note">⚠︎ ${esc(meta.note)}</div>`;
  return h+'</div>';
}
function initials(n){const p=n.trim().split(/\s+/);return (p[0][0]+(p[1]?p[1][0]:'')).toUpperCase()}

/* ============ content ============ */
function renderContent(scroll=true){
  const sec=sections()[active];
  let h='';
  if(active==='home'){
    h+=`<div class="hero"><div class="kicker">${UI[lang].kicker}</div>
      <h1>Fashionology Summit 2026</h1><p class="lede">${UI[lang].lede}</p>
      <div class="stats">`+UI[lang].stats.map(s=>
        `<div class="stat" data-go="${s[2]}"><b>${s[0]}</b><span>${s[1]}</span><span class="go">→</span></div>`).join('')+`</div></div>`;
  }else{
    const L=DATA.labels[active]||{};
    h+=`<div class="titleblock"><div class="kicker">${L.time?('Panel · '+L.time):label(active)}</div><h1>${sec.title}</h1></div>`;
    h+=metaCard(sec.meta);
  }
  h+=`<div class="article">${sec.html}</div>`;
  const i=ORDER.indexOf(active);
  h+=`<div class="pager">`;
  if(i>0)h+=`<button data-go="${ORDER[i-1]}"><small>← ${UI[lang].prev}</small><span>${label(ORDER[i-1])}</span></button>`;
  if(i<ORDER.length-1)h+=`<button data-go="${ORDER[i+1]}"><small>${UI[lang].next} →</small><span>${label(ORDER[i+1])}</span></button>`;
  h+=`</div><div class="kbdhint"><kbd>J</kbd>/<kbd>K</kbd> next · prev section &nbsp; <kbd>⌘K</kbd> search</div>`;
  content.innerHTML=h;
  content.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));
  crumb.innerHTML=`Fashionology 2026 <span style="color:var(--mut2)">/</span> <b>${label(active)}</b>`;
  renderChips(); applyFilter(); makeTablesSortable(); addTableFilters(); decorateHeadings();
  if(scroll)window.scrollTo({top:0,behavior:'instant'});
}

function renderChips(){
  const sec=sections()[active];
  if(!sec.hasLayers){chipsEl.innerHTML='';chipsEl.classList.remove('mobile-on');return}
  const defs=[['all',UI[lang].all],['key',UI[lang].key],['detail',UI[lang].detail],['quotes',UI[lang].quotes]];
  chipsEl.innerHTML=defs.map(d=>`<button class="chip ${layerFilter===d[0]?'on':''}" data-f="${d[0]}">${d[1]}</button>`).join('');
  chipsEl.classList.add('mobile-on');
  chipsEl.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{layerFilter=c.dataset.f;saveLayer();writeHash();renderChips();applyFilter()});
}
function applyFilter(){
  content.querySelectorAll('.layer').forEach(el=>{
    const l=el.dataset.layer;
    el.style.display=(layerFilter==='all'||l==='info'||l===layerFilter)?'':'none';
  });
}

/* ============ headings: pin + copy link ============ */
function pinKey(sec,anchor){return sec+'|'+anchor}
function isPinned(k){return pins.some(p=>p.k===k)}
function decorateHeadings(){
  content.querySelectorAll('.article h3[id]').forEach(h3=>{
    const k=pinKey(active,h3.id);
    const act=document.createElement('span');act.className='hact';
    act.innerHTML=`<button class="hbtn pin ${isPinned(k)?'pinned':''}" title="Save to collection">${pinSvg()}</button>
      <button class="hbtn lnk" title="Copy link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg></button>`;
    h3.appendChild(act);
    act.querySelector('.pin').onclick=e=>{e.stopPropagation();togglePin(k,active,h3.id,headText(h3),snippetAfter(h3),e.currentTarget)};
    act.querySelector('.lnk').onclick=e=>{e.stopPropagation();copyLink(h3.id)};
  });
  content.querySelectorAll('.kt').forEach((kt,i)=>{
    const anchor='kt-'+i, k=pinKey(active,anchor);
    kt.id=anchor;
    const b=document.createElement('button');
    b.className='hbtn pin'+(isPinned(k)?' pinned':'');b.title='Save to collection';b.innerHTML=pinSvg();
    b.onclick=e=>{e.stopPropagation();togglePin(k,active,anchor,'Key takeaway #'+(i+1)+' · '+label(active),kt.querySelector('.ktb').textContent.slice(0,180),b)};
    kt.appendChild(b);
  });
}
function pinSvg(){return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`}
function headText(h){const c=h.cloneNode(true);c.querySelectorAll('.hact').forEach(x=>x.remove());return c.textContent.trim()}
function snippetAfter(h){let el=h.nextElementSibling,t='';while(el&&t.length<160&&!/^H[23]$/.test(el.tagName)){t+=' '+el.textContent;el=el.nextElementSibling}return t.trim().slice(0,180)}
function togglePin(k,sec,anchor,title,snip,btn){
  if(isPinned(k)){pins=pins.filter(p=>p.k!==k);btn.classList.remove('pinned');toast('Removed from Saved')}
  else{pins.unshift({k,sec,anchor,title,snip,ts:Date.now()});btn.classList.add('pinned');toast('Saved ✓')}
  savePins();
}
function copyLink(anchor){
  const url=location.origin+location.pathname+'#'+active+'/'+anchor;
  (navigator.clipboard?navigator.clipboard.writeText(url):Promise.reject()).then(()=>toast('Link copied'),()=>{prompt('Copy link:',url)});
}
function paintPinCount(){const c=$('#pincnt');c.textContent=pins.length||'';c.dataset.n=pins.length}

/* ============ nav ============ */
function writeHash(anchor){
  let s='#'+active;
  if(anchor)s+='/'+anchor;
  if(layerFilter&&layerFilter!=='all')s+=(anchor?'/':'//')+layerFilter;
  history.replaceState(null,'',s);
}
function go(id,anchor,terms){
  if(!sections()[id])return;
  active=id;closeMobile();
  renderSidebar();renderContent();
  writeHash(anchor);
  if(terms&&[].concat(terms).filter(Boolean).length){highlightTerms([].concat(terms))}
  else if(anchor){setTimeout(()=>jumpTo(anchor),60)}
}
function jumpTo(hid){
  const el=document.getElementById(hid);
  if(!el)return;
  const wrap=el.closest('.layer');
  if(wrap&&wrap.style.display==='none'){layerFilter=wrap.dataset.layer||'all';saveLayer();renderChips();applyFilter()}
  el.scrollIntoView&&el.scrollIntoView({behavior:'smooth',block:'start'});
  el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
  writeHash(hid);
}
function highlightTerms(terms){
  const safe=terms.filter(Boolean).map(t=>String(t).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  if(!safe.length)return;
  const rx=new RegExp('('+safe.join('|')+')','ig');
  const root=content.querySelector('.article');if(!root)return;
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){
    if(!n.nodeValue||!n.nodeValue.trim())return NodeFilter.FILTER_REJECT;
    const p=n.parentNode;if(p&&/^(MARK|SCRIPT|STYLE|TH|BUTTON)$/.test(p.nodeName))return NodeFilter.FILTER_REJECT;
    return NodeFilter.FILTER_ACCEPT;
  }});
  const nodes=[];let n;while(n=walker.nextNode()){rx.lastIndex=0;if(rx.test(n.nodeValue))nodes.push(n)}
  let first=null;
  nodes.forEach(node=>{
    const s=node.nodeValue,frag=document.createDocumentFragment();let last=0,m;rx.lastIndex=0;
    while(m=rx.exec(s)){
      if(m.index>last)frag.appendChild(document.createTextNode(s.slice(last,m.index)));
      const mk=document.createElement('mark');mk.className='qhit';mk.textContent=m[0];frag.appendChild(mk);
      if(!first)first=mk;last=m.index+m[0].length;
      if(m.index===rx.lastIndex)rx.lastIndex++;
    }
    if(last<s.length)frag.appendChild(document.createTextNode(s.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
  if(first){
    const wrap=first.closest('.layer');
    if(wrap&&wrap.style.display==='none'){layerFilter=wrap.dataset.layer||'all';saveLayer();renderChips();applyFilter()}
    setTimeout(()=>first.scrollIntoView&&first.scrollIntoView({behavior:'smooth',block:'center'}),90);
  }
}

/* ============ tables ============ */
function makeTablesSortable(){
  content.querySelectorAll('table').forEach(tb=>{
    const ths=tb.querySelectorAll('thead th');
    ths.forEach((th,ci)=>{
      th.onclick=()=>{
        const tbody=tb.querySelector('tbody');if(!tbody)return;
        const rows=[...tbody.rows];
        const dir=th.dataset.dir==='a'?-1:1;
        ths.forEach(t=>{delete t.dataset.dir;const a=t.querySelector('.arr');if(a)a.remove()});
        th.dataset.dir=dir===1?'a':'d';
        th.insertAdjacentHTML('beforeend',`<span class="arr">${dir===1?'▲':'▼'}</span>`);
        rows.sort((r1,r2)=>{
          const a=(r1.cells[ci]?.textContent||'').trim(),b=(r2.cells[ci]?.textContent||'').trim();
          const na=parseFloat(a.replace(/[^0-9.\-]/g,'')),nb=parseFloat(b.replace(/[^0-9.\-]/g,''));
          if(!isNaN(na)&&!isNaN(nb))return (na-nb)*dir;
          return a.localeCompare(b)*dir;
        });
        rows.forEach(r=>tbody.appendChild(r));
      };
    });
  });
}
function addTableFilters(){
  content.querySelectorAll('.tblwrap').forEach(w=>{
    const tb=w.querySelector('table'),body=tb&&tb.querySelector('tbody');
    if(!body||body.rows.length<8)return;
    const inp=document.createElement('input');
    inp.className='tblfilter';inp.placeholder='Filter rows… (e.g. eBay, %, McKinsey)';
    inp.oninput=()=>{const v=inp.value.toLowerCase();[...body.rows].forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(v)?'':'none'})};
    w.parentNode.insertBefore(inp,w);
  });
}

/* ============ spotlight ============ */
const veil=$('#veil'),spot=$('#spot'),q=$('#q'),res=$('#res');
let selIdx=0,curResults=[];
function openSpot(){closeDrawer();veil.classList.add('show');spot.classList.add('show');q.value='';renderHint();setTimeout(()=>q.focus(),50)}
function closeSpot(){veil.classList.remove('show');spot.classList.remove('show');q.blur()}
function renderHint(){res.innerHTML=`<div class="hint">${UI[lang].hint}</div>`;curResults=[]}
veil.onclick=()=>{closeSpot();closeDrawer()};
function search(query){
  const ql=query.toLowerCase();const out=[];
  for(const b of DATA[lang].search){
    const xi=b.x.toLowerCase().indexOf(ql);
    const ti=b.t.toLowerCase().indexOf(ql);
    if(xi<0&&ti<0)continue;
    const pos=xi>=0?xi:0;
    const start=Math.max(0,pos-46);
    let sn=b.x.slice(start,pos+110);
    sn=esc(sn).replace(new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'),m=>`<mark>${m}</mark>`);
    out.push({s:b.s,a:b.a,t:b.t||sections()[b.s].title,sn:(start>0?'…':'')+sn+'…',exact:ti>=0});
    if(out.length>=40)break;
  }
  out.sort((a,b)=>(b.exact-a.exact));
  return out.slice(0,30);
}
q.addEventListener('input',()=>{
  const v=q.value.trim();
  if(v.length<1){renderHint();return}
  curResults=search(v);selIdx=0;
  if(!curResults.length){res.innerHTML=`<div class="hint">${UI[lang].n}</div>`;return}
  res.innerHTML=curResults.map((r,i)=>
    `<button class="rs ${i===0?'sel':''}" data-i="${i}"><div class="path">${label(r.s)}</div><div class="tt">${esc(r.t)}</div><div class="sn">${r.sn}</div></button>`).join('');
  res.querySelectorAll('.rs').forEach(b=>b.onclick=()=>pick(+b.dataset.i));
});
function pick(i){const r=curResults[i];if(!r)return;const term=q.value.trim();closeSpot();go(r.s,r.a||null,term||null)}
function paintSel(){
  res.querySelectorAll('.rs').forEach((b,i)=>b.classList.toggle('sel',i===selIdx));
  const el=res.querySelector('.rs.sel');if(el&&el.scrollIntoView)el.scrollIntoView({block:'nearest'});
}
q.placeholder=UI.en.search;

/* ============ keyboard ============ */
document.addEventListener('keydown',e=>{
  const tag=(e.target.tagName||'').toLowerCase();
  const typing=tag==='input'||tag==='textarea'||e.target.isContentEditable;
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();spot.classList.contains('show')?closeSpot():openSpot();return}
  if(e.key==='Escape'){closeSpot();closeDrawer();return}
  if(spot.classList.contains('show')){
    if(curResults.length){
      if(e.key==='ArrowDown'){e.preventDefault();selIdx=Math.min(selIdx+1,curResults.length-1);paintSel()}
      if(e.key==='ArrowUp'){e.preventDefault();selIdx=Math.max(selIdx-1,0);paintSel()}
      if(e.key==='Enter'){e.preventDefault();pick(selIdx)}
    }
    return;
  }
  if(typing)return;
  if(e.key==='/'){e.preventDefault();openSpot();return}
  const i=ORDER.indexOf(active);
  if(e.key==='j'||e.key==='J'){if(i<ORDER.length-1)go(ORDER[i+1])}
  if(e.key==='k'||e.key==='K'){if(i>0)go(ORDER[i-1])}
});

/* ============ progress + fab ============ */
window.addEventListener('scroll',()=>{
  const el=document.documentElement;
  const pct=el.scrollHeight<=el.clientHeight?0:el.scrollTop/(el.scrollHeight-el.clientHeight)*100;
  progress.style.width=pct+'%';
  fab.classList.toggle('show',el.scrollTop>600);
},{passive:true});
fab.onclick=()=>window.scrollTo({top:0,behavior:'smooth'});

/* ============ drawers ============ */
const drawer=$('#drawer'),dwBody=$('#dwBody'),dwSub=$('#dwSub'),dwTitle=$('#dwTitle'),dwAct=$('#dwAct');
let drawerMode=null,entFilter='',openEnt=null;
function openDrawer(mode){drawerMode=mode;drawer.classList.add('open');veil.classList.add('show');renderDrawer()}
function closeDrawer(){drawer.classList.remove('open');veil.classList.remove('show');openEnt=null;drawerMode=null}
$('#dwClose').onclick=closeDrawer;
$('#idxbtn').onclick=()=>openDrawer('index');
$('#savedbtn').onclick=()=>openDrawer('saved');

function getEntitySnippet(name,sid){
  const nl=name.toLowerCase();
  for(const b of (DATA[lang].search||[]).filter(b=>b.s===sid)){
    const xi=b.x.toLowerCase().indexOf(nl);if(xi<0)continue;
    const start=Math.max(0,xi-30);
    return esc((start>0?'…':'')+b.x.slice(start,xi+name.length+60)+'…');
  }
  return '';
}
function renderDrawer(){
  if(drawerMode==='index'){
    dwTitle.textContent='Index';dwAct.style.display='none';
    const all=(DATA[lang].entities||[]);
    const ents=all.filter(e=>!entFilter||e.name.toLowerCase().includes(entFilter.toLowerCase()));
    dwSub.textContent=all.length+' people & companies · cross-referenced';
    let h=`<input class="efind" placeholder="Filter…" value="${esc(entFilter)}">`;
    if(!ents.length)h+='<div class="dempty">No matches</div>';
    h+=ents.map((e,i)=>{
      const on=openEnt===i;
      let row=`<button class="ent ${on?'on':''}" data-ei="${i}">
        <span class="ei">${esc(e.name.charAt(0))}</span><span class="en">${esc(e.name)}</span><span class="ec">${e.sections.length}</span></button>`;
      if(on)row+=`<div class="erefs">`+e.sections.map(sid=>
        `<button class="eref" data-sid="${sid}" data-ename="${esc(e.name)}">
          <div class="ep">${esc(label(sid))}</div><div class="es">${getEntitySnippet(e.name,sid)}</div></button>`).join('')+`</div>`;
      return row;
    }).join('');
    dwBody.innerHTML=h;
    const fi=dwBody.querySelector('.efind');
    if(fi)fi.oninput=()=>{entFilter=fi.value;renderDrawer()};
    dwBody.querySelectorAll('.ent').forEach(b=>b.onclick=()=>{openEnt=(openEnt===+b.dataset.ei)?null:+b.dataset.ei;renderDrawer()});
    dwBody.querySelectorAll('.eref').forEach(b=>b.onclick=()=>{const sid=b.dataset.sid,name=b.dataset.ename;closeDrawer();go(sid,null,name)});
  }else{
    dwTitle.textContent='Saved';
    dwSub.textContent=pins.length?pins.length+' saved — your personal digest':'';
    dwAct.style.display=pins.length?'flex':'none';
    if(!pins.length){
      dwBody.innerHTML=`<div class="dempty"><span class="big">⌘</span>Nothing saved yet.<br>Hover any heading or key-takeaway card and hit the bookmark icon to build your own digest.</div>`;
      return;
    }
    const bySec={};pins.forEach(p=>{(bySec[p.sec]=bySec[p.sec]||[]).push(p)});
    let h='';
    for(const sid of ORDER){
      if(!bySec[sid])continue;
      h+=`<div class="sgrp">${esc(label(sid))}</div>`;
      h+=bySec[sid].map(p=>`<div class="pinitem" data-k="${esc(p.k)}" data-sec="${p.sec}" data-a="${esc(p.anchor)}">
        <div class="pt">${esc(p.title)}</div><div class="ps">${esc(p.snip||'')}</div>
        <button class="px" title="Remove">✕</button></div>`).join('');
    }
    dwBody.innerHTML=h;
    dwBody.querySelectorAll('.pinitem').forEach(it=>{
      it.onclick=e=>{if(e.target.classList.contains('px'))return;closeDrawer();go(it.dataset.sec,it.dataset.a)};
      it.querySelector('.px').onclick=e=>{e.stopPropagation();pins=pins.filter(p=>p.k!==it.dataset.k);savePins();renderDrawer();decorateRepaint()};
    });
  }
}
function decorateRepaint(){
  content.querySelectorAll('.hbtn.pin').forEach(b=>{
    const host=b.closest('[id]');if(!host)return;
    b.classList.toggle('pinned',isPinned(pinKey(active,host.id)));
  });
}
$('#copyPins').onclick=()=>{
  const md=['# Fashionology 2026 — my saved digest',''].concat(pins.map(p=>{
    const url=location.origin+location.pathname+'#'+p.sec+'/'+p.anchor;
    return `- **${p.title}** (${label(p.sec)})\n  ${p.snip||''}\n  ${url}`;
  })).join('\n');
  (navigator.clipboard?navigator.clipboard.writeText(md):Promise.reject()).then(()=>toast('Copied as Markdown'),()=>prompt('Copy:',md));
};
$('#clearPins').onclick=()=>{pins=[];savePins();renderDrawer();decorateRepaint();toast('Cleared')};

/* ============ mobile ============ */
const mveil=$('#mveil');
$('#menubtn').onclick=()=>{sidebar.classList.add('open');mveil.classList.add('show')};
function closeMobile(){sidebar.classList.remove('open');mveil.classList.remove('show')}
mveil.onclick=closeMobile;

/* ============ scroll spy ============ */
let spyTick=false;
window.addEventListener('scroll',()=>{
  if(spyTick)return;spyTick=true;
  requestAnimationFrame(()=>{
    spyTick=false;
    const subs=sidebar.querySelectorAll('[data-sub]');if(!subs.length)return;
    let cur=null;
    for(const s of sections()[active].sub){
      const el=document.getElementById(s.id);
      if(el&&el.getBoundingClientRect().top<110)cur=s.id;
    }
    subs.forEach(b=>b.classList.toggle('on',b.dataset.sub===cur));
  });
},{passive:true});

/* ============ init ============ */
(function(){
  paintPinCount();
  const hash=location.hash.slice(1);
  if(hash){
    const parts=hash.split('/');
    const id=parts[0];
    const layerPart=parts.find(p=>['key','detail','quotes'].includes(p));
    if(layerPart){layerFilter=layerPart;saveLayer()}
    const anchor=parts[1]&&!['key','detail','quotes','all'].includes(parts[1])?parts[1]:null;
    if(DATA.en.sections[id])active=id;
    renderSidebar();renderContent();
    if(anchor)setTimeout(()=>jumpTo(anchor),120);
    return;
  }
  renderSidebar();renderContent();
})();
</script>
