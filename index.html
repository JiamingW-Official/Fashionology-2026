-h5", "t": "4.3 ShopMy: affiliate democratization and the truth about \"brand control\"", "lvl": 3}, {"id": "m4-h6", "t": "4.4 ShopMy: which creators deserve the budget?", "lvl": 3}, {"id": "m4-h7", "t": "4.5 ShopMy: why affiliate captured both sides", "lvl": 3}, {"id": "m4-h8", "t": "4.6 Snap: community × content × commerce", "lvl": 3}, {"id": "m4-h9", "t": "4.7 Snap: the Inner Circle — best friends are the strongest shopping influence", "lvl": 3}, {"id": "m4-h10", "t": "4.8 AI's role and its limits (all three platforms)", "lvl": 3}, {"id": "m4-h11", "t": "4.9 Conversation-driving creators vs. awareness-driving creators", "lvl": 3}, {"id": "m4-h12", "t": "4.10 Closing: \"What does a successful influencer partnership look like two years from now?\" (includes the Pier 86.m4a tail segment)", "lvl": 3}, {"id": "m4-h13", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "2:25–3:05 PM", "panelists": [{"name": "Julie Gabriel", "org": "TikTok", "role": "TikTok, Director, Global Strategic Brand Partnerships"}, {"name": "Anisha Kamat", "org": "ShopMy", "role": "ShopMy, COO"}, {"name": "Mandy Gardiner", "org": "Snap", "role": "Snap, Senior Director, Shopping & Experience"}, {"name": "Clarissa Bronfman", "org": "Kalshi", "role": "Kalshi, Culture GMT Leader"}], "moderator": [{"name": "Kayla Curtis-Evans", "org": "Highsnobiety", "role": "Highsnobiety"}]}}, "m5": {"id": "m5", "title": "Panel ④: Wearables Worth Wearing", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m5-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\">This generation of AI-wearable founders share one creed: <strong>jewelry/eyewear first, device second<\/strong> — design and identity expression outrank specs.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\">Four form factors, four philosophies: <strong>ring (Sandbar) = control &amp; privacy; necklace (Taya) = jewelry worth wearing even when dead; glasses (Altina) = hearing enhancement that is \"a good pair of glasses first\"; open hardware (Era) = 30 artists proving there is no \"best generic version.\"<\/strong><\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Battery vs. fashion is the eternal trade-off<\/strong>; most chose fashion and compensate with charging cases.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>Hardware supply chains have commoditized<\/strong> (the Shenzhen ecosystem) — small teams can now build hardware; that's the substrate of the AI-hardware startup wave. Differentiation now lives in design and the AI-personality layer.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\">Mutual advice: fashion must understand how long hardware cycles are; <strong>tech must understand that fashion is identity<\/strong> — and tech's instinct is standardization. The two must reconcile.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m5-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m5-h3\">5.1 Sandbar (AI ring): designed for <em>you<\/em>, not for recording others<\/h3>\n<ul>\n<li>Product stance (start of recording): \"There are lots of note-taking devices out there, but <strong>we don't build for recording other people or capturing surroundings<\/strong> — we focus on you: <strong>how can AI help you become a better human<\/strong>.\"<\/li>\n<li>Use cases: \"What's the best gift I can get for my friend?\" — like a best-friend-meets-identity-philosopher, helping you create memory and <strong>stay in the moment<\/strong> instead of being distracted.<\/li>\n<li>Why a ring (founder Mina):<ul>\n<li>The team built many device prototypes starting in 2023; the big concern was <strong>using devices in public<\/strong> — other people's perceptions and expectations are a real constraint.<\/li>\n<li>The ring's advantages: <strong>fully under your control<\/strong> — <strong>not listening for a wake word<\/strong>, quiet, close to the body; while preserving <strong>clear social signals<\/strong> (people can see you're speaking to a device).<\/li>\n<li>The software mirrors it: <strong>built-in personality and memory — \"which is essentially yourself\"<\/strong>; a live demo had the ring \"speak for me.\"<\/li>\n<\/ul>\n<\/li>\n<li>Later addition (Pier 86 2 segment): \"At the earliest stages of wearables, <strong>things have to be useful<\/strong> — nail the voice system and genuinely useful capabilities, and users stay.\"<\/li>\n<\/ul>\n<h3 id=\"m5-h4\">5.2 Taya (AI necklace): worth wearing even when dead<\/h3>\n<ul>\n<li>Design philosophy: \"It's not about being discreet — I want it to be <strong>recognizable<\/strong>, the way you recognize an iconic eyewear frame; but it shouldn't make the whole industry look the same.\"<\/li>\n<li>Materials (\"what fine watches are made of\"): <strong>stainless steel; ceramic for the non-metal components<\/strong>. Variants: <strong>gold + white ceramic, silver + ceramic — shipping in the fall<\/strong>.<\/li>\n<li>Practical details:<ul>\n<li><strong>Waterproof<\/strong> — \"how many people have lost great ideas in the shower? Just wear it and capture them\";<\/li>\n<li><strong>Doesn't need to be connected to your phone<\/strong> — sync to the app after a long day away;<\/li>\n<li>Continuous software updates;<\/li>\n<li>Roadmap: <strong>modularity and personalization<\/strong> — \"jewelry is deeply personal: initials, dates, heirloom elements… swappable components are on the horizon.\"<\/li>\n<\/ul>\n<\/li>\n<li>Best line of the session: <strong>\"If it's not so useful that you'll make sure to recharge it, we don't deserve to be on you.\"<\/strong><\/li>\n<li>The standard: \"No one leaves their apartment without their phone or their earbuds. <strong>If what we're building isn't in that category, we have to keep going.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m5-h5\">5.3 Altina (hearing-enhancement glasses): starting from the opposite of a hearing aid<\/h3>\n<ul>\n<li>Audience: \"Designed for the general population, especially people with hearing loss (skewing older) — but <strong>that's exactly why we care about what the general population cares about<\/strong>.\"<\/li>\n<li>The insight: \"Early AI wearables and hearing aids made the same mistake: ignoring <strong>style<\/strong>. Users don't want a device that says 'I'm a tech person' or 'I'm a patient' — <strong>they want their own personality to come across<\/strong>.\"<\/li>\n<li>Design decisions:<ul>\n<li><strong>No electronics on the front<\/strong>;<\/li>\n<li>Traditional <strong>acetate frames<\/strong> (most smart glasses skew sporty/gadgety; these are deliberately \"a good pair of glasses first\");<\/li>\n<li>Collaboration with London eyewear brand <strong>Cubitts<\/strong> (founder in the audience that day) — \"they offer a huge variety of styles; that's what we want for our product too.\"<\/li>\n<\/ul>\n<\/li>\n<li>Versus the big-tech collab wave (moderator cited Google × Gentle Monster, Meta × Ray-Ban):<ul>\n<li>Altina's difference: \"A lot of smart glasses are 'tech first, fashion shell later' — the eyewear partner is brought in afterward. <strong>We integrated frame design from the very beginning<\/strong> — that's literally how the relationship started.\"<\/li>\n<\/ul>\n<\/li>\n<li>Engineering trade-off: \"Thicker temples = more battery, but <strong>the fashion side matters more<\/strong> — we're building for all-day prescription wear; most of the day you're not using the electronics, so <strong>comfort and lightness above all<\/strong>; heavy usage days are covered by the <strong>charging case<\/strong>. Different companies chose different trade-offs; we chose to be as close to traditional eyewear as possible.\"<\/li>\n<\/ul>\n<h3 id=\"m5-h6\">5.4 Era: 30 creatives × 30 AI objects — a personalization manifesto<\/h3>\n<ul>\n<li>Setup (moderator): \"You collaborated with 30 artists to create 30 unique objects… what do they tell you about how people want to use AI tech?\"<\/li>\n<li>Elizabeth's argument (the most philosophical stretch of the session):<ul>\n<li>The cautionary tale: certain products \"have beautiful ideals but <strong>impose one specific emotional design and one non-customizable software layer onto a mass audience<\/strong> — devices meant for everyone, yet meant for no one.\"<\/li>\n<li>The phone analogy: \"There are limited ways to customize; we all carry the same brick. <strong>As devices get this personal, you can't imagine a non-customizable world anymore.<\/strong>\"<\/li>\n<li>Personal anecdote: \"At (a previous big-tech employer), the time I used my assistant most was when I asked it to <strong>speak to me more kindly<\/strong> — suddenly I used voice 10x more.\"<\/li>\n<li>The experiment: built a <strong>minimal core device — just a mic and a speaker<\/strong> — gave it to <strong>30 of their most creative friends<\/strong> (designers, creative technologists, people who barely know what AI is), with one command: <strong>\"go crazy\"<\/strong> — customize the exterior and make the mind act however you want.<\/li>\n<li>Three outcomes:<ol>\n<li>A creator made a <strong>lovely charm<\/strong> that speaks back <strong>in her own voice<\/strong>, telling her ways to be spontaneous with her life;<\/li>\n<li>Artist Michelle Thomas made a <strong>leather charm<\/strong> with the device hidden inside — a place to toss creative ideas throughout the day, an invisible idea-catcher;<\/li>\n<li>Another built a <strong>gentle-voiced wellness companion<\/strong> keeping her confident through the day.<\/li>\n<\/ol>\n<\/li>\n<li>The conclusion: <strong>\"Three very different people, three very different experiences. There is no 'best generic version.'\"<\/strong> Give people the tools to build the companions they want — they'll build things you can't imagine.<\/li>\n<\/ul>\n<\/li>\n<li>The brand-licensing imagination (Gen Z angle): \"I love brands like Gentle Monster — imagine glasses that <strong>take you into the world the brand is building<\/strong> (navigation to gallery shows, say). Licensing becomes a way to put a brand's world into the physical world — not just selling an aesthetic but <strong>letting people live in the process<\/strong>.\"<\/li>\n<\/ul>\n<h3 id=\"m5-h7\">5.5 The battery, longevity, and materials roundtable<\/h3>\n<ul>\n<li>The moderator (a veteran wearables reviewer) pressed: \"Every device has a different charging schedule. <strong>Do your devices still look cool when the battery dies?<\/strong> That's the #1 question I get.\"<\/li>\n<li>Taya: see 5.2 (fine-watch materials + worth wearing dead + waterproof).<\/li>\n<li>Altina: see 5.3 (slim &gt; battery + charging case).<\/li>\n<li>Moderator's industry note: \"Oura finally made a skinny ring — <strong>bulk is the #1 turn-off I hear from users<\/strong>, even when the features are great.\"<\/li>\n<li>On product lifespan (\"I replace these every two years; at these prices I can't anymore\"): Taya — durable materials for hardware; continuous software updates; modularity as the long-term answer to obsolescence.<\/li>\n<\/ul>\n<h3 id=\"m5-h8\">5.6 User feedback and development method<\/h3>\n<ul>\n<li>Question: \"When you ship new features (reminders, web search), how do you weigh user feedback? Everyone wants something different — but you must ship <em>one<\/em> product.\"<\/li>\n<li><strong>Sandbar<\/strong>: \"<strong>As voice and AI become common computing methods, we'll need a generalized way of interacting with them<\/strong> — reminders and web search are tiny steps toward that. From day zero we built giant 3D-printed prototypes and had friends and family wear them on the West Side Highway — watching how passersby reacted, how our friends used them in the morning. <strong>We changed a lot — including killing devices we ourselves thought were really functional.<\/strong> The great thing about building a new category: there's no illusion about whether a device will be useful or acceptable — you get the truth very quickly.\"<\/li>\n<li><strong>Altina<\/strong> (on not being hostage to feedback): \"The lesson is <strong>not to ship everything everyone asks for<\/strong> — 'boil the ocean, add a hundred features, claim you'll replace the phone' — many tried; it doesn't work. <strong>Pick one or two things and do them really, really well.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m5-h9\">5.7 Hardware commoditization: the substrate of the AI-wearables wave (Sandbar)<\/h3>\n<ul>\n<li>\"Wearables have two layers: software and hardware. The hardware layer (batteries, capture, ops, logistics) used to belong to giants; <strong>if you've been to the Shenzhen ecosystem (transcribed as 'HEMBA'; likely Huaqiangbei), there are thousands of factories making every component imaginable<\/strong>; and many new form factors are getting <strong>commoditized<\/strong> — <strong>you no longer need Apple-scale investment to make these devices<\/strong>. That's why so many startups are entering.\"<\/li>\n<\/ul>\n<h3 id=\"m5-h10\">5.8 Closing: advice across the aisle (Pier 86 2 segment)<\/h3>\n<ul>\n<li>The moderator first, pointedly: \"I have a small chest. <strong>If I get one more garment launch with a big chunky pendant hugging the sternum, I will lose it.<\/strong> How do you all handle wearability across bodies?\"<\/li>\n<li><strong>What fashion should understand about tech<\/strong>: \"Fashion is technically hardware too, but it's faster to make; <strong>connected-device development cycles are much longer<\/strong> — the industries must understand each other's clocks.\"<\/li>\n<li><strong>What tech should understand about fashion<\/strong> (three voices in succession — the intellectual high point):<ol>\n<li>\"There's far more personalization in fashion — that's what makes fashion work. Tech folks think 'everyone carries the same brick, so everyone will wear the same glasses' — <strong>that's not the world we're going to<\/strong>. <strong>Fashion's most important thing is identity<\/strong>; tech is all about standardizing. Tech will integrate into fashion only if it solves sizes and fit across demographics.\"<\/li>\n<li>\"Technology is changing at an unprecedented pace; <strong>we all have to ask what relationship we want with it<\/strong>. Fashion has always thought about the relation of an object or idea to the individual — how it lets the individual express themselves. I'm excited to create technology <strong>with that lens<\/strong> — understanding what's best for people, how it becomes part of them and fits into their lives — <strong>rather than being some distant top-down thing<\/strong>.\"<\/li>\n<li>\"Tech can learn 'meeting people where they are' from fashion — consumer tech has historically fallen on the disconnect from what the end consumer actually wants.\"<\/li>\n<li>\"The fashion world thinks hardest about the human experience — <strong>how to make people feel, how to let them live their aspirations<\/strong>: you put on a really good jacket and you feel awesome — that's your aspirational self. <strong>Now that tech is wearable, it has finally entered the realm of aspiration<\/strong> — and it has to learn this.\"<\/li>\n<\/ol>\n<\/li>\n<li>Moderator's close: \"I want to review units of all of these. Thank you guys so much.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m5-h11\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>The moderator on first-gen smart glasses: \"You looked like a character from Dragon Ball Z.\"<\/li>\n<li>The \"black box\" anxiety named explicitly: consumers hate opaque, obsolescing tech boxes — jewelry-fication is the antidote.<\/li>\n<li>Sandbar's privacy design language (no wake word, fully user-initiated) is a direct answer to \"AI eavesdropping\" anxiety.<\/li>\n<\/ul><\/section>", "sub": [{"id": "m5-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m5-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m5-h3", "t": "5.1 Sandbar (AI ring): designed for you , not for recording others", "lvl": 3}, {"id": "m5-h4", "t": "5.2 Taya (AI necklace): worth wearing even when dead", "lvl": 3}, {"id": "m5-h5", "t": "5.3 Altina (hearing-enhancement glasses): starting from the opposite of a hearing aid", "lvl": 3}, {"id": "m5-h6", "t": "5.4 Era: 30 creatives × 30 AI objects — a personalization manifesto", "lvl": 3}, {"id": "m5-h7", "t": "5.5 The battery, longevity, and materials roundtable", "lvl": 3}, {"id": "m5-h8", "t": "5.6 User feedback and development method", "lvl": 3}, {"id": "m5-h9", "t": "5.7 Hardware commoditization: the substrate of the AI-wearables wave (Sandbar)", "lvl": 3}, {"id": "m5-h10", "t": "5.8 Closing: advice across the aisle (Pier 86 2 segment)", "lvl": 3}, {"id": "m5-h11", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "3:10–3:45 PM", "panelists": [{"name": "Elizabeth Dorman", "org": "Era", "role": "Era, CEO"}, {"name": "Elena Wagenmans", "org": "Taya", "role": "Taya, CEO"}, {"name": "Mina Fahmi", "org": "Sandbar", "role": "Sandbar, CEO"}, {"name": "Tal Bar-Or", "org": "Altina", "role": "Altina, CEO"}], "moderator": [{"name": "Victoria Song", "org": "The Verge", "role": "The Verge"}], "note": "audience-seat recording with weaker audio; content below is the reliable reconstruction; uncertain items marked (?)."}}, "m6": {"id": "m6", "title": "Panel ⑥: Modern Commerce", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m6-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>Quince's core equation: trust = quality; price is just the output of the system<\/strong> — a low-price first purchase that delivers on quality → trust → category expansion (from $50 cashmere to caviar to couches).<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\"><strong>SSENSE's moat is consistency<\/strong>: baseline content (white-background imagery) unchanged for 11 years, immune to trends; a small share of variable content plays with fads — \"are you participating in culture, or meaningfully contributing to it?\"<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Daydream lays out the full blueprint for AI-native shopping<\/strong>: Style Passport (size/budget/preferences/inspiration) → natural-language curation (not ad-based) → endgame: <strong>a proactive agent-stylist that reads your calendar<\/strong>.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>The ethics line of personalization<\/strong>: \"creepy\" and \"delightful\" are the same thing delivered two ways — it's only creepy when it gets it wrong.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\"><strong>Friction redefined<\/strong>: the real friction isn't button smoothness — it's \"the consumer doesn't believe you yet.\" Show, don't tell.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m6-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m6-h3\">6.1 Quince: the quality-for-trust flywheel (opening of Pier 86 4)<\/h3>\n<ul>\n<li>Framing: \"Everyone in this room gets targeted by a brand every day.\"<\/li>\n<li>The thesis: <strong>\"Why would I come to Quince versus anywhere else? The answer has to be quality. Full stop.\"<\/strong><\/li>\n<li>The exhibit: the <strong>$50 cashmere she's wearing — bought four years ago<\/strong>. \"Yes, I wear it because I work at the brand — and because we're the house of quality.\"<\/li>\n<li>The trust path: \"You get the ad → you land on the PDP → you read the reviews → people ask me all the time, 'how are your reviews this good?' — <strong>that's exactly the point: we get one chance with the customer. If the quality doesn't hold up, we lose them — that's it.<\/strong> $50 cashmere sounds great, but <strong>the trust is built after they actually purchase<\/strong>.\"<\/li>\n<li>Pricing philosophy (line of the session): <strong>\"The price is not the point — the price is the output of the system.\"<\/strong><\/li>\n<li>Trust transfer across categories: \"Once you've bought the $50 cashmere and the trust is built — <strong>you're more likely to try the caviar, more likely to purchase the couch<\/strong> — because you trust what we said in the first place.\"<\/li>\n<li>Third-party validation: \"We were recently named alongside Huggies as one of the <strong>most trusted brands by parents<\/strong> — a very hard thing to earn; many of us in the room are parents.\"<\/li>\n<li>The tech base: \"<strong>Quince has 200+ engineers — we are a technology business first and foremost<\/strong> — and that technology lets us scale across all these categories. But we win on trust, and trust has to be the product. <strong>The product is what proves whether you are who you say you are.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m6-h4\">6.2 Quince: restraint on social (Pier 86 5 segment)<\/h3>\n<ul>\n<li>Setup: \"Your feeds have a distinctly Gen-Z-intern, Duolingo-owl-coded feel — trending audios, slang. <strong>How do digitally native brands ride cultural moments while keeping authenticity?<\/strong>\"<\/li>\n<li>Context: Quince has <strong>tens of millions of customers<\/strong> shopping monthly and <strong>~1.5 million Instagram followers<\/strong>.<\/li>\n<li>The (counterintuitive) answer:<ul>\n<li><strong>\"The number one way to not be cool is to tell people how cool you are.\"<\/strong> (life-motto grade)<\/li>\n<li>\"I actually <strong>don't<\/strong> want us participating in every trend, jumping on every trending audio. I only want the things where <strong>you could cover up the Quince name and still know it's the brand<\/strong>.\"<\/li>\n<li>\"The consumer reads through it instantly — jumping left and right at whatever's trending is inauthentic. We have a bit more fun on TikTok, but <strong>the lines stay on<\/strong>.\"<\/li>\n<li><strong>The three content pillars: \"Education and Storytelling — those two lead across the board; Entertainment is third, from time to time.\"<\/strong><\/li>\n<\/ul>\n<\/li>\n<li>SSENSE on the same question:<ul>\n<li>\"<strong>Audiences are more and more sensitive to whether you're just participating in culture or meaningfully contributing to it.<\/strong>\"<\/li>\n<li>\"The way to contribute is <strong>pursuing and cultivating your own interests, your own perspective, your own points of view<\/strong> — ours are deeply internally motivated, stemming from the team and the people working with us.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m6-h5\">6.3 SSENSE: consistency as a system (Pier 86 4 segment)<\/h3>\n<ul>\n<li>Setup: \"SSENSE is a renaissance man — a rich editorial archive, a leading voice in streetwear, the place for rare designer drops. <strong>Across multi-channel, multi-audience reach, how do you keep voice and visual identity consistent?<\/strong>\"<\/li>\n<li>The content-system dichotomy (operationally invaluable):<ul>\n<li><strong>Baseline content<\/strong>: \"Have a baseline of content that is truly, consistently your brand — <strong>agnostic of fads and trends<\/strong>. Ours is the <strong>PLP/PDP content<\/strong> everyone knows: the model wearing the shirt on the white background. You might think the model looks indifferent or irreverent — <strong>an enormous amount of effort goes into building that identity<\/strong>.\"<\/li>\n<li>Time compounding: \"I've been at the company 11 years and that baseline hasn't changed — <strong>because it stayed consistent that long, it became core to the brand<\/strong>: on any shopping page full of white-background shots, <strong>you can pinpoint the SSENSE image out of any lineup<\/strong>.\"<\/li>\n<li><strong>Variable content<\/strong>: \"There are trends in lighting, in styling, in backgrounds — keep the trend-reactive content <strong>a smaller share, ad hoc, reactive<\/strong> — and you can have a lot of fun with it.\"<\/li>\n<li>The rule: \"Baseline: stay consistent, stay timeless, stay true to who you are.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m6-h6\">6.4 Daydream: the mechanics of AI-native shopping<\/h3>\n<ul>\n<li>Demo scenario (moderator): \"Type 'what to wear to a fashion tech panel' into Daydream right now and you get shoppable results categorized into <strong>jumpsuits, double-breasted jackets<\/strong> — everything I personally wished I'd worn to this panel.\"<\/li>\n<li>The mechanics (CMO Jennifer Koen):<ul>\n<li>The founding gap: \"<strong>How many times have you shopped in the same place and they never remember your size? Never remember what you bought last week?<\/strong> It's kind of shocking — Daydream is built on that gap.\"<\/li>\n<li><strong>Style Passport<\/strong>: learns your <strong>size, budget, preferences, inspiration<\/strong> — then curates new items against your natural-language queries (ChatGPT-style).<\/li>\n<li><strong>Not ad-based<\/strong>: \"The technology does the curation — from everything we've learned about you, what you told us in the query, and everything we know about all our brands.\"<\/li>\n<li><strong>Discovery preserved<\/strong>: \"If you like SSENSE — which happens to be one of our brand partners — you're probably going to like this other brand you don't know yet. Discovery is so important in fashion.\" (SSENSE is a Daydream retail partner; you can even query \"only show me SSENSE brands, outfits for a fashion tech conference.\")<\/li>\n<\/ul>\n<\/li>\n<li>Meta (Mariel Poole): \"If we can get ahead of what the customer is going to like, <strong>we can introduce them to new brands they'd never have considered<\/strong>.\" (Meta speaks less in this recording.)<\/li>\n<\/ul>\n<h3 id=\"m6-h7\">6.5 Personalization: creepy vs. delightful<\/h3>\n<ul>\n<li>Daydream: \"We're all consumers; we all know the difference between —<ul>\n<li>'<em>Ooh… how did you know that about me?<\/em>' (creepy)<\/li>\n<li>'<em>Oh that's so great! How did you know that about me?<\/em>' (delight)<\/li>\n<li><strong>Same idea — the difference is all in how it gets delivered.<\/strong>\"<\/li>\n<\/ul>\n<\/li>\n<li>Moderator: \"<strong>It's creepy when it gets it wrong.<\/strong>\" — \"Right. We want to get it right.\"<\/li>\n<\/ul>\n<h3 id=\"m6-h8\">6.6 Should digital replicate the bespoke in-store experience? (A rare contrarian answer)<\/h3>\n<ul>\n<li>Setup: \"High-ticket shoppers want to feel the effort — the sales associate calling you by name, the open bar at Kemo Sabe while your initials go on your new hat. <strong>How do you digitize that bespoke brick-and-mortar experience?<\/strong>\"<\/li>\n<li><strong>SSENSE (the contrarian, and excellent)<\/strong>: \"I have a different answer: <strong>both serve distinct purposes, and neither should strive to be the other.<\/strong><ul>\n<li>In-store is an <strong>experience<\/strong>: 'you moved your whole body to be here' — you might as well get a glass of champagne, a little prosecco, a nice sofa.<\/li>\n<li>Digital's promise: <strong>no makeup on, lying down, whatever state you're in — you can procure anything you want with just your fingertips.<\/strong><\/li>\n<li>SSENSE has both: the brick-and-mortar does the full bespoke thing; online assumes our shopper is a <strong>fashion-lover who's done the research<\/strong> — they go straight for the product, and our job is to get it to them <strong>as seamlessly as possible<\/strong>.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Quince (a different in-store answer)<\/strong>: \"It all goes back to a <strong>feeling<\/strong> — feeling special, feeling valued, feeling seen. This past week I was in LA and Toronto doing a series of pop-ups, and what's different is <strong>I bring our merchants<\/strong> — the people on the phone with the manufacturers every day, who can tell you exactly where something is made and talk about the stitching in real life. Give people <strong>something they can only get by being there with you<\/strong> — that's what makes someone feel special.\"<\/li>\n<li><strong>Daydream (the digital endgame — the most futuristic passage of the session)<\/strong>: \"The way digital makes someone feel special is to <strong>extend into their life and be helpful<\/strong>:<ul>\n<li>The dream (not shipped yet — 'I'm working on it'): <strong>it can see my calendar and anticipate the things in my life I need to shop for<\/strong> —<\/li>\n<li>A push notification: 'I see you have this party coming up — <strong>here are four outfits we think you'll love<\/strong>';<\/li>\n<li>Becoming a <strong>true agent — a shopping stylist actively moving forward with your life<\/strong>, helping you look your best, shop what you need.<\/li>\n<li>'You don't get the champagne' — 'I could maybe send you one, call me' (laughter) — 'but what you get is <strong>convenience: we know you and we see you<\/strong>. I'm already getting that from AI tools elsewhere in my life; I'm looking forward to it in shopping.'\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m6-h9\">6.7 Three answers to friction<\/h3>\n<ul>\n<li>Setup: \"Pain points still exist from discovery to add-to-cart. What are you doing to create frictionless commerce?\"<\/li>\n<li><strong>Quince: show, don't tell.<\/strong> \"I'm a storyteller by trade — documentaries, a book. I can sit here all day telling you how unbelievable this sweater feels, where it was sourced — <strong>but until I show you, that's when things click<\/strong>. Frictionless isn't making the button smoother; it's <strong>making them believe you earlier<\/strong> so they never stop along the way to ask 'is this actually good? do I trust this?'\"<\/li>\n<li><strong>Daydream<\/strong>: endorses the calendar-agent vision of frictionlessness (6.6); plus the industry table stakes — better searchability, better size &amp; fit prediction — \"remove all the challenges that currently plague e-com.\"<\/li>\n<li><strong>SSENSE: operational friction (unique and concrete).<\/strong> \"Building and running a content team for <strong>500+ brands<\/strong> is bound by cost and operational constraints. You want to create the infeasible world for each brand — <strong>the Balmain universe, the Balenciaga universe<\/strong> — but you can't; that's not realistic. So everything lands on the same nice white background, <strong>which does nothing for the emerging designer you need to learn more about<\/strong>. My frictionless world: <strong>flexible production arms that can create those more immersive experiences<\/strong> — so when you discover a new brand on our site, it immediately tells you what you need to know and why you should care. AI might make that possible.\"<\/li>\n<\/ul>\n<h3 id=\"m6-h10\">6.8 Daydream's cold start: trusting an AI shopping platform<\/h3>\n<ul>\n<li>Setup: \"For platforms like Daydream the biggest friction is the <strong>first step<\/strong> — there's an inherent mistrust of AI platforms. What gets people to hop over?\"<\/li>\n<li>The (honest) answer: \"That is the challenge. <strong>Come to our acquisition!<\/strong> (laughter)<ul>\n<li>Strategy: focus on <strong>the cohort that's interested in AI and open to that shopping experience<\/strong> — we have men's and women's, but we're focused on women in that cohort.<\/li>\n<li>Mindset: \"Some people are afraid of AI and not interested; some are very interested. <strong>Focus on those people right now.<\/strong> We're building a new company; we need a group of excited shoppers who'll experience it, give feedback, <strong>understand that sometimes we make mistakes and give us another chance<\/strong> — like ChatGPT's 'these results may not be right, try again.'\"<\/li>\n<li>The line: <strong>\"We're building the plane as we fly it.\"<\/strong> — moderator: \"<strong>Don't hallucinate.<\/strong>\" (laughter)<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m6-h11\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>The moderator's opening compliment to Daydream's CMO: \"You look right on brand\" — \"I knew you'd have a beautiful outfit; we were all wondering what to wear to a fashion tech conference.\"<\/li>\n<li>Quince's \"I get a little excited\" — the genuine product passion was a room-level memory point.<\/li>\n<li>SSENSE's \"your body moved here; you might as well get something (champagne/sofa)\" is an effective rebuttal to omnichannel platitudes.<\/li>\n<li>\"Come to our acquisition!\" — the most honest startup line of the day.<\/li>\n<\/ul><\/section>", "sub": [{"id": "m6-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m6-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m6-h3", "t": "6.1 Quince: the quality-for-trust flywheel (opening of Pier 86 4)", "lvl": 3}, {"id": "m6-h4", "t": "6.2 Quince: restraint on social (Pier 86 5 segment)", "lvl": 3}, {"id": "m6-h5", "t": "6.3 SSENSE: consistency as a system (Pier 86 4 segment)", "lvl": 3}, {"id": "m6-h6", "t": "6.4 Daydream: the mechanics of AI-native shopping", "lvl": 3}, {"id": "m6-h7", "t": "6.5 Personalization: creepy vs. delightful", "lvl": 3}, {"id": "m6-h8", "t": "6.6 Should digital replicate the bespoke in-store experience? (A rare contrarian answer)", "lvl": 3}, {"id": "m6-h9", "t": "6.7 Three answers to friction", "lvl": 3}, {"id": "m6-h10", "t": "6.8 Daydream's cold start: trusting an AI shopping platform", "lvl": 3}, {"id": "m6-h11", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "5:05–5:45 PM", "panelists": [{"name": "Camille Gilbert-Trepanier", "org": "SSENSE", "role": "SSENSE, Director of Marketing & Creative Operations"}, {"name": "Dakota Kate Isaacs", "org": "Quince", "role": "Quince, Head of Brand Strategy & Narrative"}, {"name": "Jennifer Koen", "org": "Daydream", "role": "Daydream, CMO"}, {"name": "Mariel Poole", "org": "Meta", "role": "Meta, Head of Industry: Retail Fashion & Luxury"}], "moderator": [{"name": "Stacia Datskovska", "org": "WWD", "role": "WWD"}]}}, "m7": {"id": "m7", "title": "Panel ⑦: Omnichannel Innovation", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m7-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>Leap's CEO doctrine: master the basics<\/strong> — buy-online-return-in-store and inventory visibility are table stakes, yet a shocking share of retailers can't do them; complexity grows <strong>exponentially<\/strong> with store count.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\"><strong>The physical store is a product-innovation intelligence station<\/strong>: through store feedback, Frankie's Bikinis went from 95% swim to ~55% ready-to-wear — pure online would never have discovered it.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>Shopify: omnichannel isn't a marketing strategy, it's architecture<\/strong>; the funnel is dead — \"every channel is your conversion channel.\"<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>SpreeAI: clean back-end data is the precondition of agentic commerce<\/strong>; the right use of VTO is solving real store gaps (clienteling, fitting rooms, out-of-stock sizes), not \"a screen in the store.\"<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\"><strong>RTR redefines rental as a discovery tool + trust accelerator<\/strong> — customers try ~45 new brands a year; rental data knows \"what happened after she wore it,\" which DTC never knows.<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m7-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m7-h3\">7.1 Opening: \"Your best recent omnichannel experience?\" (Pier 86 6 segment)<\/h3>\n<ul>\n<li><strong>The Shopify hat story<\/strong>: \"Every time I travel I step into a store I've never shopped. Recently in Palm Springs, a fantastic independent business — I bought a hat, and <strong>as I went to insert my credit card the gentleman said: 'Thanks, Guy(?), great to see you'<\/strong> — that's the power of Shopify (Shop Pay recognition): <strong>I'm a first-time customer, but I was recognized<\/strong>. We started talking, and I made another purchase — <strong>it turned from a single transaction into a moment<\/strong>.\"<\/li>\n<li><strong>Rent the Runway (Kaitlyn)<\/strong>: \"My answer is not a fashion answer, so maybe it's the wrong answer — <strong>Instacart<\/strong>. I use it multiple times a week and it's changed how I shop for groceries: it knows what I want, recommends what's popular in the store and what customers like me are buying; I have two kids who eat a lot, so I just repeat — and it shows up at my door. <strong>I know I'm paying more for those groceries, and honestly I don't care.<\/strong>\" (→ The benchmark omnichannel experience may come from outside fashion; \"it knows what I want\" beats everything.)<\/li>\n<li>Side note: Kaitlyn also co-leads RTR's <strong>inventory innovation cross-functional group<\/strong> — \"all things making inventory function better for our customers.\"<\/li>\n<\/ul>\n<h3 id=\"m7-h4\">7.2 Leap: pour the foundation first (Pier 86 7 main body)<\/h3>\n<ul>\n<li>Context: Leap operates physical stores for brands (\"the retail platform for digitally native brands\"), running <strong>~115 locations for ~50 brands<\/strong>.<\/li>\n<li>Historical frame: \"Twenty-plus years ago your only distribution channel was physical — your own stores or wholesale. <strong>Now there are 50 different places to sell your product<\/strong> — marketplaces, platforms, your own DTC, your own stores, wholesale… Creating one sustained, efficient, personalized commercial strategy across that is <strong>more difficult than most realize<\/strong>.\"<\/li>\n<li><strong>Basic #1: bidirectional fulfillment.<\/strong> \"Buy on web, return in store; buy in store, return to web; buy online, curbside pickup — <strong>table stakes in today's world, but you'd be surprised how many retailers haven't mastered them<\/strong>.\"<\/li>\n<li><strong>Basic #2: inventory visibility.<\/strong> \"People go out of their way for brands they love — at our LA stores, people drive almost two hours up from south of Newport Beach — and to walk in and find we don't have the item is brutal. It's not that the retailer doesn't want it there; <strong>they often just can't see their stock<\/strong>. Visibility across the warehouse and the store network = right product, right place, right time, right person. Table stakes — and genuinely hard.\"<\/li>\n<li><strong>The math of scale<\/strong>: \"With one store you can master it. Add five, ten, fifteen stores — <strong>the complexity isn't additive, it's exponential<\/strong>. So: <strong>don't get so fancy. Don't do all the cute things out of the gate. Be mindful of your dollars and master the basics — do that and your customers will love you.<\/strong>\"<\/li>\n<li><strong>The cross-brand data network<\/strong>: \"We're just now tackling personalization. With a Shop Pay-style unique identifier, <strong>we see how the same customer shops not just at Frankie's Bikinis but across the network of brands<\/strong> — 'this individual has a propensity for outerwear, basics, and footwear' — and then you can service her with <strong>surprise and delight<\/strong> she'd never otherwise get.\"<\/li>\n<\/ul>\n<h3 id=\"m7-h5\">7.3 Leap: the store as an underrated innovation engine<\/h3>\n<ul>\n<li>\"Physical retail is suddenly back in vogue — if COVID taught us anything, it's that <strong>we're humans, we're social creatures, we want to do this together<\/strong>.\"<\/li>\n<li><strong>The store's unique value: product innovation.<\/strong> \"A customer tries something on and tells you to your face: 'the fabrication isn't right — here's why; maybe my skin is sensitive to it.' <strong>You'd never know that<\/strong> from wholesale distribution or DTC online (at best a customer-service email). Or: 'I love you so much — please use this fabrication for a full winter line.' <strong>That qualitative feedback from sales associates and store leaders drives the innovation pipeline inside these brands. It is not to be overlooked.<\/strong>\"<\/li>\n<li><strong>The flagship case: Frankie's Bikinis.<\/strong> \"When they first worked with us (the first store on Mercer), they were <strong>~95% swim<\/strong>; today we power 10 stores for them across the US and they're <strong>about 55% ready-to-wear / 45% swim<\/strong> — and they'd never have known had they not leaned in and listened to the shopper over and over.\"<\/li>\n<li><strong>Who needs physical most?<\/strong> \"Mission critical for <strong>$200+ AUR<\/strong> and premium/luxury categories — <strong>otherwise what's the delta between you and the comparable product?<\/strong> The touch, feel, test-drive experience is part of the delta. Also things that are cool and rare.\"<\/li>\n<\/ul>\n<h3 id=\"m7-h6\">7.4 Shopify: the architecture thesis and the death of the funnel<\/h3>\n<ul>\n<li><strong>The positioning line<\/strong>: \"<strong>Omnichannel is not just a marketing strategy — it's part of the architecture of how brands go to market.<\/strong> The brands I deal with today built their businesses this way. Ten years ago traditional retailers were asking 'do we even need to invest in e-commerce?' and digitally native brands were saying 'maybe pop-ups are the best use of my time.' <strong>Today it is impossible to scale and get that reach without an omnichannel strategy.<\/strong>\"<\/li>\n<li><strong>Three focal points<\/strong>:<ol>\n<li><strong>Recognizing your customer across sales channels<\/strong>;<\/li>\n<li><strong>Inventory<\/strong> — \"do you have it, and if not, how quickly can I get it?\";<\/li>\n<li><strong>Brand experience<\/strong> — \"are you replicating the quality of your brand across e-commerce, pop-ups, socials, and brick-and-mortar? That has to be priority one.\"<\/li>\n<\/ol>\n<\/li>\n<li><strong>Sales vs. awareness<\/strong>: \"<strong>We try to separate sales and awareness too much — they are wildly interconnected. If you're doing awareness well, the intersection is conversion.<\/strong> The best brands do that all the way through.\"<\/li>\n<li><strong>The funnel is dead (Leap jumping in)<\/strong>: \"<strong>The funnel as we knew it — take it, throw it out.<\/strong> Discovery and consideration happen so much earlier in the process. So which channel is actually your conversion channel? <strong>It's all of them.<\/strong>\"<\/li>\n<li><strong>Data discipline (Shopify continuing)<\/strong>: \"Collect the contact data; think about account priority, loyalty, post-purchase sales. <strong>Understand your data and your data integrity.<\/strong> And: <strong>you don't need a sales channel for everything<\/strong> — being everywhere is exactly where the tech-debt traps come from. Simplify the basics so that <strong>every new channel meets the same customer brain<\/strong> — they interact with your brand in the same way in a new channel.\"<\/li>\n<\/ul>\n<h3 id=\"m7-h7\">7.5 Shopify: the channel curriculum for emerging brands<\/h3>\n<ul>\n<li>The vantage point: \"Shopify sees businesses from their <strong>first dollar to their billionth dollar<\/strong> — not many platforms see what a first-time sale looks like.\"<\/li>\n<li>The advice: \"<strong>Map your customer journey from day one and keep it simple<\/strong>: first transaction → next transaction → lifetime customer.<ul>\n<li>An event launch <strong>can't be anonymous<\/strong>: a QR code → waitlist or account creation → personalized follow-up;<\/li>\n<li>You land the product-launch sale? Amazing — <strong>immediately shift the mindset to turning them into a repeat buyer<\/strong>;<\/li>\n<li><strong>Where conversion falls flat is usually not channel count — 'if you have the demand and you're losing conversion, it's because we're not caring enough about the customer.'<\/strong>\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m7-h8\">7.6 SpreeAI: the right way to deploy virtual try-on<\/h3>\n<ul>\n<li>The anti-pattern first: \"When I talk to brands, generation one is 'how do I get a screen in my store so people walk past and it puts clothes on them?' Okay — but remember: <strong>your store makes money by maximizing every dollar per square foot. Why would I take out SKUs I can sell and put in a screen?<\/strong>\"<\/li>\n<li>The method: \"Ask: <strong>what gaps do my stores have right now, and how is VTO a tool to solve them?<\/strong>\" Three scenarios:<ol>\n<li><strong>Luxury clienteling<\/strong>: \"Sales associates are the front-line army; they have the client's number. Imagine: 'Diana, you're a VIP at Alexander McQueen — you spend a million dollars a year here. <strong>Here's the newest collection fresh off fashion week — on you.<\/strong> I know you have that big fundraiser up in Toronto — <strong>here's an outfit built from the jacket you bought a couple of years ago plus this runway piece nobody's had yet.<\/strong> I can ship it to you — or come in, we'll grab a glass of champagne and do it.' The VIP treatment digitally amplified, not replaced.\"<\/li>\n<li><strong>Fast-fashion fitting rooms<\/strong>: \"Anyone here who's shopped Zara — <strong>the dressing rooms, hate me<\/strong> (laughter): terrible lighting, long lines, disarray. What if, on my phone, I do a quick try-on and take <strong>3 of these 13 items<\/strong> into that little cube instead — and just check out?\"<\/li>\n<li><strong>Out-of-stock sizes<\/strong>: \"You love it, they don't have your size. <strong>Virtual try-on confirms the look and the size — perfect, ship it to my house.<\/strong> A sale that would have walked.\"<\/li>\n<\/ol>\n<\/li>\n<li><strong>The agentic-commerce foundation argument (important)<\/strong>: \"Back in January at <strong>NRF<\/strong>, everybody was talking agentic commerce — 'oh my gosh, autonomous agents running around with my credit card.' Maybe. But realize: <strong>how will those agents find the products your brand wants to sell?<\/strong> 'I've got a wedding, I'm looking for a dress, these are my favorite brands' — <strong>the agent can only find that if your back-end data is clean. Fill out every single data field — not just for today, but for six months out.<\/strong>\"<\/li>\n<li><strong>Higher-order uses of VTO data<\/strong>: \"Data is everything — we're all playing with ChatGPT, <strong>or my favorite, Claude<\/strong> — and your product is only as good as the data you put into it. With VTO data flowing back to the brand:<ul>\n<li><strong>High try-on, low conversion = maybe a fit issue<\/strong> — direct feedback to product development;<\/li>\n<li><strong>Official styling vs. how consumers actually style it<\/strong> — marketing intelligence;<\/li>\n<li>Plus better recommendations, retargeting, hyper-personalized experiences. <strong>If done right.<\/strong>\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m7-h9\">7.7 Rent the Runway: rental = trust accelerator<\/h3>\n<ul>\n<li><strong>The redefinition<\/strong> (\"I'm going to blow all your minds\"): \"<strong>Rental is a discovery tool and a trust accelerator.<\/strong> Getting a customer to physically purchase something is expensive — for the customer, for the brand, for the store. <strong>Rental removes that friction: it's not scary; she's just going to try it.<\/strong>\"<\/li>\n<li><strong>The number<\/strong>: \"At Rent the Runway, customers <strong>try around 45 new brands a year<\/strong> — and she forms a lasting impression and memory of what that brand is, which turns her into a customer of the brand.\"<\/li>\n<li>To the brands: \"<strong>Brands need to not be scared of rental — it's not going to cannibalize your business.<\/strong> Our most successful brand partners changed their thinking and use us as <strong>a data source<\/strong>:<ul>\n<li>A highly engaged community leaving <strong>thousands and thousands of reviews<\/strong>, all shared with brands;<\/li>\n<li><strong>DTC knows 'she bought it'; rental knows her actual experience with it<\/strong> — did she wear it? did she like the fit? is she re-renting? does she want to keep it longer? is she setting stock notifications?<\/li>\n<li>One caveat: <strong>consistency of fit and quality is extremely important in rental<\/strong> — one bad fit experience and you may lose her.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m7-h10\">7.8 Closing: \"One thing a brand could do tomorrow, without a massive technology investment, to meaningfully improve omnichannel\"<\/h3>\n<ul>\n<li><strong>Leap (Amish Tolia — the most energizing answer of the session)<\/strong>:<ul>\n<li>\"The world is changing so fast — these AI companies are evolving every single day. <strong>Running retail, running DTC, building a brand is hard<\/strong> — buying inventory, predicting 3/6/12 months forward, taking the capital risk — at any scale.<\/li>\n<li>The real problem: <strong>a concentration of resistance inside the workplace to adopting these AI tools<\/strong>.<\/li>\n<li>What Leap did: an internal <strong>agentic AI hackathon<\/strong> — organized by the company's 'AI czar' (one of our lead AI software engineers) — pulling department heads and function leaders into a multi-day workshop. <strong>'It was unbelievable what was built'<\/strong>: workflows that historically took dozens and dozens of hours automated; replenishment models improved; marketing personalization improved; productivity up.<\/li>\n<li>The directive: <strong>'Lean in. Don't outsource it. Don't delegate it. Learn these tools for yourselves.'<\/strong> On Saturday and Sunday I'm literally at home (with Claude/AI tools) — my wife asks what I'm doing… Anyway: lean in, take risks, learn the tools yourself, and apply them to your business — it will improve your operation and drive a better omnichannel across online, stores, everything.\"<\/li>\n<\/ul>\n<\/li>\n<li><strong>Shopify (Diana)<\/strong>: \"<strong>Understand and map your customer journey and identify where the debt is<\/strong> — make sure you can convert at every opportunity you present; customers expect <strong>to be recognized at the point of entry<\/strong>.\"<\/li>\n<li><strong>RTR (Kaitlyn)<\/strong>: \"<strong>Listen to your customer.<\/strong> Don't just look at the return rate — <strong>look at the comments: why is she returning it?<\/strong> You can use AI to scale and summarize all those data points; but to build your brand you must understand the friction points: what's making her really happy (do more of that), and why isn't she converting (fix it).\"<\/li>\n<li><strong>SpreeAI (Chelsea)<\/strong>: \"<strong>Be open-minded.<\/strong> Everybody is at the same starting point trying to figure out AI — nobody really has it figured out. You don't have to co-work on weekends like my friend here (I admire you) — but <strong>take a step forward: try, don't be scared; get out there, test it, fail, fail again<\/strong>. Gone are the days of making decisions by looking in the rear-view mirror — history helps, but <strong>on AI we're all starting at the same point<\/strong>. Take risks, stay flexible, do new things, get uncomfortable — that's where the growth is.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m7-h11\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>\"The KISS principle — keep it simple, insert the last word\" — SpreeAI quoting her dad, to knowing laughter.<\/li>\n<li>SpreeAI's \"<strong>or my favorite, Claude<\/strong>\" — a rare on-stage LLM preference.<\/li>\n<li>The RTR \"can you say that again?\" beat — the honest rhythm of a live panel.<\/li>\n<li>Leap's \"surprise and delight\" — a retail classic reborn in a data context.<\/li>\n<\/ul><\/section>", "sub": [{"id": "m7-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m7-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m7-h3", "t": "7.1 Opening: \"Your best recent omnichannel experience?\" (Pier 86 6 segment)", "lvl": 3}, {"id": "m7-h4", "t": "7.2 Leap: pour the foundation first (Pier 86 7 main body)", "lvl": 3}, {"id": "m7-h5", "t": "7.3 Leap: the store as an underrated innovation engine", "lvl": 3}, {"id": "m7-h6", "t": "7.4 Shopify: the architecture thesis and the death of the funnel", "lvl": 3}, {"id": "m7-h7", "t": "7.5 Shopify: the channel curriculum for emerging brands", "lvl": 3}, {"id": "m7-h8", "t": "7.6 SpreeAI: the right way to deploy virtual try-on", "lvl": 3}, {"id": "m7-h9", "t": "7.7 Rent the Runway: rental = trust accelerator", "lvl": 3}, {"id": "m7-h10", "t": "7.8 Closing: \"One thing a brand could do tomorrow, without a massive technology investment, to meaningfully improve omnichannel\"", "lvl": 3}, {"id": "m7-h11", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "5:50–6:25 PM", "panelists": [{"name": "Chelsea Suitos", "org": "SpreeAI", "role": "SpreeAI, Global Head of Partnerships & BD"}, {"name": "Kaitlyn Bailey", "org": "Rent the Runway", "role": "Rent the Runway, SVP Buying"}, {"name": "Diana Gates", "org": "Shopify", "role": "Shopify, Head of Mid Market Sales"}, {"name": "Amish Tolia", "org": "Leap", "role": "Leap, CEO"}], "moderator": [{"name": "Emma Rayder", "org": "All Things Fashion Tech", "role": "All Things Fashion Tech"}]}}, "m8": {"id": "m8", "title": "Panel ⑧: Manufacturing & Design", "html": "<section class=\"layer\" data-layer=\"key\"><h2 id=\"m8-h1\">[KEY TAKEAWAYS]<\/h2>\n<div class=\"ktgrid\"><div class=\"kt\"><span class=\"ktn\">1<\/span><div class=\"ktb\"><strong>The industry's original sin, in numbers<\/strong>: <strong>150 billion garments made per year, ~30% never sell<\/strong>; <strong>at least $1.5 trillion wasted annually<\/strong>; the sewing machine hasn't fundamentally changed since ~1830.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">2<\/span><div class=\"ktb\">Four technology paths attacking one problem: <strong>CLO (3D digital sampling), Kornit (on-demand printing), TomTex (bio-based materials), Unspun (3D weaving direct-to-garment)<\/strong> — all converging on demand-driven, 1:1 supply-demand, MOQ=1.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">3<\/span><div class=\"ktb\"><strong>\"Sell, then make\" vs. \"make, then sell\"<\/strong>: Kornit's Netflix-vs-Blockbuster analogy was the sharpest frame of the session; its biggest customer, Merch by Amazon, already proves it.<\/div><\/div><div class=\"kt\"><span class=\"ktn\">4<\/span><div class=\"ktb\"><strong>The sustainability narrative has matured<\/strong>: the green premium is dead (price/performance parity required); the new selling points are <strong>decoupling from oil prices/tariffs + health (microplastics against your skin)<\/strong>. \"Stop calling it vegan.\"<\/div><\/div><div class=\"kt\"><span class=\"ktn\">5<\/span><div class=\"ktb\"><strong>The biggest obstacle is organizational inertia<\/strong>: \"All this incredible front-end tech — and as soon as it passes product development into buying, sourcing, and merchandising, it's back to first cost and IMU, and everything crumbles.\"<\/div><\/div><\/div>\n<\/section><section class=\"layer\" data-layer=\"detail\"><h2 id=\"m8-h2\">[FULL DETAIL]<\/h2>\n<h3 id=\"m8-h3\">8.1 The moderator's confession of a designer (Simplifyber)<\/h3>\n<ul>\n<li>Background: \"I was a fashion designer for <strong>24 years<\/strong> — collections for <strong>Vera Wang, Calvin Klein, and Alexander McQueen<\/strong>; I also worked in sustainable design — <strong>worked for Bono for a while<\/strong> (i.e., Edun), starting sustainable-material collections made in Africa.\"<\/li>\n<li>The founding motivation (cutting): \"As a sustainable designer I wasn't happy with my level of impact — <strong>I realized the problem wasn't all design; we needed better tools<\/strong>: the tools we have are old-fashioned, full of hand labor — <strong>and that's exactly why so much polyester and plastic gets used<\/strong>.\"<\/li>\n<li>The Simplifyber technology: \"I invented a process to <strong>mold natural plant fibers into 3D shapes in one step<\/strong> — you start with fibers in a liquid bath, and <strong>in about 100 seconds you get shaped panels<\/strong> (showing one). It's designed to bring down the cost and complexity of working with natural materials and create possibilities that weren't there before.\"<\/li>\n<li>The session's frame: \"Every company on this panel makes new tools for designers — new paths, new design possibilities.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h4\">8.2 Unspun (Beth Esponnette): 3D weaving, skipping the sewing<\/h3>\n<ul>\n<li>The problem statement: \"We looked at the supply chain and asked: <strong>why is it so broken? Why do we make so much stuff before people want it?<\/strong> This industry makes <strong>150 billion garments a year — and some say 30% of those never get sold<\/strong>. That 30% is automatically waste — and a lot of what does sell becomes waste too. It's a not-very-thoughtful way of doing things.\"<\/li>\n<li>Reducing it to one machine: \"It comes down to, unfortunately, <strong>the sewing machine<\/strong>. It's beautiful — I love sewing — but it's <strong>extremely manual<\/strong>: you sit and run fabric through it with your hands; it takes a lot of time. To hit a good price you ship it overseas and crank volumes for economies of scale — <strong>and that's how you get the mountain of stuff nobody needs<\/strong>.\"<\/li>\n<li>The historical irony: \"<strong>The sewing machine was invented around 1830 — almost 200 years ago<\/strong> — and there's a lot of new technology available now.\"<\/li>\n<li>The approach: \"We created <strong>3D weaving<\/strong> — inspired by 3D printing and by nature's additive processes: <strong>weave the final garment directly and skip the sewing process<\/strong>.\"<\/li>\n<li>The live demo: \"I'm wearing a pair of our pants (stands up — 'no one has stood up today, so I will'). They look very basic — <strong>and I'm kind of proud now that nobody asks about them<\/strong>: I used to wear our prototypes around and get stares, sometimes good ones. Now our products just fit in.\" The moderator on the seamlessness: \"Really impressive.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h5\">8.3 TomTex (Ross McBee): replacing petrochemical plastics<\/h3>\n<ul>\n<li>The company: \"We're fundamentally interested in <strong>replacing petrochemically derived plastics<\/strong> — starting in textiles: leather-like, suede-like materials.\"<\/li>\n<li>The worldview (\"a paired nightmare and promise\"): \"The nightmare: <strong>even if the energy sector gets fixed, the planet drowns in plastic<\/strong> — a whole lot of oil goes into materials, and we haven't solved the fundamental addiction. In many ways it's a harder problem than energy.\n  The promise: <strong>nature is full of materials as performant as — or more than — anything humans make<\/strong>. The classic example: <strong>spider silk is roughly twice the specific strength of aircraft-grade aluminum, and it's made of sugar and water<\/strong>. Our challenge: figure out how to make that, bring it into circulation, <strong>and make it cheap enough that people can buy it<\/strong>.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h6\">8.4 Kornit Digital (Scott Walton): sell first, then make<\/h3>\n<ul>\n<li>The company: \"We're a textile-technology manufacturer, but <strong>our DNA is the factory<\/strong>. Our equipment uses <strong>water-based, fully biodegradable inks<\/strong> in the <strong>print-on-demand<\/strong> industry.\"<\/li>\n<li>The commercial proof: \"<strong>Our biggest customer is Merch by Amazon<\/strong> — <strong>you sell the product, then you make it<\/strong>, versus producing it and trying to sell it.\"<\/li>\n<li>The role: \"I run our on-demand strategy — working with brands, creators, and platforms to <strong>move that enormous, wasteful forecast-driven operation<\/strong> (with at least 30–40% overproduction) <strong>toward responsible, sustainable models that react to demand instead of forecasting it<\/strong>.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h7\">8.5 CLO (Courtney Agnes): 3D digital sampling<\/h3>\n<ul>\n<li>The path: \"I came to CLO about seven years ago, after seven years in the industry in design and project management.\"<\/li>\n<li>The product: \"CLO's 3D design software has helped the industry <strong>move away from physical sample development into digital<\/strong> — reducing samples, cost, and time; and most importantly to me, <strong>empowering designers, technical designers, and pattern makers<\/strong> to create product and bring their vision to life. I work with enterprise clients — major brands and retailers across the States — to find their biggest pain points and solve them through digitized process creation.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h8\">8.6 Lightning round: \"If I'm a designer using your tool, how does it help me make better product?\"<\/h3>\n<ul>\n<li><strong>CLO<\/strong>: \"I remember being a designer: standing in front of a room full of people holding a best-seller, an updated sketch, a swatch, a print — <strong>wasting 20 minutes asking everyone to imagine the vision<\/strong>. You no longer have to. With CLO you create all of it digitally to your heart's content — <strong>no constraints of time or sample cost<\/strong>. CLO empowers designers and technical designers <strong>to make better decisions for their products<\/strong>.\"<\/li>\n<li><strong>Kornit<\/strong>: \"We bring the physical upfront into ideation: <strong>sample and strike off in real time, in minutes, on any fabric<\/strong> — instead of sending it around the world and having it come back not quite right. From ideation to physical product that can scale — that's where on-demand technology comes into its own.\"<\/li>\n<li><strong>TomTex<\/strong>: \"On the materials side, our goal is to be a <strong>drop-in for the things you already love using<\/strong>. Everyone knows the problem of the 'crunchy alternative thing you don't actually want to use.' <strong>Our goal is performance, beauty, and compatibility with all the processes you're used to<\/strong> — with radical sustainability underneath.\"<\/li>\n<li><strong>Unspun<\/strong>: \"The physical world is what actually gets made and consumed at the end of the day. With all the generation happening on the AI side, the question is: <strong>how do you take that one-off product to an MOQ of one?<\/strong> It requires production that <strong>easily and seamlessly interacts with an AI<\/strong> — that's what we're building.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h9\">8.7 \"What was harder than expected about adoption?\" (CLO's transformation playbook)<\/h3>\n<ul>\n<li>\"A few years back we realized companies use 3D either <strong>project-based<\/strong> (one strong user on one team) or as <strong>total business transformation<\/strong> — and our onboarding was built for the project-based case: <strong>feature-focused training, crammed into a short window<\/strong> because clients were in a hurry.\"<\/li>\n<li>\"<strong>About three years ago we moved from training to features to training to workflows<\/strong> — you can know every feature in the software, but <strong>if it doesn't connect to your day-to-day work, it's worth nothing<\/strong>. Clients commit enormous resources, time, and money to adopt this way of working; we have to pull through for them.\"<\/li>\n<li>\"It's really <strong>people-and-process change<\/strong>, not just software — know the people, know what matters in their business, then take the steps accordingly.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h10\">8.8 Product-market fit is not a binary event (Unspun's trust-chain long march)<\/h3>\n<ul>\n<li>The question (one of the day's best): \"Founders talk about PMF as a binary event; for manufacturing companies it doesn't work that way. <strong>What did you think your market was when you started — and how did that change?<\/strong>\"<\/li>\n<li>Unspun's story (textbook):<ul>\n<li>The intent: change the supply chain → so the customer should be <strong>manufacturers<\/strong>.<\/li>\n<li>Reality: the industry is \"in some ways so efficient — every piece totally optimized — that <strong>getting your foot in the door is really tricky<\/strong>.\" Manufacturers: \"Who are you, and why would we trust you?\"<\/li>\n<li>Step back to <strong>brands<\/strong>: \"Who are you, and why would we trust you? Who's your customer?\"<\/li>\n<li>Step back again to <strong>consumers<\/strong> — \"we backed up as far as we could: <strong>let's start our own brand<\/strong> and prove it ourselves.\"<\/li>\n<li>Execution: \"We were in Hong Kong and Shenzhen working on our hardware (we're fundamentally a hardware company), doing pop-ups all over Hong Kong — <strong>we even rented a truck and got people to come buy product under a truck<\/strong>.\"<\/li>\n<li>The break: \"That was enough to get <strong>H&amp;M<\/strong> in the door — their employees tried it, found it interesting, <strong>brought it in-house, then we did pop-ups with them<\/strong>; and with that we could finally go to manufacturers: '<strong>look — they trusted us.<\/strong>'\"<\/li>\n<li>The lesson: \"<strong>Find the balance between partnering with the people who can do it — and, when they're not up for it, proving it by doing it yourself.<\/strong> Sometimes trust has to be manufactured too.\"<\/li>\n<\/ul>\n<\/li>\n<\/ul>\n<h3 id=\"m8-h11\">8.9 Who do you sell to, and who are the gatekeepers? (TomTex's triangle)<\/h3>\n<ul>\n<li>The counterintuitive realization: \"It took us a while to totally internalize that <strong>brands are not the ones that make things<\/strong> — brands very often don't even know what material goes into what they're making. <strong>The factory is the entity transacting for materials all the time.<\/strong>\"<\/li>\n<li>The bind: brands say \"so cool, but I don't know you and I don't believe you can make this at scale\"; factories say \"who are you?\"<\/li>\n<li>The triangle: \"Our customer is effectively <strong>both the brand and the manufacturer<\/strong>:<ul>\n<li>We engineered the technology to be <strong>directly plug-and-play with conventional synthetic-leather production<\/strong> — same coating lines, same processes — with our special sauce and radical sustainability;<\/li>\n<li>To the factory: '<strong>I'm bringing a brand you already work with; this material isn't expensive; it runs on your existing lines; you can sell it on to other people too.<\/strong> You're great at making things; we add the chemistry and the storytelling';<\/li>\n<li><strong>Add value to every edge of the triangle.<\/strong>\"<\/li>\n<\/ul>\n<\/li>\n<li>The grounding note: \"You end up on the factory floor a lot — good. <strong>You cannot make sustainable change at real impact unless you put it in the hands of the people who already make this stuff at megaton, gigaton scales.<\/strong> A bit of a catch-22 at first, but we're definitely out of it now.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h12\">8.10 The Walmart catch-22 (Unspun, continued)<\/h3>\n<ul>\n<li>\"Our first machines are shipping overseas — that side is taken care of; <strong>the hard part is onshore: getting production going in the US<\/strong>.\"<\/li>\n<li>The classic deadlock: \"One great open brand partner is <strong>Walmart<\/strong> — they said: 'We're ready to sign a PO; the product's approved; <strong>now we just need your factory<\/strong>.' The factories say: 'Cool — we're ready to get the machines in; <strong>first we just need a PO<\/strong>.'\"<\/li>\n<li>The fix (laughing): \"<strong>Get everyone in a room and have them all shake hands at the same time<\/strong> — that's basically what we've been doing: lots of three-way conversations. It's going really well, but it is a funny situation to be in.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h13\">8.11 The ticking runway clock: surviving sales cycles measured in years<\/h3>\n<ul>\n<li>The question: \"Manufacturing innovation sales cycles run months or years; you're up against funding timelines and rivals. <strong>How do you build a company while waiting for the industry to catch up?<\/strong>\"<\/li>\n<li><strong>CLO<\/strong> (a public company's serenity, but the method travels): \"We've always been user-driven from the top down. From a strictly sales point of view: <strong>'the money will come when it's ready.'<\/strong> Even in a sales role, <strong>my goal is never to get a sale — my goal is to help people<\/strong>. Brands often say 'we want CLO now, roll it out' — <strong>and we're the ones pumping the brakes<\/strong>: 'Hang on — do you actually have the resources? A stance on how this should be used? Are your people internally excited and ready?' If the teams don't understand the purpose and the benefit, <strong>it will never get traction<\/strong>. Keep 'help people' ahead of 'sell,' and everything falls into place.\"<\/li>\n<li>CLO addendum (supply-chain view): \"Don't focus solely on the brands and retailers — <strong>serve their entire supply chain and overseas manufacturers directly<\/strong>; that's where true business transformation and the real ROI happen.\"<\/li>\n<li><strong>Kornit<\/strong>: \"We call it the <strong>culture clash<\/strong>: a massive disconnect between <strong>spikes in trend demand<\/strong> and <strong>the ability to execute<\/strong>. All the incredible technology you see here is front-end enablement — <strong>if you can't deliver the product from an execution perspective, it doesn't matter<\/strong>. As the manufacturing layer, execution is the whole job.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h14\">8.12 How the sustainability conversation matured (TomTex lead)<\/h3>\n<ul>\n<li>The question: \"Sustainability used to be a moral conversation; today customers expect <strong>performance and cost parity, plus scalability and supply-chain resilience<\/strong>, alongside environmental benefits. What changed?\"<\/li>\n<li>The answer in three layers:<ol>\n<li><strong>The green premium is dead<\/strong>: \"You have to be at the same price; you have to scale; <strong>you have to be the thing they think they're buying — not some weird exception to all the rules<\/strong>.\"<\/li>\n<li><strong>Decoupling from oil and tariffs is the new pitch<\/strong> (tied to the news): \"In the context of whatever the heck happened in the last 48 hours (tariffs) — <strong>we're not petrochemical-based, so our pricing is largely decoupled from the price of oil<\/strong> — which is very much not true of the PU and PVC that go into 'vegan leather.'\"<\/li>\n<li><strong>The health narrative is rising<\/strong>: \"More and more people understand <strong>microplastics<\/strong> — not just planetary health, but the fact that <strong>these materials touch our bodies, often very intimately<\/strong>. Materials should be good for the planet <em>and<\/em> good for you. And by the way — if you measured the (formaldehyde?) levels in the average piece of leather in circulation, you'd be pretty shocked. Presenting value in terms of health and safety, not just carbon, is the new lever.\"<\/li>\n<\/ol>\n<\/li>\n<li>The moderator's industry-history addendum: \"I started in sustainability in <strong>2006<\/strong> — back then nobody even used the word; they called it 'eco,' and nobody could define it. It's still muddy — <strong>so many metrics; even the LCA systems and the Paris frameworks don't match each other<\/strong>. But it's gotten a lot better: <strong>consumers actually know a lot of this now<\/strong>; the wording may shift in certain political climates, but people inherently know a lot of this doesn't make sense for their personal lives. And the answer to all of it is what people keep demanding: <strong>transparency<\/strong>.\"<\/li>\n<\/ul>\n<h3 id=\"m8-h15\">8.13 \"What do customers ask today that they didn't five years ago?\" (Kornit lead)<\/h3>\n<ul>\n<li>\"Sustainability is at the top of the agenda — but customers keep trying to <strong>decouple sustainability from profitability, and in my opinion they're inseparable: the worst thing you can do for the planet is to make something that never gets sold. That's the first thing.<\/strong>\"<\/li>\n<li>\"We've sat in many C-suites where 'sustainability' immediately becomes 'how much will that cost me?' <strong>Reverse it: there is at least $1.5 trillion simply wasted every single year.<\/strong> From a capital-markets perspective, <strong>moving away from the forecast system toward demand-driven data insights and technology is the most impactful thing — and the easiest place to start.<\/strong>\"<\/li>\n<li>Tooling: \"There are technologies (e.g., Cirotech(?)) using AI for <strong>planning and merchandising<\/strong> — post-manufacturing, in-market, they <strong>optimize where product needs to be<\/strong>: if it's not selling in the Pacific, don't shuffle inventory there; it's moving in New York, route it to New York. <strong>Plug demand signals into the back end so we're not mass-manufacturing into the void — and the reaction window isn't even 'in season' anymore; it's minutes.<\/strong>\"<\/li>\n<\/ul>\n<h3 id=\"m8-h16\">8.14 The final question: \"It's 2035 — what looks completely outdated about how we design and manufacture today?\"<\/h3>\n<ul>\n<li><strong>Unspun<\/strong>: \"We keep increasing how much we make and increasing our lead times — <strong>the more you make, the longer the lead time, and the further from demand you get<\/strong>. <strong>Brands having to guess — with AI, that just doesn't make any sense.<\/strong> AI is changing the front end; the next step is the back end: make the products we want, when we need them, with <strong>perfect 1:1 supply and demand<\/strong> — and <strong>customize to someone's body shape — not even size, shape<\/strong>. <strong>An MOQ of one is very possible<\/strong>: you no longer need hundreds of thousands of units to hit economies of scale — every product different costs the same as cookie-cutter. In ten years we'll look back and say: '<strong>wait — we were just making so much crap, for no reason?<\/strong>' The future: <strong>more SKUs, less waste.<\/strong>\"<\/li>\n<li><strong>TomTex<\/strong> (a volley of lines):<ol>\n<li>\"<strong>Stop calling it vegan.<\/strong> Be honest.\" (Moderator: \"<strong>Be compostable!<\/strong>\") \"It's the biggest rebrand in the wrong direction I've ever heard of — it's plastic.\"<\/li>\n<li>\"<strong>Netflix versus Blockbuster<\/strong>: why on earth would you want to <em>predict<\/em> which videotapes people want? <strong>Flip it to on-demand<\/strong> — run this business with that model.\"<\/li>\n<li>(The org critique): \"Brands see all this amazing front-end technology; <strong>but as soon as it passes product development into buying, sourcing, and merchandising, the conversation goes back to first cost and IMU — and everything crumbles. It's organizational inertia. That's the problem.<\/strong>\"<\/li>\n<\/ol>\n<\/li>\n<li><strong>CLO<\/strong>: \"<strong>More automation and interoperability<\/strong> — connecting the dots across platforms, <strong>reducing the one-dimensional manual activities<\/strong> — traditional tech is really falling down there.\"<\/li>\n<li>The moderator's close: \"This has been a lot of fun. You are all incredibly functional (laughter). The next panel — Retail Investment Thesis — will begin shortly.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m8-h17\">[QUOTES &amp; COLOR]<\/h2>\n<ul>\n<li>Unspun's pants demo: \"No one has stood up today, so I will.\"<\/li>\n<li>TomTex's performance bar: \"Spider silk = sugar + water ≈ twice the specific strength of aircraft aluminum — nature already won; we're catching up.\"<\/li>\n<li>Kornit's <strong>\"The worst thing you can do for the planet is to make something that never gets sold\"<\/strong> — the most quotable sustainability line of the day.<\/li>\n<li>The recurring antithesis: \"AI is exploding the front end (creation) while the back end (physical execution) lags\" — all four companies consciously position themselves on the back end.<\/li>\n<\/ul><\/section>", "sub": [{"id": "m8-h1", "t": "[KEY TAKEAWAYS]", "lvl": 2}, {"id": "m8-h2", "t": "[FULL DETAIL]", "lvl": 2}, {"id": "m8-h3", "t": "8.1 The moderator's confession of a designer (Simplifyber)", "lvl": 3}, {"id": "m8-h4", "t": "8.2 Unspun (Beth Esponnette): 3D weaving, skipping the sewing", "lvl": 3}, {"id": "m8-h5", "t": "8.3 TomTex (Ross McBee): replacing petrochemical plastics", "lvl": 3}, {"id": "m8-h6", "t": "8.4 Kornit Digital (Scott Walton): sell first, then make", "lvl": 3}, {"id": "m8-h7", "t": "8.5 CLO (Courtney Agnes): 3D digital sampling", "lvl": 3}, {"id": "m8-h8", "t": "8.6 Lightning round: \"If I'm a designer using your tool, how does it help me make better product?\"", "lvl": 3}, {"id": "m8-h9", "t": "8.7 \"What was harder than expected about adoption?\" (CLO's transformation playbook)", "lvl": 3}, {"id": "m8-h10", "t": "8.8 Product-market fit is not a binary event (Unspun's trust-chain long march)", "lvl": 3}, {"id": "m8-h11", "t": "8.9 Who do you sell to, and who are the gatekeepers? (TomTex's triangle)", "lvl": 3}, {"id": "m8-h12", "t": "8.10 The Walmart catch-22 (Unspun, continued)", "lvl": 3}, {"id": "m8-h13", "t": "8.11 The ticking runway clock: surviving sales cycles measured in years", "lvl": 3}, {"id": "m8-h14", "t": "8.12 How the sustainability conversation matured (TomTex lead)", "lvl": 3}, {"id": "m8-h15", "t": "8.13 \"What do customers ask today that they didn't five years ago?\" (Kornit lead)", "lvl": 3}, {"id": "m8-h16", "t": "8.14 The final question: \"It's 2035 — what looks completely outdated about how we design and manufacture today?\"", "lvl": 3}, {"id": "m8-h17", "t": "[QUOTES &amp; COLOR]", "lvl": 2}], "hasLayers": true, "meta": {"time": "6:30–7:05 PM", "panelists": [{"name": "Courtney Agnes", "org": "CLO Virtual Fashion", "role": "CLO Virtual Fashion, Director of Business Development"}, {"name": "Scott Walton", "org": "Kornit Digital", "role": "Kornit Digital, Director Global Business Development"}, {"name": "Ross McBee", "org": "TomTex", "role": "TomTex, Co-Founder & CSO"}, {"name": "Beth Esponnette", "org": "Unspun", "role": "Unspun, Co-Founder & CPO"}], "moderator": [{"name": "Maria Intscher-Owrang", "org": "Founder", "role": "Founder/CEO, Simplifyber"}]}}, "m9": {"id": "m9", "title": "Cross-Panel Synthesis: Five Structural Trends", "html": "<section class=\"layer\" data-layer=\"info\"><blockquote>\n<p>Method: only judgments independently corroborated by at least two panels are included; each comes with its evidence chain and a \"So What.\"<\/p>\n<\/blockquote>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m9-h1\">Trend 1: Agentic commerce moves from concept to infrastructure race<\/h2>\n<p><strong>Confidence: High | Window: 1–3 years<\/strong><\/p>\n<ul>\n<li><strong>Evidence chain<\/strong>: McKinsey's $5T/5–10-year model (①) → GAP rebuilding an AI-first data stack + betting on UCP, \"first large fashion retailer to put a stake down\" (②) → eBay shipping on-platform agentic search (②) → \"everyone at NRF talking agents\" + \"agents can only find products with clean back-end data\" (⑦ SpreeAI/Shopify) → Daydream's calendar-reading agent-stylist endgame (⑥) → fast fashion using agentic models to decide what gets produced (① McKinsey).<\/li>\n<li><strong>So What<\/strong>: a protocol war (UCP vs. others) is underway; early movers shape the rules. <strong>The no-regret move for every brand: get product data agent-ready<\/strong> — the cheapest, highest-certainty investment of 2026. \"Fill out every field — for six months from now.\"<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m9-h2\">Trend 2: Trust becomes the only defensible traffic asset<\/h2>\n<p><strong>Confidence: High<\/strong><\/p>\n<ul>\n<li><strong>Evidence chain<\/strong>: trust density &gt; follower count; private accounts convert (③ ShopMy) → Snap's 70%/91% friend-trust data (③) → LTK banning AI influencers, AI on creator data only, 70% of sales in-app (②) → eBay tying Authenticity Guarantee + Money Back to live, unlocking high tickets (②) → Q
