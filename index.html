uince's \"quality is trust; price is the output\" (⑥) → three platforms agreeing AI does productivity while the taste layer stays human (③).<\/li>\n<li><strong>So What<\/strong>: the AI content flood raises the premium on human trust. Shift budget from \"buying reach\" to \"buying verifiable conversion at trust nodes\"; <strong>merge influencer and performance teams<\/strong> (③'s explicit advice).<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m9-h3\">Trend 3: Intent data is the new starting point of the supply chain<\/h2>\n<p><strong>Confidence: High<\/strong><\/p>\n<ul>\n<li><strong>Evidence chain<\/strong>: Pinterest's visual-intent tagging; \"people don't have the words for what they want\" (①) → the Coachella example in your notes (style searches → data → conviction → on-site demo investment) → JOOR's 102 days + smaller upfront buys + reorders (①) → GAP's \"intent-based was the biggest aha\" (②) → LTK conversational search +3x MoM (②) → Kornit's \"sell first, then make\"; minute-level allocation (⑧) → Unspun's 1:1 supply-demand, MOQ=1 (⑧).<\/li>\n<li><strong>So What<\/strong>: <strong>forecasting is being replaced by interception<\/strong> — the chain flips from \"guess demand\" to \"read intent, then produce.\" Culture has fragmented (your note: \"consumer is everything from age, lifestyle and characters; culture has become fragmented\") — single trend reports fail; you need a multi-signal system.<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m9-h4\">Trend 4: The physical world's revival is the hedge against digital fatigue<\/h2>\n<p><strong>Confidence: Medium-High<\/strong><\/p>\n<ul>\n<li><strong>Evidence chain<\/strong>: Pinterest investing in live sports/music; screen-time backlash (①) → \"Get off your phone and get into culture\" (①) → Leap's \"physical retail is back,\" the store as innovation intelligence, the Frankie's Bikinis case (⑦) → eBay feeding offline cultural moments (Vogue Market, Endless Runway) into live commerce (②) → Quince bringing merchants to pop-ups to talk stitching (⑥) → SSENSE's \"you moved your whole body here\" (⑥).<\/li>\n<li><strong>So What<\/strong>: offline isn't a channel — it's a <strong>generator of content and data<\/strong>; the strongest combination is \"<strong>offline cultural moment × online real-time amplification<\/strong>\" (the eBay playbook). For $200+ AUR and premium categories, physical is mission critical.<\/li>\n<\/ul>\n<\/section><section class=\"layer\" data-layer=\"info\"><h2 id=\"m9-h5\">Trend 5: The fashion-ization of tech &gt; the tech-ization of fashion<\/h2>\n<p><strong>Confidence: Medium<\/strong><\/p>\n<ul>\n<li><strong>Evidence chain<\/strong>: the entire Wearables panel — jewelry before device, the 30-artist experiment, \"fashion = identity vs. tech = standardization\" (④) → DressX converting via \"your own photo\" emotion (②) → SSENSE refusing to make digital imitate the boutique (⑥) → hardware commoditization lowering barriers; differentiation left in design and the AI-personality layer (④).<\/li>\n<li><strong>So What<\/strong>: fashion tech wins or loses not on specs but on <strong>carrying identity and personalization<\/strong>; \"devices meant for everyone are meant for no one.\"<\/li>\n<\/ul><\/section>", "sub": [{"id": "m9-h1", "t": "Trend 1: Agentic commerce moves from concept to infrastructure race", "lvl": 2}, {"id": "m9-h2", "t": "Trend 2: Trust becomes the only defensible traffic asset", "lvl": 2}, {"id": "m9-h3", "t": "Trend 3: Intent data is the new starting point of the supply chain", "lvl": 2}, {"id": "m9-h4", "t": "Trend 4: The physical world's revival is the hedge against digital fatigue", "lvl": 2}, {"id": "m9-h5", "t": "Trend 5: The fashion-ization of tech &gt; the tech-ization of fashion", "lvl": 2}], "hasLayers": false, "meta": {}}, "m10": {"id": "m10", "title": "Key Data Quick Reference", "html": "<section class=\"layer\" data-layer=\"info\"><div class=\"tblwrap\"><table>\n<thead>\n<tr>\n<th>#<\/th>\n<th>Data point<\/th>\n<th>Source<\/th>\n<th>Session<\/th>\n<\/tr>\n<\/thead>\n<tbody>\n<tr>\n<td>1<\/td>\n<td>~$5T of global commerce through agentic purchasing (next 5–10 years)<\/td>\n<td>McKinsey models<\/td>\n<td>①<\/td>\n<\/tr>\n<tr>\n<td>2<\/td>\n<td>Wholesale order-to-ship window down to <strong>102 days<\/strong> within five years<\/td>\n<td>JOOR (measured)<\/td>\n<td>①<\/td>\n<\/tr>\n<tr>\n<td>3<\/td>\n<td>World Cup jersey searches <strong>+800% YoY<\/strong><\/td>\n<td>Pinterest<\/td>\n<td>①<\/td>\n<\/tr>\n<tr>\n<td>4<\/td>\n<td>F1 outfit searches <strong>+400% YoY<\/strong><\/td>\n<td>Pinterest<\/td>\n<td>①<\/td>\n<\/tr>\n<tr>\n<td>5<\/td>\n<td>WGSN macro forecasting already at <strong>2029<\/strong><\/td>\n<td>WGSN<\/td>\n<td>①<\/td>\n<\/tr>\n<tr>\n<td>6<\/td>\n<td>LTK conversational search <strong>+3x month over month<\/strong><\/td>\n<td>LTK<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>7<\/td>\n<td><strong>70% of LTK's annual sales happen inside the LTK app<\/strong><\/td>\n<td>LTK<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>8<\/td>\n<td>eBay fashion <strong>+10%<\/strong> last year; 9/10 consumers plan to increase pre-loved spend<\/td>\n<td>eBay<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>9<\/td>\n<td>Watch seller's first live event <strong>&gt;$1M GMV<\/strong>; Black Friday <strong>&gt;$2M<\/strong> in one live event<\/td>\n<td>eBay<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>10<\/td>\n<td><strong>10M+<\/strong> users on eBay AI features; <strong>500K listings/day<\/strong> via Magical Listing<\/td>\n<td>eBay<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>11<\/td>\n<td>VTO: conversion <strong>+50%<\/strong>, add-to-cart <strong>3x<\/strong>, items viewed <strong>7x<\/strong><\/td>\n<td>DressX<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>12<\/td>\n<td>GAP hits <strong>30 years online<\/strong> this fall; full AI-first data-stack rebuild<\/td>\n<td>GAP<\/td>\n<td>②<\/td>\n<\/tr>\n<tr>\n<td>13<\/td>\n<td>Snap: <strong>70%<\/strong> come for best friends; <strong>91%<\/strong> of them trust friends' purchase recs<\/td>\n<td>Snap<\/td>\n<td>③<\/td>\n<\/tr>\n<tr>\n<td>14<\/td>\n<td>Snap creators post <strong>50–100 snaps/day<\/strong><\/td>\n<td>Snap<\/td>\n<td>③<\/td>\n<\/tr>\n<tr>\n<td>15<\/td>\n<td>Leap: <strong>~50 brands / 115 locations<\/strong>; Frankie's Bikinis from 95% swim → <strong>55% RTW<\/strong><\/td>\n<td>Leap<\/td>\n<td>⑦<\/td>\n<\/tr>\n<tr>\n<td>16<\/td>\n<td>RTR customers try <strong>~45 new brands a year<\/strong><\/td>\n<td>Rent the Runway<\/td>\n<td>⑦<\/td>\n<\/tr>\n<tr>\n<td>17<\/td>\n<td>Quince: <strong>200+ engineers<\/strong>; tens of millions of monthly shoppers; ~1.5M IG followers<\/td>\n<td>Quince<\/td>\n<td>⑥<\/td>\n<\/tr>\n<tr>\n<td>18<\/td>\n<td>SSENSE: <strong>500+ brands<\/strong> served; baseline content unchanged for <strong>11 years<\/strong><\/td>\n<td>SSENSE<\/td>\n<td>⑥<\/td>\n<\/tr>\n<tr>\n<td>19<\/td>\n<td><strong>150B garments/year, ~30% never sold<\/strong>; traditional model overproduces 30–40%<\/td>\n<td>Unspun/Kornit<\/td>\n<td>⑧<\/td>\n<\/tr>\n<tr>\n<td>20<\/td>\n<td><strong>At least $1.5T wasted annually<\/strong> industry-wide<\/td>\n<td>Kornit<\/td>\n<td>⑧<\/td>\n<\/tr>\n<tr>\n<td>21<\/td>\n<td>The sewing machine: invented <strong>~1830<\/strong> (no fundamental change in ~200 years)<\/td>\n<td>Unspun<\/td>\n<td>⑧<\/td>\n<\/tr>\n<tr>\n<td>22<\/td>\n<td>Simplifyber: natural fibers molded from a liquid bath in <strong>~100 seconds<\/strong><\/td>\n<td>Simplifyber<\/td>\n<td>⑧<\/td>\n<\/tr>\n<\/tbody>\n<\/table><\/div><\/section>", "sub": [], "hasLayers": false, "meta": {}}}, "search": [{"s": "home", "a": "", "t": "", "x": "The thesis of the day (matching the handwritten notes): \"Decision fatigue. It is no longer about who can be there fast enough; it's about longevity.\" — The industry's competitive axis is shifting from speed to trust and longevity . Five structural judgments that ran through the entire day: Agentic commerce is the biggest variable of the next 5–10 years. McKinsey's models predict roughly $5 trillion of global commerce will flow through agentic purchasing. GAP has placed its bet on Google's UCP protocol and is rebuilding its data stack AI-first; eBay has shipped on-platform agentic search. The no-regret investment for every retailer: make your product data agent-ready. \"Intent\" is replacing \"discovery\" as the new front door of commerce. Pinterest's visual-intent data, GAP's \"help me pack for Japan to see the cherry blossoms,\" LTK's conversational search (3x month-over-month growth), and Daydream's Style Passport all sit on the same curve. Trust is the new currency. Creator \"trust density\" beats follower counts; Quince converts quality into trust; eBay unlocked high-ticket live-shopping conversion by tying platform protections to live; LTK bans AI-generated influencers; 91% of Snap's core audience trusts their best friends' purchase recommendations. The supply chain is being forced on-demand. The wholesale order-to-ship window has compressed to 102 days in five years; buyers have shifted to smaller upfront buys plus in-season reorders; on the manufacturing side (Unspun/Kornit), the push is demand-driven production and MOQ=1. The industry makes 150 billion garments a year, ~30% never sell, and at least $1.5 trillion is wasted annually — the \"Netflix vs. Blockbuster\" moment is replaying in manufacturing. The anti-screen, back-to-the-real-world backlash is real. Live sports, live music, the revival of physical retail, and experiential/customized consumption are a macro countercurrent confirmed by Pinterest's data and multiple panelists — \"Get off your phone and get into culture.\""}, {"s": "m2", "a": "m2-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] Forecasting is not divination: it is a blend of data + AI + decades of institutional knowledge ; WGSN's macro forecasting is already working on 2029 , filtered through a PEST framework . Pinterest's core moat is visual intent data : every image's mood/vibe/texture/color is tagged; every click feeds the algorithm — powering both personal recommendation and aggregate-level trend prediction. Buying patterns have structurally changed: the order-to-ship window has compressed to 102 days within five years ; buyers place smaller upfront buys and preserve open-to-buy for in-season reorders. Runway heat ≠ commercial sales : feathers and ballooning silhouettes are both examples of \"big media attention, weak sell-through.\" McKinsey: ~$5 trillion of global commerce will flow through agentic purchasing in the next 5–10 years — for the first time, brands can \"intercept\" and even create trends before they fully form."}, {"s": "m2", "a": "m2-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m2", "a": "m2-h3", "t": "2.1 Debunking the \"picking colors out of a hat\" myth (WGSN)", "x": "2.1 Debunking the \"picking colors out of a hat\" myth (WGSN) The moderator opened by teasing the popular image of forecasting — \"just picking a color from Pantone,\" \"I'm feeling pink this year\" — and the famous cerulean blue monologue from The Devil Wears Prada . WGSN (Cassandra): there is real science — \"we use data, we use AI, we have institutional knowledge.\" \"Many WGSN forecasters have been with the company for decades — many lifers, I'm one of them.\" The biggest misconception is that they simply declare \"blue for fall\" — emphatically not the case. Macro horizon: already forecasting 2029 (matches the note \"doing 2029 already\"); macro trends are filtered through PEST (political/economic/social/technological), then layered down to culture trends and TikTok micro-trends; sustainability and AI are the two highest-impact throughlines (matches the note \"sustainability, ai, big impact\")."}, {"s": "m2", "a": "m2-h4", "t": "2.2 The semiotics lens: signs arrive before language (Moderator / DTS)", "x": "2.2 The semiotics lens: signs arrive before language (Moderator / DTS) The moderator's background: previously worked with Cassandra; later specialized in semiotics — the study of signs and symbols and how we use them to convey, communicate, and create meaning. Core idea: \"Signs tend to show up in culture before we have the language to talk about them.\" Example: DTS tracked the rise of medieval armor in meme posts and heraldry/chain mail on runways — only now are brands visually embracing these in campaigns. Pinterest called it early too: the 2024 \"Castlecore\" prediction — years ahead."}, {"s": "m2", "a": "m2-h5", "t": "2.3 Pinterest's visual discovery machine (Sara Pollack)", "x": "2.3 Pinterest's visual discovery machine (Sara Pollack) Discovery is inherently visual: \"Magazines were always a source for visualizing possibilities, but Pinterest lets people get inspired in a super deep visual way.\" The visual loop : you see an image → what hooks you might be the mood, the vibe, a texture, a color, or a specific item (a watch, a pair of shoes) → technology lets you zoom into that detail → a whole new feed of related images appears → every save/click is a signal → the algorithm improves → exploration deepens. Key insight: people often don't have the words for what they like. \"That ability to just use what you see to guide you and find the right thing for you is really powerful.\" The data mechanics (matches note \"all is tagged in an image\"): the specific blue, the texture, the item — all of it is tagged inside the image ; every time someone clicks part of an image or chooses the next pin, data accrues — improving personal recommendations and surfacing aggregate-level patterns , which is the raw material of trend prediction."}, {"s": "m2", "a": "m2-h6", "t": "2.4 Pinterest's \"Summer of Trends\" quarterly report", "x": "2.4 Pinterest's \"Summer of Trends\" quarterly report Pinterest publishes quarterly trend reports; this summer edition focuses on the intersection of sport and lifestyle . Context: the World Cup is coming; the longer arc is fandom becoming a key way people express themselves through fashion, beauty, food, and lifestyle choices. Hard data: World Cup jersey searches +800% YoY F1 outfit searches +400% YoY WNBA fashion searches jumping every year Female athletes as cultural influencers : Alysa Liu (her Olympics hair drove search), Eileen Gu, Natasha Cloud — \"people increasingly look to female athletes to guide their style choices\" (matches note \"female athlete become culture influencer\"). Sara's two personal calls: Live sports and live music are getting even more important — driven by a backlash against tech and being glued to a screen ; both are areas Pinterest is investing in heavily, \"because it's about community, putting your phone away, and being in the real world\" (matches note \"backlash from screentime, more about community and in real world\"). The joy of customization : people want to take a Knicks jersey and make it uniquely theirs — they don't want it straight out of the shop. \"The more brands can create customization and experiential opportunities for consumers, the further that goes right now.\""}, {"s": "m2", "a": "m2-h7", "t": "2.5 The structural shift in wholesale buying (JOOR · Amanda Bacal)", "x": "2.5 The structural shift in wholesale buying (JOOR · Amanda Bacal) Setup: trend cycles are compressing — does JOOR's transaction data show it? Are buyers planning further out or making smaller, faster bets? Answer: \"The fashion industry is moving faster than ever before.\" Social media has created microtrends that rise and fall quickly ; brands and retailers must operate with flexibility and agility. The traditional model : buyers place a buy in March and expect delivery six months later — the classic long-lead wholesale cycle. The current model (matches note \"buyers are preserving a smaller buy, less upfront, react\"): Smaller upfront buys ; More open-to-buy reserved for orders placed later in the season, closer to delivery; Triple benefit: lower upfront risk, the flexibility to react to what's trending, and the ability to place reorders on what's working. Hard number : JOOR measured the order-to-ship window — over the last five years it has shrunk dramatically, down to 102 days (note: it shrank to 102 days; see Corrections)."}, {"s": "m2", "a": "m2-h8", "t": "2.6 Trends with media heat but no sales (JOOR)", "x": "2.6 Trends with media heat but no sales (JOOR) Question: how do you tell \"visually exciting\" from \"commercially valuable\"? JOOR's methodology: each season they produce a runway-driven trend report (the season's key style statements) — and uniquely, a \"shoppable\" version of it : products curated into each trend that buyers can actually buy into. That process exposes exactly where artistic heat diverges from commercial availability . Two examples from the Spring '26 analysis: Feathers : a huge runway moment — beautiful, full of movement, texture, and drama (matches note \"feathers, movement and texture\"). But building the shoppable version, they struggled to find commercially available product with the same drama . Billowing/ballooning silhouettes : heavily discussed on the runways; Amanda expected this one to translate — it reads as an evolution of the already-popular relaxed silhouette and leans into comfort dressing — yet it hasn't become a major commercial driver . \"I'm still rooting for it, though.\" Moderator resonance: DTS faces the same question daily in visual culture — \"Should a semiotic sign be inserted lightly as a styling decision or a prop, or has it gathered enough cultural weight to warrant a full photo project? Can brands build around it?\""}, {"s": "m2", "a": "m2-h9", "t": "2.7 McKinsey: a decision framework for trend investment (Kelsea Alderman)", "x": "2.7 McKinsey: a decision framework for trend investment (Kelsea Alderman) The predicament: more information, more trends, faster cycles, faster customers — prioritization has become genuinely hard for leadership, product, and marketing teams (matches note \"pressure on brands has gotten more extreme\"). The framework: be brutally honest with yourself (matches note \"how do you get to market, who is your core customer base\"): Are you fast fashion or luxury? Predominantly wholesale or DTC? How do you get to market — and how fast? Who is your core customer base, and what is your value proposition to them? → Run every trend/investment through that funnel to rank relative ROI. Applications: A specialty retailer trying to win younger Gen Z / Gen Alpha customers, willing to spend: \"take a couple of big swings\" — sexier, more flash-in-the-pan trends, because the goal is relevance in a new market. Faster speed-to-market + flexible working capital : you can be more bullish and \"buckshot\" with trends — relative risk is lower. Traditional brands with long lead times and a rigid, expensive value chain : think hard about where the trend will land; lean into what is complementary to who you already are , and spend less on \"bright, shiny objects.\""}, {"s": "m2", "a": "m2-h10", "t": "2.8 McKinsey: agentic commerce will reshape how trends are created", "x": "2.8 McKinsey: agentic commerce will reshape how trends are created Question: which structural shift will most reshape the industry in five years? Answer (the most important passage of the session): The old paradigm: look at past information, react, extrapolate. McKinsey's models predict ~$5 trillion of global commerce flowing through agentic purchasing in the next 5–10 years — \"a massive portion of our wallet and our spend.\" The inversion: brands gain the ability to intercept and create trends before they happen , because agents will be influencing purchase decisions before a trend is fully baked. Mechanism: a fast-fashion brand could test a million different things with AI and social, see what sticks and earns engagement before producing anything , then use agentic models to inform what gets produced and distributed (matches note \"use agentic model what gets produced\"). Implication: the democratization of trend creation — players like Inditex and Shein get a bigger say in what trends become. \"The runway will still have its place. Cerulean blue will still have its place.\""}, {"s": "m2", "a": "m2-h11", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] Lightning round #1 — \"What makes someone better at reading culture?\" \"Get off your phone and get into culture.\" (the line of the day — verbatim in your notes) \"Being an active observer.\" \"I was going to say curiosity — same.\" \"Not feeling like you have to be everywhere all at once.\" Lightning round #2 — \"What's most underrated by brands?\" \"The democratization of luxury.\" \"The importance of evergreen product.\" (both verbatim in your notes) \"Helping people figure out what's actually right for them.\" \"AI — controversial answer, but AI.\" The moderator, out of time: \"We have one minute left and I have a lot more questions.\""}, {"s": "m3", "a": "m3-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] Shopping is shifting from discovery-based to intent-based — GAP's CTO calls this the biggest \"aha\"; multimodal, personalized, conversational are the three keywords. GAP's AI strategy is the highest-density enterprise blueprint of the day : an AI-first data-stack rebuild, a platform-plus-brand-uniqueness architecture, a bet on Google's UCP protocol, and deliberate model agnosticism. Live shopping is now eBay's growth engine : the trust equation (real-time interaction + platform protections) unlocked high-ticket conversion — $1M+ in a single seller's first event, $2M+ on a single Black Friday day. LTK proves creators are a conversion channel, not an awareness channel : 70% of annual sales happen inside its own app; AI-generated influencers are banned. Virtual try-on (VTO) has crossed the commercial threshold : +50% conversion, 3x add-to-cart, 7x browsing — generative models are the technical cause; emotion is the psychological one."}, {"s": "m3", "a": "m3-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m3", "a": "m3-h3", "t": "3.1 Introductions (with important backstories)", "x": "3.1 Introductions (with important backstories) Reesa Lake (LTK) : \"LTK — formerly known as LikeToKnowIt, formerly known as RewardStyle. We are all one company, same company, if there's any confusion.\" Four and a half years at LTK helping creators succeed economically; previously the first manager at DBA (Digital Brand Architects) — \"I'm a bit of a dinosaur in the creator economy — I was truly securing those first $2,000 deals before brands would ever pay a blogger.\" Moderator: \"A pioneer.\" Natalia Modenova (DressX) : a fashion-tech company applying frontier technologies to fashion for 5+ years. A virtual try-on demo booth at the summit; powering VTO for brands including Lola de Cezanne (?) and Victoria Beckham ; a major activation live that same day at Governors Ball in NYC. Emily Wargo (eBay) : nearly a decade at eBay; leads the US fashion business; helped set up the Authenticity Guarantee program. Sven Gerjets (GAP Inc.) : leads technology, digital, cybersecurity, data, and AI across the four brands — Banana Republic, Gap, Old Navy, Athleta."}, {"s": "m3", "a": "m3-h4", "t": "3.2 Opening question: \"What's normal today that was unimaginable five years ago?\"", "x": "3.2 Opening question: \"What's normal today that was unimaginable five years ago?\" LTK (Reesa) : Five years ago — scroll Instagram, see an item on a creator, screenshot it, hope to find it; then came links. Today : search \"I'm going to Japan to see the cherry blossoms — what should I wear?\" and get a curated, personalized experience from creators you trust — and creators you don't know yet who share your tastes, interests, and body type. \"With the advancements in AI and conversational search inside LTK, that search is growing 3x month over month — consumers can finally ask real contextual questions instead of figuring it out alone.\" DressX (Natalia) : Five years ago, virtually trying on sunglasses or makeup was normal, but ready-to-wear try-on was impossible for any clothing category ; today it is a reality — \"the next level of personalization, very powerful.\" eBay (Emily) : \"Five years ago, the idea that resale could be a mainstream shopping channel seemed pretty impossible — listing was friction-filled, a heavy lift. Today resale is not just mainstream but celebrated . Nine out of ten consumers say they plan to increase their pre-loved spend in the coming years; eBay's fashion business grew 10% last year.\" GAP (Sven) : \"We've focused on personalization for a long time; the pivot now is intent-based, multimodal experiences — personalized not in the 'serving up offers' sense, but in the sense of interactions like the ones you get in stores . The face-to-face experience is being brought online.\""}, {"s": "m3", "a": "m3-h5", "t": "3.3 GAP's agentic awakening", "x": "3.3 GAP's agentic awakening Context: 50+ years of GAP navigating every retail shift — mall → e-commerce → mobile. This fall GAP hits 30 years online — \"we launched our first online store back when Steve Jobs was on our board.\" \"There wasn't one aha moment, but the big shift was customers moving from pure discovery-based shopping to intent-based shopping \": \"I'm going on a trip — help me pack \"; \"I saw this outfit on someone — help me find that same outfit in a cost-effective way, something that fits my budget \" (matches note \"fit my budget\"). Posture: get ahead of the customer, get ahead of the industry — set up to scale as the space evolves (matches note \"trying to get ahead of the customer, stay flexible\")."}, {"s": "m3", "a": "m3-h6", "t": "3.4 GAP's AI architecture: four brands, one platform", "x": "3.4 GAP's AI architecture: four brands, one platform Design principle: \"Platform at scale, with brand uniqueness.\" Logic: four brands with different customer sets, products, demographics, price points, and value propositions must compete uniquely — but on GAP Inc.'s shared foundation. Everything is built to scale, with the \"edge experience\" left for brand uniqueness , so customers never feel the brands have been genericized. The accidental superpower: the four brands form an innovation rotation — \"someone is always ready to innovate on something. We start with a single brand, prove it, then scale across the brands.\""}, {"s": "m3", "a": "m3-h7", "t": "3.5 GAP's innovation filter and technology bets", "x": "3.5 GAP's innovation filter and technology bets The four-lens innovation framework: value / viability / risk / adoption. Key warning: \"There are so many things today that are super viable but not valuable to the customer — you can create incredible PR moments that don't drive customer value. That's the biggest trade-off we have to make.\" Decisions lean heavily on data and tracked customer behavior. Data is the foundation : \"Data is everything in this space. We are completely rebuilding our data to be AI-first — a new data model, a context layer, a semantic layer — so agents can interact with it. You have to make the call early and move forward intentionally.\" The UCP bet (Universal Commerce Protocol, with Google) : Rationale: \"Just like the internet is built on consistent standard protocols, I believe AI will be as well.\" UCP is merchant-friendly , and GAP hopes and believes it wins the protocol race . Value: through UCP, GAP can bring its experiences, loyalty, and customer understanding forward into the agents themselves. Industry significance: \"As the first large fashion retailer to put a stake down, we're helping Google evolve the protocol to fit fashion — which is different than selling laundry detergent .\" Stay flexible, stay model-agnostic : \"Up the stack, don't get locked in — the space moves so fast that what an interesting startup can do today, an LLM may drop a model that does that plus tomorrow.\" \"I've been doing this 35 years and never has the foundation been moving under our feet like today — every two weeks something new happens. Two years ago it looked like OpenAI would take it all; now Gemini's traffic is surpassing them. Nobody knows who the winners will be, so stay flexible in the models you work with.\""}, {"s": "m3", "a": "m3-h8", "t": "3.6 eBay: how live shopping rewrites the trust equation for resale", "x": "3.6 eBay: how live shopping rewrites the trust equation for resale Live makes shopping \"three-dimensional again\" : \"Online shopping has felt one-dimensional for a long time; live brings discovery together with community and a fully rounded human connection.\" Seller side: showing up as their authentic selves — building their brand, telling their story, demonstrating expertise — builds buyer confidence. Buyer side: real-time questions get astonishingly specific — \"What's the hardware finish on that?\" \"Can I take links out of the watch?\" \"Can you put it on so I can see the scale?\" In the old modality, a buyer might send a message — but they may not bother — and the sale never happens. (Note correction: it's the buyer who doesn't bother, not the brand.) The proof : \"Live shopping has been the growth engine for eBay over the past almost two years\" (matches note). People are comfortable converting on really high-price-point items in live — trust comes from the relationship. A watch seller did over $1M in GMV in their first-ever eBay Live event . Black Friday set the record: over $2M in a single live shopping event."}, {"s": "m3", "a": "m3-h9", "t": "3.7 eBay: making one-of-one inventory urgent (the resale × live playbook)", "x": "3.7 eBay: making one-of-one inventory urgent (the resale × live playbook) The moderator's bit: holds up his own shirt — \"I got this on eBay (almost said The RealReal). It's the only one in existence. How do you convince me in a live setting?\" Emily's answer in three layers: One-of-one is urgency : resale's uniqueness is inherently exciting and scarce. Manufactured moments (matches note \"48 hours of drops, very exciting exclusive, time-bound sensitivity\"): \"48 Hours of Drops\" : two days of exclusive inventory going live in waves — time-bound sensitivity buyers were eager to engage with. Laura Higgins hosting a live selling Hermès Birkin and Kelly bags at $1 starting prices — \"even if you're not buying, being part of that excitement and energy is terrific.\" Cultural moments × digital amplification (matches notes \"blending culture moments\" and \"Vogue went live\"): The Vogue Vintage Market : Vogue curated a boutique in downtown NYC sourced entirely on eBay (pre-loved vintage designer); then Vogue went live on their eBay Live handle selling a curated assortment from that boutique — so non-NYC buyers could participate too. The Endless Runway during New York and London fashion weeks: models walking in head-to-toe pre-loved looks, amplified on eBay Live so buyers could watch items come down the runway and buy them simultaneously . The point: \"give our sellers a wider audience and let them shine in a bigger footprint.\""}, {"s": "m3", "a": "m3-h10", "t": "3.8 eBay: why live worked in the West this time", "x": "3.8 eBay: why live worked in the West this time Question: \"Live is huge and ingrained in Asia; the West invested for years and nobody cared. How did you make the American shopper care?\" Answer: \"Asia pioneered live shopping; the US is behind the curve but catching up really, really quickly . The US customer does care — they're excited about this new modality.\" The key lesson from Asia's live-shopping explosion (matches note \"lesson learned, people won't buy; solution: tie all the protection and technology to live\"): novelty brings people in, but they won't stay, engage, convert, or come back without foundational platform capabilities and retail best practices. The fix: tie all marketplace protections to the live experience — Whether you buy on eBay Live or core platform search, the experience is identical ; Authenticity Guarantee (items authenticated after purchase); eBay Money Back Guarantee ; The same customer support and post-purchase experience. The logic: \"Buying in a new modality can be intimidating; knowing you have the protections of a company that's been around 30 years turns that into an accelerant.\""}, {"s": "m3", "a": "m3-h11", "t": "3.9 eBay: AI × resale, both sides of the marketplace", "x": "3.9 eBay: AI × resale, both sides of the marketplace Position: \"AI has been a terrific boost for resale. Generational customers' expectations have shifted — shopping must be easy, fast, trusted . The platforms that will endure are those that harness AI and make experiences frictionless.\" (This \"endure\" is the direct echo of your \"longevity\" note.) Seller side: the Magical Listing Flow (matches note \"magical flow — go to closet, take pic, eBay does the listing\"): Before: photograph the item, manually fill out every field — a heavy lift. Now: go to your closet, take one photo, and eBay's AI generates the entire listing — every field (color, size, type, category), plus pricing recommendations and condition guidance . Scale: 10M+ users have interacted with eBay's AI features; half a million listings are uploaded through the magical listing tool every single day — \"unlocking the customer's closet.\" Buyer side: embedded agentic search : Natural language conversation with an agent (matches note), \"like talking to a sales associate,\" to navigate eBay's signature breadth of unique inventory and reach what you want faster."}, {"s": "m3", "a": "m3-h12", "t": "3.10 LTK: from one blog link to conversion infrastructure", "x": "3.10 LTK: from one blog link to conversion infrastructure Origin story (Reesa): \"LTK is a company founded by creators, for creators. Our founder Amber Venz Box was a personal-style blogger who realized she was giving all these recommendations and not being paid for any of them ; her then-boyfriend (now partner) went to brands — to Nordstrom — and created the relationship where creators could earn commission off a blog link and brands could track those sales .\" Evolution: from one surface (the blog link) to a multi-surface ecosystem — In the LTK app: creators publish, consumers engage; A purchase can come from a direct post, from a creator's saved collections , or via LTK AI (a consumer searches \"what should I wear to a bachelorette party\" and creator content is served as the answer); Marketing runs inside the ecosystem : price-drop notifications, abandonment recovery — \"before, on that blog link, maybe you click, maybe you buy, and there's no further transaction. Now we see the long tail of conversions and use that data to inform how brands should engage creators.\" Historical contrast: \"In the early days when I represented bloggers, brands would ask 'what are the metrics?' and I'd say 'there's Google Analytics.' LTK was truly the first to show brands the conversion power of creators. \""}, {"s": "m3", "a": "m3-h13", "t": "3.11 LTK: the number that surprises everyone", "x": "3.11 LTK: the number that surprises everyone Live poll: \"Who here is on the LTK app as a creator or consumer? — I see a lot of hands, good news.\" The gap LTK saw in link-only days: no place where consumers could be entertained, engaged, inspired, and buy in the same place — social platforms aren't built for buying from your favorite creator. LTK's purpose is to marry engaging an audience, building community, and making it really easy to transact (matches note). The number: 70% of LTK's annual sales come from sales made within the LTK app (your note says 37% — a mishearing; see Corrections). Implication: \"Brands shouldn't think of LTK as just 'where creators link' — it is a marketing channel in its own right , a standalone social platform, and in-app sales keep climbing.\""}, {"s": "m3", "a": "m3-h14", "t": "3.12 DressX: why virtual try-on is happening now", "x": "3.12 DressX: why virtual try-on is happening now Technical causes: The legacy constraint: VTO used to depend on on-device 3D rendering (not enough memory or power); The inflection: generative models pushed VTO past the usability line on both fidelity and speed — \"online interactions now expect instant feedback; try-on can deliver it.\" The behavioral cause: AR for sunglasses and makeup taught users \"this works, this is nice\"; now it extends to clothing. The psychology of conversion: \"Fashion shopping is very emotional\" — sometimes called impulse shopping (\"sure, wine at 3 a.m. produces impulse shopping\" — laughter) — but fundamentally emotional. Seeing yourself in the garment is an emotional peak — \"ads use puppies and babies because our brains react a certain way; the same happens when we see ourselves wearing an item.\" Product decision: bet on your real photo / your own AI twin, not generic AI models — create a twin from a selfie, or try items on your own photo from your Amalfi Coast vacation, your backyard, an event — \"in a familiar setting you see not just whether it fits your body, but how it fits into your life .\""}, {"s": "m3", "a": "m3-h15", "t": "3.13 DressX: the conversion data (preview of a forthcoming report)", "x": "3.13 DressX: the conversion data (preview of a forthcoming report) Items with VTO convert 50% better than items without; Users who engage with VTO add to cart 3x more often ; They view 7x more items on average (deeper discovery); The effect is strongest on expensive items and luxury categories — \"and remember, for a huge demographic, a $100–200 item is luxury. I remember buying my first designer item — 'wow, I got the brand.' The power of the brand plus these details is what drives conversion.\" Higher AOV : VTO users are more engaged and discover more; Return rates improve, but that's not the primary metric — \"returns are driven by many factors (policy, etc.), and shoppers don't think much about returns before purchasing; what we aim for is better purchase decisions .\" A purchase-intent signal : when a user starts trying multiple items across multiple different photos = they're late in the purchase decision — identifying high-intent cohorts for brands. Coming soon: beyond full-look try-ons, (footwear/accessory?) try-on going live within the (Winter?) app. Bottom line: \"It benefits both shoppers and brands. It works.\""}, {"s": "m3", "a": "m3-h16", "t": "3.14 Lightning round: \"What shopping behavior will feel completely normal by 2030 that still feels futuristic today?\"", "x": "3.14 Lightning round: \"What shopping behavior will feel completely normal by 2030 that still feels futuristic today?\" GAP (Sven) : \"AI embedded in the customer journey in a natural way — customers not having to teleport in and out of shopping experiences ; it's just how we shop.\" eBay (Emily) : \" Resale as the primary option when customers begin their shopping journey — as the experience gets easier, faster, more trusted. Sustainability and circularity are table stakes, fueled by AI. That's the next wave.\" DressX (Natalia) : \"Imagine your favorite online store where every product page shows what it looks like on you — without you doing anything . I think it happens before 2030. Also, I'm excited about drone deliveries — nothing to do with try-on, but cool.\" LTK (Reesa) : \"Creators will continue to be the trusted source, and the way we search and engage with them becomes much more conversational versus link-link-link — plus the continuation of personalization fueled by AI.\""}, {"s": "m3", "a": "m3-h17", "t": "3.15 Follow-up: why will creators stay trusted in the AI era? (LTK's manifesto)", "x": "3.15 Follow-up: why will creators stay trusted in the AI era? (LTK's manifesto) \"We all need to embrace AI, but there is mistrust in AI. On LTK, we do not allow any AI-generated influencers or avatars — the creator is the trusted voice.\" \"Creators have this power because they are testing the product, trying the product, doing the in-market research consumers don't have time to do . As long as they don't lose authenticity, they will continue to be that trusted guide.\" \"And the way we use AI at LTK is different: not the open web — only the product recommendations and data points fueled by creators . As AI takes over, creators still have their place.\" Moderator: \"Well, that's encouraging. Great conversation — thank you all.\""}, {"s": "m3", "a": "m3-h18", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] Reesa calling herself \"a dinosaur of the creator economy\"; the RewardStyle → LikeToKnowIt → LTK lineage clarified \"if there's any confusion.\" Sven on GAP's DNA: Steve Jobs was on the board when the first online store launched. Emily's \"endure\" framing maps directly to your \"longevity\" note: \"the platforms that will endure are those that make AI experiences frictionless.\" The moderator on influencer marketing: \"I say 'emerging' but it's gone from nice-to-have to table stakes; and 'creator' went from a gorgeous person with 10 million followers to literally me — or my friend who thinks she has good style.\""}, {"s": "m4", "a": "m4-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] Centralized influence has collapsed : taste-gatekeeping has decentralized from big fashion institutions (department stores, magazines) to curators/tastemakers with their own platforms — and brands still haven't fully adapted. What to buy is not follower count but \"trust density\" : accounts with 10–50K followers — even private accounts — can out-convert million-follower influencers; creator size correlates far less with selling power than assumed . Affiliate has become infrastructure : for creators, an organic monetization on-ramp (no camera, no \"beautiful content\" required); for brands, the hard-data pipeline that turns creators from a test channel into a core marketing channel. AI boosts productivity, but the \"taste layer\" must stay human — a rare three-platform consensus. Organizationally: influencer teams and performance-marketing teams must merge their thinking — creators are now both the top and the bottom of the funnel."}, {"s": "m4", "a": "m4-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m4", "a": "m4-h3", "t": "4.1 Framing", "x": "4.1 Framing Moderator (start of recording): \"Each platform's shift toward on-platform shopping lends itself to very different programs and outcomes than the sponsored posts of the past. Brands are looking to spend smarter — working with influencers who drive conversions, not just awareness. \""}, {"s": "m4", "a": "m4-h4", "t": "4.2 Q1: \"What shift in creator-brand relationships are brands still underestimating?\"", "x": "4.2 Q1: \"What shift in creator-brand relationships are brands still underestimating?\" Snap (Mandy) : the proliferation of content — AI and editing tools have exploded content volume; \"it's going to get harder and harder for brands to stand out.\" Snap's answer: focus on the one-to-one relationship between creators and consumers — its native form. ShopMy (Anisha) (one of the session's defining arguments): \"A lot of brands are still working through the collapse of centralized influence and what it means for how they grow.\" Then: tastemakers lived inside big fashion institutions — buyers for department stores, deciders of what was in Vogue , monopolists of taste . Now: gatekeeping has decentralized to curators and tastemakers with their own platforms. The homework: use data to find these dispersed tastemakers — who converts, who sells — and organize them as a \"distributed sales force.\" The line: \"Many brands still see creators as top-of-funnel awareness; with conversion data, you can look at creators as the modern-day retail. \" TikTok (Julie) : \" The gates are virtually gone — we're all creators in our own right.\" TikTok Shop accelerated this. Brands still struggle: \"creators used to be essentially moving billboards , because we were so used to being marketed to .\" Winning brands treat creators as merchandisers, strategic partners, almost a sales force — not ad slots. Notably: the best-selling content on TikTok Shop is often not typical TikTok-style video — \"which is kind of crazy when you think about it.\""}, {"s": "m4", "a": "m4-h5", "t": "4.3 ShopMy: affiliate democratization and the truth about \"brand control\"", "x": "4.3 ShopMy: affiliate democratization and the truth about \"brand control\" Question: \"When almost anyone can create affiliate links, how do brands manage control?\" Answer: \"What democratization has really done is create more data — affiliate is such a measurable channel that brands can look at sales and conversion data and decide where to amplify .\" Bursting the control illusion : \"Traditional partnerships make brands feel in control — but actually you're placing bets on a handful of creators with limited visibility into performance . Affiliate gives brands transparency rooted in hard data and real sales: who to double down on, who to engage.\" The long tail and the dark network : \"In our data, creators from the smallest followings to the largest — even private accounts — convert, because tastemakers' audiences buy the things they link.\" Consumers got savvy: \" People trust people more than they trust campaigns. For brands it's less about controlling the conversation and more about earning your place in it through authentic creator advocacy .\""}, {"s": "m4", "a": "m4-h6", "t": "4.4 ShopMy: which creators deserve the budget?", "x": "4.4 ShopMy: which creators deserve the budget? \"Shopper data keeps confirming: the real metric is trust density, not follower count . Brands pay a lot for millions of followers; but someone with 10,000 or 50,000 followers whose audience buys every single thing they talk about is a different asset entirely — this is the trust economy we're moving into.\" Operationally: \"Let the data steer budgets — see where your product resonates, amplify those pockets. The correlation between creator size and the ability to move product is not as predictable as you'd think. Keep going back to the source of sales and allocate there. We're seeing brands lean into affiliate as a true ROI channel they put real money behind.\""}, {"s": "m4", "a": "m4-h7", "t": "4.5 ShopMy: why affiliate captured both sides", "x": "4.5 ShopMy: why affiliate captured both sides Creator side (redefining \"creator\"): \"We think of creators less as creators and more as curators or tastemakers .\" The legacy assumption: being a creator meant showing your face on camera, making beautiful, entertainment-grade content, day-in-the-life videos. Now: platforms like Substack let anyone simply talk about what they love — many start for fun, as a hobby; affiliate lets them monetize organically — \"instead of posting a link, post an affiliate link; make a little money without negotiating brand partnerships or making it a livelihood.\" That's why participation exploded. (Matches note \"go to brand, creator earns commission.\") Brand side: \"Affiliate's measurability turns creators from a test channel into a real core marketing channel — speaking in the data terms brands want to hear.\""}, {"s": "m4", "a": "m4-h8", "t": "4.6 Snap: community × content × commerce", "x": "4.6 Snap: community × content × commerce \"The best creator programs are great at three things: community, content, and commerce .\" Creator behavior is unique on Snap: 50–100 snaps a day — \"they let you into their lives; it feels IRL; they feel like friends.\" Content: AR Lenses as an unbelievable creative canvas for consumers and creators. Commerce: closing the loop with measurement (MMM) and commerce links — \"Shopify, hopefully soon.\""}, {"s": "m4", "a": "m4-h9", "t": "4.7 Snap: the Inner Circle — best friends are the strongest shopping influence", "x": "4.7 Snap: the Inner Circle — best friends are the strongest shopping influence The data (moderator cited, Snap confirmed): 70% of Snap's audience comes to the platform to connect with their best friends; 91% of that audience says they trust their best friends for purchase recommendations. \"We talk about the inner circle as the superpower of Snapchat. Creators also interact with consumers as friends — high-frequency posting, intimate dialogue. Brands can tap into that in a way that's very different from broadcast platforms.\" Productization: SnapStar Collab Studio launched in 2024 to connect brands and creators directly; building tools so brands can buy the creators they want to target, understand creator metrics, and get transparency — \"ideally, tapping the right maker communities for each campaign.\""}, {"s": "m4", "a": "m4-h10", "t": "4.8 AI's role and its limits (all three platforms)", "x": "4.8 AI's role and its limits (all three platforms) TikTok (Julie) : \"AI can do amazing things and we use it every day — content, outreach, turning data into action points. But one thing I believe — call me a mistake-maker — is that AI will never (okay, 'may never') do the human side . Trust means: I know you, I love your style, I know your background. In a technology-driven world, the human part becomes even more important — everything else gets standardized by technology.\" ShopMy (Anisha) : \"Couldn't agree more. AI brings productivity and scalability; but our core thesis is that human recommendations are the most powerful tool in commerce . With ads taking over our algorithms there's so much noise around shopping — I've been there: 'I'm just going to text my group chat for their favorite pair of jeans.' Creators are the trusted sources grounded in human experience. AI will make that more available at the point of need, more personalized, faster — but the taste layer stays grounded in human taste, having the final say .\" Snap (Mandy) : \"Snapchat is about human connection — the map, the chat. Human first , with AI for productivity. Trust is at the center. \""}, {"s": "m4", "a": "m4-h11", "t": "4.9 Conversation-driving creators vs. awareness-driving creators", "x": "4.9 Conversation-driving creators vs. awareness-driving creators TikTok : \"There is a difference, but it's not one-size-fits-all — the same creator works differently for different brands. Test and error, and be willing to admit when you're wrong. Brands default to 'go with the big creators — we know who they are'; but increasingly, brands will choose four tastemakers with 20K loyal followers each over one big name . Different creators at different points in time serve different purposes. Build your creator pyramid — the one who drives awareness for me may drive conversions for you. Read all the signals; don't just run a playbook.\" ShopMy : \"Echoing Julie — it depends on the brand's lifecycle, growth strategy, and targeting. What ShopMy provides is transparency: which creators are moving product in which verticals .\" The automated-gifting loop (case) : brands can gift product to 20–50 creators at whatever scale they want (traditionally pure awareness, unmeasurable); ShopMy attaches an affiliate link to the gift — the creator receives a sweater, loves it, posts it to their story with the link — and for the first time the brand can measure the sales the gifting drove . \"Use the tools to figure out which verticals and archetypes of creators work for you.\" Snap (the framework of the session) : Creator 1.0 : all about massive scale (the Mr. Beast model); we lacked measurement tools, so we used metrics like EMV (earned media value), \"which told us nothing about business impact.\" Creator 2.0 : with sophisticated measurement, what's driving sales is micro-influencers and the people we trust most — the ones sending us a snap trying on a piece of clothing. Finding creators is more efficient; measuring partnerships is far more sophisticated."}, {"s": "m4", "a": "m4-h12", "t": "4.10 Closing: \"What does a successful influencer partnership look like two years from now?\" (includes the Pier 86.m4a tail segment)", "x": "4.10 Closing: \"What does a successful influencer partnership look like two years from now?\" (includes the Pier 86.m4a tail segment) TikTok : \"Built around trust ; brands working with creators as real long-term partners — not one big splashy campaign — with different strategies and market-value strategies per creator.\" ShopMy : \" Authenticity across channels — you'll see someone talk about a brand on Instagram or TikTok or Snap, then write about it on a Substack, and there's a partnership — seeing them across channels reinforces authenticity. Brands should get ahead in two ways: (1) have the technology and tools to measure data and efforts ; (2) evaluate how teams are set up — influencer teams sit here, performance teams sit there, not speaking nearly enough, while creators are now both top-of-funnel and bottom-of-funnel. Set teams up to capture that merger. \" Snap : \"More authentic, faster, and far more sophisticated . As brands understand the space, they'll build longer-term partnerships that feel authentic — 'something everyone aspires to but we've gotten lost along the way at points.' One-to-one relationships on both the brand-creator and consumer-creator axes. Tooling improves on both the front end (identification/targeting) and back end (measurement); programmatic platforms are popping up enabling easy buying across the long tail of creators .\""}, {"s": "m4", "a": "m4-h13", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] ShopMy was repeatedly mis-transcribed by speech recognition as \"Shanghai / ShopNite / Shama\" — all refer to ShopMy. \"People trust people more than campaigns\" and \"I'll just text my group chat about jeans\" were the session's two most quotable lines. Kalshi's Clarissa Bronfman speaks less in the recoverable audio (partly at recording breaks); her seat represents the culture-prediction-markets angle. Moderator framing: \"All of your platforms have revolutionized the ways brands interact with creators and their audiences.\""}, {"s": "m5", "a": "m5-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] This generation of AI-wearable founders share one creed: jewelry/eyewear first, device second — design and identity expression outrank specs. Four form factors, four philosophies: ring (Sandbar) = control &amp; privacy; necklace (Taya) = jewelry worth wearing even when dead; glasses (Altina) = hearing enhancement that is \"a good pair of glasses first\"; open hardware (Era) = 30 artists proving there is no \"best generic version.\" Battery vs. fashion is the eternal trade-off ; most chose fashion and compensate with charging cases. Hardware supply chains have commoditized (the Shenzhen ecosystem) — small teams can now build hardware; that's the substrate of the AI-hardware startup wave. Differentiation now lives in design and the AI-personality layer. Mutual advice: fashion must understand how long hardware cycles are; tech must understand that fashion is identity — and tech's instinct is standardization. The two must reconcile."}, {"s": "m5", "a": "m5-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m5", "a": "m5-h3", "t": "5.1 Sandbar (AI ring): designed for you , not for recording others", "x": "5.1 Sandbar (AI ring): designed for you , not for recording others Product stance (start of recording): \"There are lots of note-taking devices out there, but we don't build for recording other people or capturing surroundings — we focus on you: how can AI help you become a better human .\" Use cases: \"What's the best gift I can get for my friend?\" — like a best-friend-meets-identity-philosopher, helping you create memory and stay in the moment instead of being distracted. Why a ring (founder Mina): The team built many device prototypes starting in 2023; the big concern was using devices in public — other people's perceptions and expectations are a real constraint. The ring's advantages: fully under your control — not listening for a wake word , quiet, close to the body; while preserving clear social signals (people can see you're speaking to a device). The software mirrors it: built-in personality and memory — \"which is essentially yourself\" ; a live demo had the ring \"speak for me.\" Later addition (Pier 86 2 segment): \"At the earliest stages of wearables, things have to be useful — nail the voice system and genuinely useful capabilities, and users stay.\""}, {"s": "m5", "a": "m5-h4", "t": "5.2 Taya (AI necklace): worth wearing even when dead", "x": "5.2 Taya (AI necklace): worth wearing even when dead Design philosophy: \"It's not about being discreet — I want it to be recognizable , the way you recognize an iconic eyewear frame; but it shouldn't make the whole industry look the same.\" Materials (\"what fine watches are made of\"): stainless steel; ceramic for the non-metal components . Variants: gold + white ceramic, silver + ceramic — shipping in the fall . Practical details: Waterproof — \"how many people have lost great ideas in the shower? Just wear it and capture them\"; Doesn't need to be connected to your phone — sync to the app after a long day away; Continuous software updates; Roadmap: modularity and personalization — \"jewelry is deeply personal: initials, dates, heirloom elements… swappable components are on the horizon.\" Best line of the session: \"If it's not so useful that you'll make sure to recharge it, we don't deserve to be on you.\" The standard: \"No one leaves their apartment without their phone or their earbuds. If what we're building isn't in that category, we have to keep going. \""}, {"s": "m5", "a": "m5-h5", "t": "5.3 Altina (hearing-enhancement glasses): starting from the opposite of a hearing aid", "x": "5.3 Altina (hearing-enhancement glasses): starting from the opposite of a hearing aid Audience: \"Designed for the general population, especially people with hearing loss (skewing older) — but that's exactly why we care about what the general population cares about .\" The insight: \"Early AI wearables and hearing aids made the same mistake: ignoring style . Users don't want a device that says 'I'm a tech person' or 'I'm a patient' — they want their own personality to come across .\" Design decisions: No electronics on the front ; Traditional acetate frames (most smart glasses skew sporty/gadgety; these are deliberately \"a good pair of glasses first\"); Collaboration with London eyewear brand Cubitts (founder in the audience that day) — \"they offer a huge variety of styles; that's what we want for our product too.\" Versus the big-tech collab wave (moderator cited Google × Gentle Monster, Meta × Ray-Ban): Altina's difference: \"A lot of smart glasses are 'tech first, fashion shell later' — the eyewear partner is brought in afterward. We integrated frame design from the very beginning — that's literally how the relationship started.\" Engineering trade-off: \"Thicker temples = more battery, but the fashion side matters more — we're building for all-day prescription wear; most of the day you're not using the electronics, so comfort and lightness above all ; heavy usage days are covered by the charging case . Different companies chose different trade-offs; we chose to be as close to traditional eyewear as possible.\""}, {"s": "m5", "a": "m5-h6", "t": "5.4 Era: 30 creatives × 30 AI objects — a personalization manifesto", "x": "5.4 Era: 30 creatives × 30 AI objects — a personalization manifesto Setup (moderator): \"You collaborated with 30 artists to create 30 unique objects… what do they tell you about how people want to use AI tech?\" Elizabeth's argument (the most philosophical stretch of the session): The cautionary tale: certain products \"have beautiful ideals but impose one specific emotional design and one non-customizable software layer onto a mass audience — devices meant for everyone, yet meant for no one.\" The phone analogy: \"There are limited ways to customize; we all carry the same brick. As devices get this personal, you can't imagine a non-customizable world anymore. \" Personal anecdote: \"At (a previous big-tech employer), the time I used my assistant most was when I asked it to speak to me more kindly — suddenly I used voice 10x more.\" The experiment: built a minimal core device — just a mic and a speaker — gave it to 30 of their most creative friends (designers, creative technologists, people who barely know what AI is), with one command: \"go crazy\" — customize the exterior and make the mind act however you want. Three outcomes: A creator made a lovely charm that speaks back in her own voice , telling her ways to be spontaneous with her life; Artist Michelle Thomas made a leather charm with the device hidden inside — a place to toss creative ideas throughout the day, an invisible idea-catcher; Another built a gentle-voiced wellness companion keeping her confident through the day. The conclusion: \"Three very different people, three very different experiences. There is no 'best generic version.'\" Give people the tools to build the companions they want — they'll build things you can't imagine. The brand-licensing imagination (Gen Z angle): \"I love brands like Gentle Monster — imagine glasses that take you into the world the brand is building (navigation to gallery shows, say). Licensing becomes a way to put a brand's world into the physical world — not just selling an aesthetic but letting people live in the process .\""}, {"s": "m5", "a": "m5-h7", "t": "5.5 The battery, longevity, and materials roundtable", "x": "5.5 The battery, longevity, and materials roundtable The moderator (a veteran wearables reviewer) pressed: \"Every device has a different charging schedule. Do your devices still look cool when the battery dies? That's the #1 question I get.\" Taya: see 5.2 (fine-watch materials + worth wearing dead + waterproof). Altina: see 5.3 (slim &gt; battery + charging case). Moderator's industry note: \"Oura finally made a skinny ring — bulk is the #1 turn-off I hear from users , even when the features are great.\" On product lifespan (\"I replace these every two years; at these prices I can't anymore\"): Taya — durable materials for hardware; continuous software updates; modularity as the long-term answer to obsolescence."}, {"s": "m5", "a": "m5-h8", "t": "5.6 User feedback and development method", "x": "5.6 User feedback and development method Question: \"When you ship new features (reminders, web search), how do you weigh user feedback? Everyone wants something different — but you must ship one product.\" Sandbar : \" As voice and AI become common computing methods, we'll need a generalized way of interacting with them — reminders and web search are tiny steps toward that. From day zero we built giant 3D-printed prototypes and had friends and family wear them on the West Side Highway — watching how passersby reacted, how our friends used them in the morning. We changed a lot — including killing devices we ourselves thought were really functional. The great thing about building a new category: there's no illusion about whether a device will be useful or acceptable — you get the truth very quickly.\" Altina (on not being hostage to feedback): \"The lesson is not to ship everything everyone asks for — 'boil the ocean, add a hundred features, claim you'll replace the phone' — many tried; it doesn't work. Pick one or two things and do them really, really well. \""}, {"s": "m5", "a": "m5-h9", "t": "5.7 Hardware commoditization: the substrate of the AI-wearables wave (Sandbar)", "x": "5.7 Hardware commoditization: the substrate of the AI-wearables wave (Sandbar) \"Wearables have two layers: software and hardware. The hardware layer (batteries, capture, ops, logistics) used to belong to giants; if you've been to the Shenzhen ecosystem (transcribed as 'HEMBA'; likely Huaqiangbei), there are thousands of factories making every component imaginable ; and many new form factors are getting commoditized — you no longer need Apple-scale investment to make these devices . That's why so many startups are entering.\""}, {"s": "m5", "a": "m5-h10", "t": "5.8 Closing: advice across the aisle (Pier 86 2 segment)", "x": "5.8 Closing: advice across the aisle (Pier 86 2 segment) The moderator first, pointedly: \"I have a small chest. If I get one more garment launch with a big chunky pendant hugging the sternum, I will lose it. How do you all handle wearability across bodies?\" What fashion should understand about tech : \"Fashion is technically hardware too, but it's faster to make; connected-device development cycles are much longer — the industries must understand each other's clocks.\" What tech should understand about fashion (three voices in succession — the intellectual high point): \"There's far more personalization in fashion — that's what makes fashion work. Tech folks think 'everyone carries the same brick, so everyone will wear the same glasses' — that's not the world we're going to . Fashion's most important thing is identity ; tech is all about standardizing. Tech will integrate into fashion only if it solves sizes and fit across demographics.\" \"Technology is changing at an unprecedented pace; we all have to ask what relationship we want with it . Fashion has always thought about the relation of an object or idea to the individual — how it lets the individual express themselves. I'm excited to create technology with that lens — understanding what's best for people, how it becomes part of them and fits into their lives — rather than being some distant top-down thing .\" \"Tech can learn 'meeting people where they are' from fashion — consumer tech has historically fallen on the disconnect from what the end consumer actually wants.\" \"The fashion world thinks hardest about the human experience — how to make people feel, how to let them live their aspirations : you put on a really good jacket and you feel awesome — that's your aspirational self. Now that tech is wearable, it has finally entered the realm of aspiration — and it has to learn this.\" Moderator's close: \"I want to review units of all of these. Thank you guys so much.\""}, {"s": "m5", "a": "m5-h11", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] The moderator on first-gen smart glasses: \"You looked like a character from Dragon Ball Z.\" The \"black box\" anxiety named explicitly: consumers hate opaque, obsolescing tech boxes — jewelry-fication is the antidote. Sandbar's privacy design language (no wake word, fully user-initiated) is a direct answer to \"AI eavesdropping\" anxiety."}, {"s": "m6", "a": "m6-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] Quince's core equation: trust = quality; price is just the output of the system — a low-price first purchase that delivers on quality → trust → category expansion (from $50 cashmere to caviar to couches). SSENSE's moat is consistency : baseline content (white-background imagery) unchanged for 11 years, immune to trends; a small share of variable content plays with fads — \"are you participating in culture, or meaningfully contributing to it?\" Daydream lays out the full blueprint for AI-native shopping : Style Passport (size/budget/preferences/inspiration) → natural-language curation (not ad-based) → endgame: a proactive agent-stylist that reads your calendar . The ethics line of personalization : \"creepy\" and \"delightful\" are the same thing delivered two ways — it's only creepy when it gets it wrong. Friction redefined : the real friction isn't button smoothness — it's \"the consumer doesn't believe you yet.\" Show, don't tell."}, {"s": "m6", "a": "m6-h2", "t": "[FULL DETAIL]", "x": "[FULL DETAIL]"}, {"s": "m6", "a": "m6-h3", "t": "6.1 Quince: the quality-for-trust flywheel (opening of Pier 86 4)", "x": "6.1 Quince: the quality-for-trust flywheel (opening of Pier 86 4) Framing: \"Everyone in this room gets targeted by a brand every day.\" The thesis: \"Why would I come to Quince versus anywhere else? The answer has to be quality. Full stop.\" The exhibit: the $50 cashmere she's wearing — bought four years ago . \"Yes, I wear it because I work at the brand — and because we're the house of quality.\" The trust path: \"You get the ad → you land on the PDP → you read the reviews → people ask me all the time, 'how are your reviews this good?' — that's exactly the point: we get one chance with the customer. If the quality doesn't hold up, we lose them — that's it. $50 cashmere sounds great, but the trust is built after they actually purchase .\" Pricing philosophy (line of the session): \"The price is not the point — the price is the output of the system.\" Trust transfer across categories: \"Once you've bought the $50 cashmere and the trust is built — you're more likely to try the caviar, more likely to purchase the couch — because you trust what we said in the first place.\" Third-party validation: \"We were recently named alongside Huggies as one of the most trusted brands by parents — a very hard thing to earn; many of us in the room are parents.\" The tech base: \" Quince has 200+ engineers — we are a technology business first and foremost — and that technology lets us scale across all these categories. But we win on trust, and trust has to be the product. The product is what proves whether you are who you say you are. \""}, {"s": "m6", "a": "m6-h4", "t": "6.2 Quince: restraint on social (Pier 86 5 segment)", "x": "6.2 Quince: restraint on social (Pier 86 5 segment) Setup: \"Your feeds have a distinctly Gen-Z-intern, Duolingo-owl-coded feel — trending audios, slang. How do digitally native brands ride cultural moments while keeping authenticity? \" Context: Quince has tens of millions of customers shopping monthly and ~1.5 million Instagram followers . The (counterintuitive) answer: \"The number one way to not be cool is to tell people how cool you are.\" (life-motto grade) \"I actually don't want us participating in every trend, jumping on every trending audio. I only want the things where you could cover up the Quince name and still know it's the brand .\" \"The consumer reads through it instantly — jumping left and right at whatever's trending is inauthentic. We have a bit more fun on TikTok, but the lines stay on .\" The three content pillars: \"Education and Storytelling — those two lead across the board; Entertainment is third, from time to time.\" SSENSE on the same question: \" Audiences are more and more sensitive to whether you're just participating in culture or meaningfully contributing to it. \" \"The way to contribute is pursuing and cultivating your own interests, your own perspective, your own points of view — ours are deeply internally motivated, stemming from the team and the people working with us.\""}, {"s": "m6", "a": "m6-h5", "t": "6.3 SSENSE: consistency as a system (Pier 86 4 segment)", "x": "6.3 SSENSE: consistency as a system (Pier 86 4 segment) Setup: \"SSENSE is a renaissance man — a rich editorial archive, a leading voice in streetwear, the place for rare designer drops. Across multi-channel, multi-audience reach, how do you keep voice and visual identity consistent? \" The content-system dichotomy (operationally invaluable): Baseline content : \"Have a baseline of content that is truly, consistently your brand — agnostic of fads and trends . Ours is the PLP/PDP content everyone knows: the model wearing the shirt on the white background. You might think the model looks indifferent or irreverent — an enormous amount of effort goes into building that identity .\" Time compounding: \"I've been at the company 11 years and that baseline hasn't changed — because it stayed consistent that long, it became core to the brand : on any shopping page full of white-background shots, you can pinpoint the SSENSE image out of any lineup .\" Variable content : \"There are trends in lighting, in styling, in backgrounds — keep the trend-reactive content a smaller share, ad hoc, reactive — and you can have a lot of fun with it.\" The rule: \"Baseline: stay consistent, stay timeless, stay true to who you are.\""}, {"s": "m6", "a": "m6-h6", "t": "6.4 Daydream: the mechanics of AI-native shopping", "x": "6.4 Daydream: the mechanics of AI-native shopping Demo scenario (moderator): \"Type 'what to wear to a fashion tech panel' into Daydream right now and you get shoppable results categorized into jumpsuits, double-breasted jackets — everything I personally wished I'd worn to this panel.\" The mechanics (CMO Jennifer Koen): The founding gap: \" How many times have you shopped in the same place and they never remember your size? Never remember what you bought last week? It's kind of shocking — Daydream is built on that gap.\" Style Passport : learns your size, budget, preferences, inspiration — then curates new items against your natural-language queries (ChatGPT-style). Not ad-based : \"The technology does the curation — from everything we've learned about you, what you told us in the query, and everything we know about all our brands.\" Discovery preserved : \"If you like SSENSE — which happens to be one of our brand partners — you're probably going to like this other brand you don't know yet. Discovery is so important in fashion.\" (SSENSE is a Daydream retail partner; you can even query \"only show me SSENSE brands, outfits for a fashion tech conference.\") Meta (Mariel Poole): \"If we can get ahead of what the customer is going to like, we can introduce them to new brands they'd never have considered .\" (Meta speaks less in this recording.)"}, {"s": "m6", "a": "m6-h7", "t": "6.5 Personalization: creepy vs. delightful", "x": "6.5 Personalization: creepy vs. delightful Daydream: \"We're all consumers; we all know the difference between — ' Ooh… how did you know that about me? ' (creepy) ' Oh that's so great! How did you know that about me? ' (delight) Same idea — the difference is all in how it gets delivered. \" Moderator: \" It's creepy when it gets it wrong. \" — \"Right. We want to get it right.\""}, {"s": "m6", "a": "m6-h8", "t": "6.6 Should digital replicate the bespoke in-store experience? (A rare contrarian answer)", "x": "6.6 Should digital replicate the bespoke in-store experience? (A rare contrarian answer) Setup: \"High-ticket shoppers want to feel the effort — the sales associate calling you by name, the open bar at Kemo Sabe while your initials go on your new hat. How do you digitize that bespoke brick-and-mortar experience? \" SSENSE (the contrarian, and excellent) : \"I have a different answer: both serve distinct purposes, and neither should strive to be the other. In-store is an experience : 'you moved your whole body to be here' — you might as well get a glass of champagne, a little prosecco, a nice sofa. Digital's promise: no makeup on, lying down, whatever state you're in — you can procure anything you want with just your fingertips. SSENSE has both: the brick-and-mortar does the full bespoke thing; online assumes our shopper is a fashion-lover who's done the research — they go straight for the product, and our job is to get it to them as seamlessly as possible .\" Quince (a different in-store answer) : \"It all goes back to a feeling — feeling special, feeling valued, feeling seen. This past week I was in LA and Toronto doing a series of pop-ups, and what's different is I bring our merchants — the people on the phone with the manufacturers every day, who can tell you exactly where something is made and talk about the stitching in real life. Give people something they can only get by being there with you — that's what makes someone feel special.\" Daydream (the digital endgame — the most futuristic passage of the session) : \"The way digital makes someone feel special is to extend into their life and be helpful : The dream (not shipped yet — 'I'm working on it'): it can see my calendar and anticipate the things in my life I need to shop for — A push notification: 'I see you have this party coming up — here are four outfits we think you'll love '; Becoming a true agent — a shopping stylist actively moving forward with your life , helping you look your best, shop what you need. 'You don't get the champagne' — 'I could maybe send you one, call me' (laughter) — 'but what you get is convenience: we know you and we see you . I'm already getting that from AI tools elsewhere in my life; I'm looking forward to it in shopping.'\""}, {"s": "m6", "a": "m6-h9", "t": "6.7 Three answers to friction", "x": "6.7 Three answers to friction Setup: \"Pain points still exist from discovery to add-to-cart. What are you doing to create frictionless commerce?\" Quince: show, don't tell. \"I'm a storyteller by trade — documentaries, a book. I can sit here all day telling you how unbelievable this sweater feels, where it was sourced — but until I show you, that's when things click . Frictionless isn't making the button smoother; it's making them believe you earlier so they never stop along the way to ask 'is this actually good? do I trust this?'\" Daydream : endorses the calendar-agent vision of frictionlessness (6.6); plus the industry table stakes — better searchability, better size &amp; fit prediction — \"remove all the challenges that currently plague e-com.\" SSENSE: operational friction (unique and concrete). \"Building and running a content team for 500+ brands is bound by cost and operational constraints. You want to create the infeasible world for each brand — the Balmain universe, the Balenciaga universe — but you can't; that's not realistic. So everything lands on the same nice white background, which does nothing for the emerging designer you need to learn more about . My frictionless world: flexible production arms that can create those more immersive experiences — so when you discover a new brand on our site, it immediately tells you what you need to know and why you should care. AI might make that possible.\""}, {"s": "m6", "a": "m6-h10", "t": "6.8 Daydream's cold start: trusting an AI shopping platform", "x": "6.8 Daydream's cold start: trusting an AI shopping platform Setup: \"For platforms like Daydream the biggest friction is the first step — there's an inherent mistrust of AI platforms. What gets people to hop over?\" The (honest) answer: \"That is the challenge. Come to our acquisition! (laughter) Strategy: focus on the cohort that's interested in AI and open to that shopping experience — we have men's and women's, but we're focused on women in that cohort. Mindset: \"Some people are afraid of AI and not interested; some are very interested. Focus on those people right now. We're building a new company; we need a group of excited shoppers who'll experience it, give feedback, understand that sometimes we make mistakes and give us another chance — like ChatGPT's 'these results may not be right, try again.'\" The line: \"We're building the plane as we fly it.\" — moderator: \" Don't hallucinate. \" (laughter)"}, {"s": "m6", "a": "m6-h11", "t": "[QUOTES &amp; COLOR]", "x": "[QUOTES &amp; COLOR] The moderator's opening compliment to Daydream's CMO: \"You look right on brand\" — \"I knew you'd have a beautiful outfit; we were all wondering what to wear to a fashion tech conference.\" Quince's \"I get a little excited\" — the genuine product passion was a room-level memory point. SSENSE's \"your body moved here; you might as well get something (champagne/sofa)\" is an effective rebuttal to omnichannel platitudes. \"Come to our acquisition!\" — the most honest startup line of the day."}, {"s": "m7", "a": "m7-h1", "t": "[KEY TAKEAWAYS]", "x": "[KEY TAKEAWAYS] Leap's CEO doctrine: master the basics — buy-online-return-in-store and inventory visibility are table stakes, yet a shocking share of retailers can't do them; complexity grows exponentially with store count. The physical store is a product-innovation intelligence station : through store feedback, Frankie's Bikinis went from 95% swim to ~55% ready-to-wear — pure online would never have discovered it. Shopify: omnichannel isn't a marketing strategy, it's architecture ; the funnel is dead — \"every channel is your conversion channel.\" SpreeAI: clean back-end data is the precondition of agentic commerce ; the right use of VTO i
